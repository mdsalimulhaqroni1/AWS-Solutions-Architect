ation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 509, "set": 10, "stem": "A company uses AWS Organizations with all features enabled to manage its AWS accounts. The company created an organizational unit (OU) in Organizations that contains accounts for developers. The company established a daily spending threshold for each developer account. The company wants to use an Amazon SNS topic to receive notification when an account reaches the daily spending threshold. Which solution will meet these requirements?", "opts": {"A": "Use AWS Cost Explorer to track spending for each account. Set up a dashboard to track each account's daily spending. Configure Amazon SNS to send an SNS alert when an account's spending reaches the daily spending threshold.", "B": "Use AWS Cost Anomaly Detection to detect anomalies in spending. Configure Amazon SNS to send an SNS alert when AWS Cost Anomaly Detection detects an anomaly.", "C": "Use AWS Budgets to set up a threshold for each account. Set up budget actions to send an SNS alert when an account's spending reaches the threshold.", "D": "Set up a composite Amazon CloudWatch alarm to send an SNS alert when the sum of all cost metrics exceeds the account's daily spending threshold."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **AWS Budgets** ব্যবহার করা হয়েছে। খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 510, "set": 10, "stem": "A company runs an Amazon Redshift cluster in a VPC in an AWS account named Account A. The VPC is in the eu-west-2 Region. Five teams at the company run Amazon Aurora databases. Each team uses a separate VPC in eu-west-2. Each team has its own AWS account. The company needs a solution that extracts approximately 1 GB of data from each of the Aurora databases. The solution must transfer that data to the Redshift cluster in Account A every night. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Create a VPC peering connection between each team's VPC and Account A's VPC.", "B": "Create an interface VPC endpoint between each team's VPC and Account A's VPC.", "C": "Create a transit gateway in Account A. Attach all VPCs to the transit gateway.", "D": "Create an AWS Site-to-Site VPN connection between Account A's VPC and the teams' VPCs."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **VPC Peering** ব্যবহার করা হয়েছে। দুটি VPC-এর মধ্যে সরাসরি private সংযোগ।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 511, "set": 10, "stem": "A company hosts a website analytics application on a single Amazon EC2 On-Demand Instance. The analytics application is highly resilient and is designed to run in stateless mode. The company notices that the application is showing signs of performance degradation during busy times and is presenting 5xx errors. The company needs to make the application scale seamlessly. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Create an Amazon Machine Image (AMI) of the web application. Use the AMI to launch a second EC2 On-Demand Instance. Use an Application Load Balancer to distribute the load across the two EC2 instances.", "B": "Create an Amazon Machine Image (AMI) of the web application. Use the AMI to launch a second EC2 On-Demand Instance. Use Amazon Route 53 weighted routing to distribute the load across the two EC2 instances.", "C": "Create an AWS Lambda function to stop the EC2 instance and change the instance type. Create an Amazon CloudWatch alarm to invoke the Lambda function when CPU utilization is more than 75%.", "D": "Create an Amazon Machine Image (AMI) of the web application. Apply the AMI to a launch template. Create an Auto Scaling group that includes the launch template. Configure the launch template to use a Spot Fleet. Attach an Application Load Balancer to the Auto Scaling group."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 512, "set": 10, "stem": "A company is building a new application that processes sensitive customer data. All data must comply with a data retention policy. The data must be immutable for 5 years. The data must be deleted after 10 years. The company decides to use Amazon S3 for storage and enables S3 Versioning. Which S3 configuration will meet these requirements?", "opts": {"A": "Set up S3 Lifecycle configuration rules to delete objects after 10 years.", "B": "Configure S3 Object Lock in governance mode with a retention period of 5 years. Set up S3 Lifecycle configuration rules to delete objects after 10 years.", "C": "Configure S3 Object Lock in compliance mode with a retention period of 10 years.", "D": "Configure S3 Object Lock in compliance mode with a retention period of 5 years. Set up S3 Lifecycle configuration rules to delete objects after 10 years."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 513, "set": 10, "stem": "A company hosts an internal web application on a single Amazon EC2 instance in a private subnet. The company is running NAT software on an EC2 instance for outbound internet access to the application. To improve fault tolerance and help ensure high availability, the company needs a more resilient architecture for both the application and its outbound connectivity. W te the S3 bucket policy to allow access from the internet gateway. Update the application to use the new internet gateway.", "B": "Configure a VPN connection. Update the S3 bucket policy to allow access from the VPN connection. Update the application to use the new VPN connection.", "C": "Configure a NAT gateway. Update the NAT gateway policy to allow access to the S3 bucket. Update the application to use the new NAT gateway.", "D": "Configure a gateway endpoint for Amazon S3. Update the S3 bucket policy to allow access from the VPC endpoint. Update the application to use the new endpoint."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 515, "set": 10, "stem": "A company has an online delivery system that runs on Amazon EC2 instances and an Amazon RDS for MySQL instance. The RDS for MySQL instance stores 10 GB of delivery and transaction data. The company wants to implement a database disaster recovery (DR) strategy that achieves a recovery time objective (RTO) of less than 3 hours. The company also wants the database DR strategy to achieve a recovery point objective (RPO) of 15 minutes. Which solution will meet these requirements?", "opts": {"A": "Schedule a database backup to Amazon S3 Glacier every 15 minutes. Copy the transaction logs to an Amazon S3 bucket every 5 minutes.", "B": "Schedule a database backup to Amazon S3 every hour. Copy the transaction logs to an S3 bucket every 5 minutes.", "C": "Set up asynchronous replication in the database by using a Multi-AZ deployment configuration. Copy the transaction logs to an Amazon S3 bucket every 20 minutes.", "D": "Schedule a database backup to AWS Storage Gateway every hour. Copy the transaction logs to an Amazon S3 bucket every 20 minutes."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}];
const NUM_SETS = 11;
// ---------- helpers ----------
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdLine(s){
  s=esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  return s;
}
function renderExp(t){
  const lines=t.split('\n');let html='';
  for(const ln of lines){
    if(!ln.trim())continue;
    if(ln.startsWith('\u2022')){html+='<p class="bullet">'+mdLine(ln)+'</p>';}
    else{html+='<p>'+mdLine(ln)+'</p>';}
  }
  return html;
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setRange(s){const lo=s*50+1;const hi=Math.min((s+1)*50, QUESTIONS[QUESTIONS.length-1].n);return [lo,hi];}
function qsOfSet(s){return QUESTIONS.filter(q=>q.set===s);}

const app=document.getElementById('app');
const crumb=document.getElementById('crumb');
let view={name:'home'};

// ---------- HOME ----------
function home(){
  view={name:'home'};
  crumb.innerHTML='';
  let h='<h1 class="page">AWS SAA-C03 আলটিমেট প্র্যাকটিস</h1>';
  h+='<p class="sub">মোট '+QUESTIONS.length+'টি প্রশ্ন • '+NUM_SETS+'টি সেট (প্রতি সেটে ফ্ল্ সলিউশন + র‍্যান্ডম ২০-প্রশ্নের কুইজ)। সঠিক উত্তর ডাম্পস থেকে নেওয়া ও যাচাই করা।</p>';
  h+='<div class="grid">';
  for(let s=0;s<NUM_SETS;s++){
    const [lo,hi]=setRange(s);const cnt=qsOfSet(s).length;
    h+='<div class="set-card"><h3>সেট '+(s+1)+'</h3><div class="rng">প্রশ্ন '+lo+'–'+hi+' • '+cnt+'টি</div>'+
      '<div class="btn-row"><button class="btn btn-ghost" onclick="study('+s+')">📖 পড়া</button>'+
      '<button class="btn btn-primary" onclick="quiz('+s+')">📝 কুইজ (২০)</button></div></div>';
  }
  h+='</div>';
  app.innerHTML=h;window.scrollTo(0,0);
}

// ---------- STUDY ----------
function optHtml(q,key,state){
  return '<div class="opt '+(state||'')+'" data-k="'+key+'"><span class="key">'+key+'</span><span>'+esc(q.opts[key])+'</span></div>';
}
function study(s){
  view={name:'study',s};
  crumb.innerHTML='<span class="crumb" onclick="home()">হোম</span> / সেট '+(s+1)+' — পড়া';
  const [lo,hi]=setRange(s);
  let h='<h1 class="page">সেট '+(s+1)+' — পড়া (Q'+lo+'–'+hi+')</h1>';
  h+='<p class="sub">একটি অপশনে ক্লিক করে দেখো সঠিক কিনা, অথবা “উত্তর ও ব্যাখ্যা” চাপো। <button class="btn btn-ghost" onclick="quiz('+s+')">এই সেটের কুইজ দিতে চাই →</button></p>';
  for(const q of qsOfSet(s)){
    const multi=q.sel>1;
    h+='<div class="qcard" id="q'+q.n+'">';
    h+='<span class="qnum'+(multi?' multi':'')+'">প্রশ্ন '+q.n+(multi?' • '+q.sel+'টি নির্বাচন':'')+'</span>';
    h+='<div class="stem">'+esc(q.stem)+'</div>';
    h+='<div class="opts">';
    for(const k of Object.keys(q.opts).sort())h+=optHtml(q,k);
    h+='</div>';
    h+='<div class="reveal-bar"><button class="btn btn-ghost" onclick="reveal('+q.n+')">💡 উত্তর ও ব্যাখ্যা</button></div>';
    h+='<div class="exp" id="exp'+q.n+'">'+renderExp(q.exp)+'</div>';
    h+='</div>';
  }
  app.innerHTML=h;window.scrollTo(0,0);
  // wire option clicks
  qsOfSet(s).forEach(q=>{
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(el=>{
      el.addEventListener('click',()=>{
        const k=el.dataset.k;
        if(q.ans.includes(k))el.classList.add('correct');else el.classList.add('wrong');
      });
    });
  });
}
function reveal(n){
  const q=QUESTIONS.find(x=>x.n===n);
  const card=document.getElementById('q'+n);
  card.querySelectorAll('.opt').forEach(el=>{if(q.ans.includes(el.dataset.k))el.classList.add('correct');});
  document.getElementById('exp'+n).classList.add('show');
}

// ---------- QUIZ ----------
let QZ=null;
function quiz(s){
  const pool=qsOfSet(s);
  const pick=shuffle(pool).slice(0,Math.min(20,pool.length));
  QZ={s,items:pick,answered:{},correct:0};
  renderQuiz();
}
function renderQuiz(){
  const s=QZ.s;
  view={name:'quiz',s};
  crumb.innerHTML='<span class="crumb" onclick="home()">হোম</span> / সেট '+(s+1)+' — কুইজ';
  let h='<h1 class="page">সেট '+(s+1)+' — কুইজ টেস্ট</h1>';
  h+='<p class="sub">'+QZ.items.length+'টি র‍্যান্ডম প্রশ্ন। অপশনে ক্লিক করলেই সঙ্গে সঙ্গে ফলাফল ও ব্যাখ্যা।</p>';
  h+='<div class="quizbar"><span class="score" id="score">স্কোর: 0/'+QZ.items.length+'</span><div class="progress"><i id="pbar"></i></div>'+
     '<button class="btn btn-ghost" onclick="quiz('+s+')">🔄 নতুন ২০</button>'+
     '<button class="btn btn-ghost" onclick="home()">← হোম</button></div>';
  h+='<div id="qzbody"></div>';
  h+='<div id="qzresult"></div>';
  app.innerHTML=h;window.scrollTo(0,0);
  const body=document.getElementById('qzbody');
  QZ.items.forEach((q,idx)=>{
    const multi=q.sel>1;
    const div=document.createElement('div');div.className='qcard';div.id='qz'+q.n;
    let c='<span class="qnum'+(multi?' multi':'')+'">'+(idx+1)+'/'+QZ.items.length+' • প্রশ্ন '+q.n+(multi?' • '+q.sel+'টি নির্বাচন':'')+'</span>';
    c+='<div class="stem">'+esc(q.stem)+'</div><div class="opts">';
    for(const k of Object.keys(q.opts).sort())c+=optHtml(q,k);
    c+='</div><div class="exp" id="qexp'+q.n+'">'+renderExp(q.exp)+'</div>';
    div.innerHTML=c;body.appendChild(div);
    const sel=new Set();
    div.querySelectorAll('.opt').forEach(el=>{
      el.addEventListener('click',()=>{
        if(QZ.answered[q.n])return;
        const k=el.dataset.k;
        if(multi){
          if(sel.has(k)){sel.delete(k);el.style.outline='';}
          else{sel.add(k);el.style.outline='2px solid var(--blue)';}
          if(sel.size>=q.sel)gradeQuiz(q,sel,div);
        }else{sel.add(k);gradeQuiz(q,sel,div);}
      });
    });
  });
  updateScore();
}
function gradeQuiz(q,sel,div){
  QZ.answered[q.n]=true;
  const correctSet=new Set(q.ans);
  let allRight=sel.size===correctSet.size&&[...sel].every(k=>correctSet.has(k));
  div.querySelectorAll('.opt').forEach(el=>{
    el.classList.add('disabled');el.style.outline='';
    const k=el.dataset.k;
    if(correctSet.has(k))el.classList.add('correct');
    else if(sel.has(k))el.classList.add('wrong');
  });
  if(allRight)QZ.correct++;
  document.getElementById('qexp'+q.n).classList.add('show');
  updateScore();
}
function updateScore(){
  const done=Object.keys(QZ.answered).length;const tot=QZ.items.length;
  document.getElementById('score').textContent='স্কোর: '+QZ.correct+'/'+tot;
  document.getElementById('pbar').style.width=(done/tot*100)+'%';
  if(done===tot){
    const pct=Math.round(QZ.correct/tot*100);
    document.getElementById('qzresult').innerHTML='<div class="result"><div class="big">'+QZ.correct+'/'+tot+'</div><div class="pct">'+pct+'% সঠিক • '+(pct>=80?'দারুণ! 🎉':pct>=60?'ভালো, আরও প্র্যাকটিস করো 💪':'আরও পড়া দরকার 📚')+'</div><div style="margin-top:14px"><button class="btn btn-ghost" onclick="quiz('+QZ.s+')">🔄 আবার ২০টি</button> <button class="btn btn-ghost" onclick="study('+QZ.s+')">📖 সেট পড়ো</button></div></div>';
    document.getElementById('qzresult').scrollIntoView({behavior:'smooth'});
  }
}
home();
</script>
