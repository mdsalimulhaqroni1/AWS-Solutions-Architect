<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA-C03 — প্র্যাকটিস ও কুইজ</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--panel:#f7f7f5;--card:#ffffff;--text:#37352f;--muted:#787774;--border:#e9e9e7;--blue:#2383e2;--green:#0f7b6c;--green-bg:#ddf4ef;--red:#e03e3e;--red-bg:#fbe4e4;--yellow-bg:#fbf3db;--shadow:0 1px 3px rgba(15,15,15,.08),0 2px 8px rgba(15,15,15,.05);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Hind Siliguri','Noto Sans Bengali',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;font-size:16px}
.wrap{max-width:920px;margin:0 auto;padding:24px 20px 80px}
header.top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.top-in{max-width:920px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px}
.brand .logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#2383e2,#0f7b6c);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.spacer{flex:1}
.crumb{color:var(--muted);font-size:14px;cursor:pointer}
.crumb:hover{color:var(--blue)}
h1.page{font-size:30px;font-weight:800;margin:10px 0 4px;letter-spacing:-.5px}
.sub{color:var(--muted);margin-bottom:24px;font-size:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);transition:.15s;cursor:default}
.set-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(15,15,15,.1)}
.set-card h3{font-size:17px;margin-bottom:4px}
.set-card .rng{color:var(--muted);font-size:13px;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1a6fc4}
.btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:#efefed}
.btn-row{display:flex;gap:8px}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.qnum{display:inline-block;background:var(--panel);color:var(--muted);font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px}
.qnum.multi{background:#eae6ff;color:#6940c9}
.stem{font-size:15.5px;margin-bottom:14px;font-weight:500}
.opt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--blue);background:#f8fbff}
.opt .key{font-weight:700;color:var(--muted);min-width:18px}
.opt.correct{background:var(--green-bg);border-color:var(--green)}
.opt.correct .key{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}
.opt.wrong .key{color:var(--red)}
.opt.disabled{cursor:default}
.exp{margin-top:14px;padding:14px 16px;background:var(--yellow-bg);border:1px solid #f0e6c8;border-radius:10px;font-size:14px;line-height:1.7;display:none}
.exp.show{display:block}
.exp p{margin-bottom:7px}
.exp .bullet{padding-left:6px}
.reveal-bar{margin-top:6px}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge.ok{background:var(--green-bg);color:var(--green)}
.badge.no{background:var(--red-bg);color:var(--red)}
.quizbar{position:sticky;top:64px;z-index:40;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);flex-wrap:wrap}
.progress{flex:1;height:8px;background:var(--panel);border-radius:6px;overflow:hidden;min-width:120px}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,#2383e2,#0f7b6c);width:0;transition:.3s}
.score{font-weight:700;font-size:14px}
.result{background:linear-gradient(135deg,#2383e2,#0f7b6c);color:#fff;border-radius:14px;padding:26px;text-align:center;margin-bottom:18px}
.result .big{font-size:42px;font-weight:800}
.result .pct{font-size:15px;opacity:.9}
.hidden{display:none}
.tag{font-size:11px;color:var(--muted)}
@media(max-width:600px){h1.page{font-size:24px}.wrap{padding:18px 14px 60px}}
</style>
</head>
<body>
<header class="top"><div class="top-in"><div class="brand"><span class="logo">☁️</span> AWS SAA-C03</div><div class="crumb" id="crumb"></div><div class="spacer"></div><span class="tag">IT EXPERT BD • বাংলা প্র্যাকটিস</span></div></header>
<div class="wrap"><div id="app"></div></div>
<script>
const QUESTIONS = [{"n": 1, "set": 0, "stem": "A company has deployed its newest product on AWS. The product runs in an Auto Scaling group behind a Network Load Balancer. The company stores the product's objects in an Amazon S3 bucket. The company recently experienced malicious attacks against its systems. The company needs a solution that continuously monitors for malicious activity in the AWS account, workloads, and access patterns to the S3 bucket. The solution must also report suspicious activity and display the information on a dashboard. Which solution will meet these requirements?", "opts": {"A": "Configure Amazon Macie to monitor and report findings to AWS Config.", "B": "Configure Amazon Inspector to monitor and report findings to AWS CloudTrail.", "C": "Configure Amazon GuardDuty to monitor and report findings to AWS Security Hub.", "D": "Configure AWS Config to monitor and report findings to Amazon EventBridge"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** দুষ্ট কার্যকলাপ শনাক্ত।\n✅ **সঠিক উত্তর C:** এখানে **Amazon GuardDuty** ব্যবহার করা হয়েছে। AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)। এর সঙ্গে **AWS Security Hub** — বিভিন্ন security service-এর finding এক জায়গায় একত্র করে dashboard-এ দেখায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Config): এই সেবা ভিন্ন কাজের — resource configuration ইতিহাস ও compliance মূল্যায়ন। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Inspector): এই সেবা ভিন্ন কাজের — EC2/ECR/Lambda-এ software vulnerability ও unintended network exposure স্ক্যান করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Config): এই সেবা ভিন্ন কাজের — resource configuration ইতিহাস ও compliance মূল্যায়ন। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 2, "set": 0, "stem": "A company wants to move from many standalone AWS accounts to a consolidated, multi-account architecture. The company plans to create many new AWS accounts for different business units. The company needs to authenticate access to these AWS accounts by using a centralized corporate directory service. Which combination of actions should a solutions architect recommend to meet these requirements? (Select TWO)", "opts": {"A": "Create a new organization in AWS Organizations with all features turned on. Create the new AWS accounts in the organization.", "B": "Set up an Amazon Cognito identity pool. Configure AWS IAM Identity Center to accept Amazon Cognito authentication.", "C": "Configure a service control policy (SCP) to manage the AWS accounts. Add AWS IAM Identity Center to AWS Directory Service", "D": "Create a new organization in AWS Organizations. Configure the organization's authentication mechanism to use AWS Directory Service directly.", "E": "Set up AWS IAM Identity Center in the organization. Configure IAM Identity Center, and integrate it with the company's corporate directory service."}, "ans": ["A", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়।\n✅ **সঠিক উত্তর E:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon Cognito): এই সেবা ভিন্ন কাজের — web/mobile app-এর user authentication ও federation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Service Control Policy (SCP)): এই সেবা ভিন্ন কাজের — Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 3, "set": 0, "stem": "A company is conducting an internal audit. The company wants to ensure that the data in an Amazon S3 bucket that is associated with the company's AWS Lake Formation data lake does not contain sensitive customer or employee data. The company wants to discover personally identifiable information (PII) or financial information, including passport numbers and credit card numbers. Which solution will meet these requirements?", "opts": {"A": "Configure AWS Audit Manager on the account. Select the Payment Card Industry Data Security Standards (PCI DSS) for auditing", "B": "Configure Amazon S3 Inventory on the S3 bucket. Configure Amazon Athena to query the inventory.", "C": "Configure Amazon Macie to run a data discovery job that uses managed identifiers for the required data types.", "D": "Use Amazon S3 Inventory Report to run a report across the S3 bucket."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Macie** ব্যবহার করা হয়েছে। S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 4, "set": 0, "stem": "A company is planning to migrate a TCP-based application into the company's VPC. The application is publicly accessible on a nonstandard TCP port through a hardware appliance in the company's data center. This public endpoint can process up to 3 million requests per second with low latency. The company requires the same level of performance for the new public endpoint in AWS What should a solutions architect recommend to meet this requirement?", "opts": {"A": "Deploy a Network Load Balancer (NLB). Configure the NLB to be publicly accessible over the TCP port that the application requires.", "B": "Deploy an Application Load Balancer (ALB). Configure the ALB to be publicly accessible over the TCP port that the application requires.", "C": "Deploy an Amazon CloudFront distribution that listens on the TCP port that the application requires. Use an Application Load Balancer as the origin.", "D": "Deploy an Amazon API Gateway API that is configured with the TCP port that the application requires. Configure AWS Lambda functions with provisioned concurrency to process the requests."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর A:** এখানে **Network Load Balancer (NLB)** ব্যবহার করা হয়েছে। Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 5, "set": 0, "stem": "A company is building a new application. The application runs on Amazon EC2 instances and uses an Amazon S3 bucket for document storage. The company needs to ensure that the EC2 instances can access the S3 bucket. Which solution will meet these requirements?", "opts": {"A": "Create an IAM role that grants access to the S3 bucket. Update the trust policy to allow Amazon EC2 to assume the role. Associate the instance profile with the EC2 instances.", "B": "Create an IAM policy that grants access to the S3 bucket. Update the trust policy to allow Amazon EC2 to assume the role. Attach the policy to the EC2 instances.", "C": "Create an IAM group that grants access to the S3 bucket. Attach the group to the EC2 instances.", "D": "Create an IAM user that grants access to the S3 bucket. Attach the user account to the EC2 instances"}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 6, "set": 0, "stem": "A solutions architect for a media company needs to design a storage solution for a video editing application. The application runs on Amazon Linux based Amazon EC2 instances. The application requires sub-millisecond latency and must have access to 500 TB of video data. The data must also be available from multiple EC2 instances simultaneously. Which solution will meet these requirements?", "opts": {"A": "Deploy an Amazon S3 bucket. Use S3 access points to provide access to the EC2 instances.", "B": "Configure an Amazon FSx for Lustre file system with SSD storage.", "C": "Deploy a Provisioned IOPS SSD (io2) Amazon EBS volume", "D": "Configure an Amazon Elastic File System (Amazon EFS) file system in Max I/O performance mode."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon FSx for Lustre** ব্যবহার করা হয়েছে। HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 7, "set": 0, "stem": "An ecommerce company wants to improve the security posture of an application across multiple AWS accounts. The company uses an organization in AWS Organizations to manage the accounts. The application runs in Amazon EC2 Auto Scaling groups across multiple Availability Zones behind an Application Load Balancer (ALB) in the us-east-1 Region The company needs a solution to protect the application against cross-site scripting, SQL injection, and DDoS attacks. The company wants to centrally manage all security administration for the accounts in the organization from one account. Which combination of actions will meet these requirements? (Select THREE)", "opts": {"A": "Configure an Amazon CloudFront distribution to direct traffic to the ALB", "B": "Configure AWS Firewall Manager to manage security configurations.", "C": "Configure AWS WAF ACL rules, and associate the rules with the ALB.", "D": "Configure AWS Security Hub to manage security configurations.", "E": "Configure AWS Shield Advanced to protect the ALB. F. Configure AWS Config to track and enforce compliance with the company's security policies"}, "ans": ["A", "B", "E"], "sel": 3, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n✅ **সঠিক উত্তর B:** Configure AWS Firewall Manager to manage security configurations.\n✅ **সঠিক উত্তর E:** এখানে **AWS Config** ব্যবহার করা হয়েছে। resource configuration ইতিহাস ও compliance মূল্যায়ন।\n❌ **কেন অন্যগুলো নয়:**\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Security Hub): এই সেবা ভিন্ন কাজের — বিভিন্ন security service-এর finding এক জায়গায় একত্র করে dashboard-এ দেখায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 8, "set": 0, "stem": "A company needs a solution to automate email ingestion. The company needs to automatically parse email messages, look for email attachments, and save any attachments to an Amazon S3 bucket in near real time. Email volume varies significantly from day to day. Which solution will meet these requirements?", "opts": {"A": "Set up email receiving in Amazon Simple Email Service (Amazon SES). Create a rule set and a receipt rule. Create an AWS Lambda function that Amazon SES can invoke to process the email bodies and attachments.", "B": "Set up email content filtering in Amazon Simple Email Service (Amazon SES). Create a content filtering rule based on sender, recipient, message body, and attachments.", "C": "Set up email receiving in Amazon Simple Email Service (Amazon SES). Configure Amazon SES and S3 Event Notifications to process the email bodies and attachments.", "D": "Create an AWS Lambda function to process the email bodies and attachments. Use Amazon EventBridge to invoke the Lambda function. Configure an EventBridge rule to listen for incoming emails."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 9, "set": 0, "stem": "A company runs its applications on Amazon EC2 instances. The company performs periodic financial assessments of its AWS costs. The company recently identified unusual spending. The company needs a solution to prevent unusual spending. The solution must monitor costs and notify responsible stakeholders in the event of unusual spending Which solution will meet these requirements?", "opts": {"A": "Use an AWS Budgets template to create a zero spend budget.", "B": "Create an AWS Cost Anomaly Detection monitor in the AWS Billing and Cost Management console.", "C": "Create AWS Pricing Calculator estimates for the current running workload pricing details.", "D": "Use Amazon CloudWatch to monitor costs and to identify unusual spending."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Create an AWS Cost Anomaly Detection monitor in the AWS Billing and Cost Management console.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 10, "set": 0, "stem": "A solutions architect is designing the architecture for a two-tier web application. The web application consists of an internet-facing Application Load Balancer (ALB) that forwards traffic to an Auto Scaling group of Amazon EC2 instances. The EC2 instances must be able to access an Amazon RDS database. The company does not want to rely solely on security groups or network ACLs. Only the minimum resources that are necessary should be routable from the internet Which network design meets these requirements?", "opts": {"A": "Place the ALB, EC2 instances, and RDS database in private subnets", "B": "Place the ALB in public subnets. Place the EC2 instances and RDS database in private subnets.", "C": "Place the ALB and EC2 instances in public subnets. Place the RDS database in private subnets", "D": "Place the ALB outside the VPC, Place the EC2 instances and RDS database in private subnets."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 11, "set": 0, "stem": "A company uses Amazon RDS with default backup settings for its database tier. The company needs to make a daily backup of the database to meet regulatory requirements. The company must retain the backups for 30 days. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Write an AWS Lambda function to create an RDS snapshot every day", "B": "Modify the RDS database to have a retention period of 30 days for automated backups.", "C": "Use AWS Systems Manager Maintenance Windows to modify the RDS backup retention period.", "D": "Create a manual snapshot every day by using the AWS CLI. Modify the RDS backup retention period."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 12, "set": 0, "stem": "A company is building an application that consists of multiple microservices. The company decides to use containers to deploy the application software to AWS. The company needs to run two instances of each microservice. The company needs a solution that minimizes the amount of ongoing effort for maintenance and scaling. Which combination of actions will meet these requirements? (Select TWO.)", "opts": {"A": "Deploy an Amazon Elastic Container Service (Amazon ECS) cluster.", "B": "Deploy the Kubernetes control plane on Amazon EC2 instances that span multiple Availability Zones.", "C": "Deploy an Amazon Elastic Container Service (Amazon ECS) service with the Amazon EC2 launch type. Configure the desired task number to be two.", "D": "Deploy an Amazon Elastic Container Service (Amazon ECS) service with the AWS Fargate launch type. Configure the desired task number to be two.", "E": "Deploy Kubernetes worker nodes on Amazon EC2 instances that span multiple Availability Zones. Create a deployment that specifies two replicas for each microservice."}, "ans": ["A", "D"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration।\n✅ **সঠিক উত্তর D:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **AWS Fargate** — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 13, "set": 0, "stem": "A company runs a customer verification application on AWS. The application uploads customer documents to an Amazon S3 bucket. To comply with regulations, the company must retain the uploaded documents for 10 years. During the retention period, the company must prevent any user, including the AWS account root user, from overwriting or deleting the protected documents. Which solution will meet these requirements?", "opts": {"A": "Enable versioning on the S3 bucket. Configure a 10-year retention policy for the S3 bucket. Use Govemance retention mode.", "B": "Enable versioning on the S3 bucket and use server-side encryption with Amazon S3 managed keys (SSE-S3). Configure an S3 Lifecycle rule to immediately transition uploaded objects to S3 Standard-Infrequent Access (S3 Standard-IA).", "C": "Enable versioning on the S3 bucket. Configure a 10-year retention policy for the S3 bucket. Use Compliance retention mode.", "D": "Enable versioning on the 83 buckets. Set an S3 Lifecycle rule to immediately transition uploaded objects to S3 Glacier Deep Archive."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 14, "set": 0, "stem": "A research company runs experiments that are powered by a simulation application and a visualization application. The simulation application runs on Linux and outputs intermediate data to an NFS share every 5 minutes. The visualization application is a Windows desktop application that displays the simulation output and requires an SMB file system. The company maintains two synchronized file systems. This strategy is causing data duplication and inefficient resource usage. The company needs to migrate the applications to AWS without making code changes to either application. Which solution will meet these requirements?", "opts": {"A": "Migrate both applications to AWS Lambda. Create an Amazon S3 bucket to exchange data between the applications.", "B": "Migrate both applications to Amazon Elastic Container Service (Amazon ECS). Configure Amazon FSx File Gateway for storage.", "C": "Migrate the simulation application to Linux Amazon EC2 instances. Migrate the visualization application to Windows EC2 instances. Configure Amazon Simple Queue Service (Amazon SQS) to exchange data between the applications.", "D": "Migrate the simulation application to Linux Amazon EC2 instances. Migrate the visualization application to Windows EC2 instances. Configure Amazon FSx for NetApp ONTAP for storage."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon FSx for NetApp ONTAP** — NFS, SMB ও iSCSI একসাথে সাপোর্টকারী multi-protocol file system।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 15, "set": 0, "stem": "A company stores raw collected data in an Amazon S3 bucket. The data is used for several types of analytics on behalf of the company's customers. The type of analytics requested determines the access pattern on the S3 objects. The company cannot predict or control the access pattern. The company wants to reduce its S3 costs. Which solution will meet these requirements?", "opts": {"A": "Use S3 replication to transition infrequently accessed objects to S3 Standard-Infrequent Access (S3 Standard-IA).", "B": "Use S3 Lifecycle rules to transition objects from S3 Standard to Standard-Infrequent Access (S3 Standard-IA).", "C": "Use S3 Lifecycle rules to transition objects from S3 Standard to S3 Intelligent-Tiering.", "D": "Use S3 Inventory to identify and transition objects that have not been accessed from S3 Standard to S3 Intelligent-Tiering."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 16, "set": 0, "stem": "A company wants to relocate its on-premises MySQL database to AWS. The database accepts regular imports from a client-facing application, which causes a high volume of write operations. The company is concerned that the amount of traffic might be causing performance issues within the application. How should a solutions architect design the architecture on AWS?", "opts": {"A": "Provision an Amazon RDS for MySQL DB instance with Provisioned IOPS SSD storage. Monitor write operation metrics by using Amazon CloudWatch. Adjust the provisioned IOPS if necessary.", "B": "Provision an Amazon RDS for MySQL DB instance with General Purpose SSD storage. Place an Amazon ElastiCache cluster in front of the DB instance. Configure the application to query ElastiCache instead.", "C": "Provision an Amazon DocumentDB (with MongoDB compatibility) instance with a memory optimized instance type. Monitor Amazon CloudWatch for performance-related issues. Change the instance class if necessary.", "D": "Provision an Amazon Elastic File System (Amazon EFS) file system in General Purpose performance mode. Monitor Amazon CloudWatch for IOPS bottlenecks. Change to Provisioned Throughput performance mode if necessary."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **Amazon CloudWatch** — metric, log, alarm ও monitoring। এর সঙ্গে **Amazon EBS** — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 17, "set": 0, "stem": "A company runs a web server on a group of Amazon EC2 instances. Each EC2 instance has an Elastic IP address. Traffic to the EC2 instance requires a TLS certificate that must be updated every 7 days. according to the company's security policy. The company wants to prevent downtime during TLS certificate updates that are caused by restarting the web server Which solution will meet these requirements with the LEAST implementation effort?", "opts": {"A": "Create a TLS certificate that is verified by a DNS record in AWS Certificate Manager (ACM). Configure an Application Load Balancer (ALB) that uses the certificate with an HTTPS listener. Attach a target group that includes the EC2 instances to the ALB. Remove the Elastic IP addresses.", "B": "Configure an Amazon S3 bucket for static web hosting. Configure an Amazon CloudFront distribution that uses the S3 bucket as an origin. Redirect traffic that is bound for the EC2 instances to the CloudFront distribution.", "C": "Create a TLS certificate that is verified by an email message in AWS Certificate Manager (ACM). Configure the user data scripts for the EC2 instances to attach the ACM certificate.", "D": "Create a Docker container image of the EC2 instances. Use Amazon Elastic Container Service (Amazon ECS) to launch the container. Create a new TLS certificate in AWS Certificate Manager (ACM). Create an Application Load Balancer (ALB) that has a target group for the ECS service. Configure the ALB to use the ACM certificate."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Application Load Balancer (ALB)** ব্যবহার করা হয়েছে। Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 18, "set": 0, "stem": "An antivirus company wants to provide a virus scanning application for AWS account owners in the us-east-1 Region. The application runs on a group of Amazon EC2 instances in a VPC. The application receives data files on a custom TCP port, scans for viruses, and returns results to the caller The company needs to design a scalable solution that can handle thousands of users. Which solution will meet these requirements?", "opts": {"A": "Register the EC2 instances that run the antivirus application in a target group that is associated with a public Application Load Balancer (ALB). Ensure that users connect to the application by using the DNS name of the ALB.", "B": "Register the EC2 instances that run the antivirus application in a target group that is associated with a Network Load Balancer (NLB). Create an AWS PrivateLink endpoint service. Associate the PrivateLink endpoint with the NLB. Ensure that users connect to the application by using a PrivateLink endpoint in each user's account.", "C": "Attach the VPC that hosts the antivirus application to a transit gateway. Create a new VPC attachment for each user that wants to use the antivirus application. Update route tables accordingly.", "D": "Use VPC peering to connect the VPC that hosts the antivirus application to the VPC of each application user. Update route tables on each side to route relevant traffic through the peering connection."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Network Load Balancer (NLB)** — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এর সঙ্গে **AWS PrivateLink** — VPC থেকে service-এ private এন্ডপয়েন্ট (interface endpoint) দিয়ে নিরাপদ অ্যাক্সেস।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (VPC Peering): এই সেবা ভিন্ন কাজের — দুটি VPC-এর মধ্যে সরাসরি private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 19, "set": 0, "stem": "any future objects. A company migrated millions of archival files to Amazon S3. A solutions architect needs to implement a solution that will encrypt all the archival data. The solution must encrypt existing unencrypted objects and Which solution will meet these requirements?", "opts": {"A": "Create a list of unencrypted objects by filtering an S3 Inventory report. Configure an S3 Batch Operations job to encrypt the objects from the list with server-side encryption with Amazon S3 managed keys (SSE-S3), Configure the S3 default encryption feature to use SSE-S3", "B": "Use S3 Storage Lens metrics to identify unencrypted 83 objects. Configure the S3 default encryption feature to use server-side encryption with AWS KMS keys (SSE-KMS)", "C": "Create a list of unencrypted objects by filtering an AWS usage report for Amazon S3. Configure an AWS Batch job to encrypt the objects from the list with server-side encryption with AWS KMS keys (SSE-KMS). Configure the S3 default encryption feature to use SSE-KMS", "D": "Create a list of unencrypted objects by filtering an AWS usage report for Amazon S3. Configure the S3 default encryption feature to use server-side encryption with customer-provided keys (SSE-C)"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 20, "set": 0, "stem": "A company has 700 TB of backup data stored in network attached storage (NAS) in its data center. This backup data needs to be accessible for infrequent regulatory requests and must be retained 7 years. The company has decided to migrate this backup data from its data center to AWS. The migration must be complete within 1 month. The company has 500 Mbps of dedicated bandwidth on its public internet connection available for data transfer What should a solutions architect do to migrate and store the data at the LOWEST cost?", "opts": {"A": "Order AWS Snowball devices to transfer the data. Use a lifecycle policy to transition the files to Amazon S3 Glacier Deep Archive", "B": "Deploy a VPN connection between the data center and Amazon VPC. Use the AWS CLI to copy the data from on premises to Amazon S3 Glacier Flexible Retrieval.", "C": "Provision a 500 Mbps AWS Direct Connect connection and transfer the data to Amazon S3. Use a lifecycle policy to transition the files to Amazon S3 Glacier Deep Archive.", "D": "Use AWS DataSync to transfer the data and deploy a DataSync agent on premises. Use the DataSync task to copy files from the on-premises NAS storage to Amazon S3 Glacier Deep Archive"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **AWS Snowball** ব্যবহার করা হয়েছে। বিশাল পরিমাণ ডেটা offline/physical device-এ AWS-এ স্থানান্তর। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 21, "set": 0, "stem": "A marketing company receives a large amount of new clickstream data in Amazon S3 from a marketing campaign. The company needs to analyze the clickstream data in Amazon S3 quickly. Then the company needs to determine whether to process the data further in the data pipeline. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "A Create external tables in a Spark catalog. Configure jobs in AWS Glue to query the data.", "B": "Configure an AWS Glue crawler to crawl the data. Configure Amazon Athena to query the data.", "C": "Create external tables in a Hive metastore. Configure Spark jobs in Amazon EMR to query the data.", "D": "Configure an AWS Glue crawler to crawl the data. Configure Amazon Managed Service for Apache Flink (previously known as Amazon Kinesis Data Analytics) to use SQL to query the data."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **AWS Glue** ব্যবহার করা হয়েছে। serverless ETL ও data catalog। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 22, "set": 0, "stem": "A company needs to connect several VPCs in the us-east-1 Region that span hundreds of AWS accounts. The company's networking team has its own AWS account to manage the cloud network. What is the MOST operationally efficient solution to connect the VPCs?", "opts": {"A": "Set up VPC peering connections between each VPC. Update each associated subnet's route table. A", "B": "Configure a NAT gateway and an internet gateway in each VPC to connect each VPC through the internet. B.", "C": "Create an AWS Transit Gateway in the networking team's AWS account. Configure static routes from each VPC", "D": "Deploy VPN gateways in each VPC. Create a transit VPC in the networking team's AWS account to connect to each VPC."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **AWS Transit Gateway** ব্যবহার করা হয়েছে। বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (VPC Peering): এই সেবা ভিন্ন কাজের — দুটি VPC-এর মধ্যে সরাসরি private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 23, "set": 0, "stem": "A healthcare company needs to encrypt patient data that is stored in an Amazon RDS for PostgreSQL DB instance to comply with regulations. The company must ensure that only specific IAM roles can manage the encryption keys and decrypt the data Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Enable RDS encryption with AWS managed keys (aws/rds). Update the DB instance to restrict access based on a service-linked role A", "B": "Enable RDS encryption with a customer-managed AWS KMS key. Configure a key policy that allows only specific IAM roles to use and manage the key.", "C": "Create a custom encryption method at the application layer. Store the encryption keys in an Amazon S3 bucket. Configure a bucket policy to control access to the keys", "D": "Enable RDS encryption at rest with the default AWS KMS key. Control access to the RDS DB instance by using a security group that allows access only for specific IAM roles."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর B:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **AWS KMS** — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 24, "set": 0, "stem": "A company recently migrated a data warehouse to AWS. The company has an AWS Direct Connect connection to AWS. Company users query the data warehouse by using a visualization tool. The average size of the queries that the data warehouse returns is 50 MB. The average visualization that the visualization tool produces is 500 KB in size. The result sets that the data warehouse returns are not cached. The company wants to optimize costs for data transfers between the data warehouse and the company. Which solution will meet this requirement?", "opts": {"A": "Host the visualization tool on premises. Connect to the data warehouse directly through the internet.", "B": "Host the visualization tool in the same AWS Region as the data warehouse. Access the visualization tool through the internet.", "C": "Host the visualization tool on premises. Connect to the data warehouse through the Direct Connect connection", "D": "Host the visualization tool in the same AWS Region as the data warehouse. Access the visualization tool through the Direct Connect connection"}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **AWS Direct Connect** ব্যবহার করা হয়েছে। on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 25, "set": 0, "stem": "A company needs to grant a team of developers’ access to the company's AWS resources. The company must maintain a high level of security for the resources. The company requires an access control solution that will prevent unauthorized access to the sensitive data. Which solution will meet these requirements?", "opts": {"A": "Share the IAM user credentials for each development team member with the rest of the team to simplify access management and to streamline development workflows.", "B": "Define IAM roles that have fine-grained permissions based on the principle of least privilege. Assign an IAM role to each developer.", "C": "Create IAM access keys to grant programmatic access to AWS resources. Allow only developers to interact with AWS resources through API calls by using the access keys.", "D": "Create an AWS Cognito user pool. Grant developers’ access to AWS resources by using the user pool."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর B:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon Cognito): এই সেবা ভিন্ন কাজের — web/mobile app-এর user authentication ও federation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 26, "set": 0, "stem": "A company has a production Amazon RDS for MySQL database. The company needs to create a new application that will read frequently changing data from the database with minimal impact on the database's overall performance. The application will rarely perform the same query more than once. What should a solutions architect do to meet these requirements?", "opts": {"A": "Set up an Amazon ElastiCache cluster. Query the results in the cluster.", "B": "Set up an Application Load Balancer (ALB). Query the results in the ALB.", "C": "Set up a read replica for the database. Query the read replica.", "D": "Set up querying of database snapshots. Query the database snapshots."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Set up a read replica for the database. Query the read replica.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 27, "set": 0, "stem": "A solutions architect is migrating an on-premises application to AWS. The application currently runs on containers. The components of the application are loosely coupled. The application consumes messages from a message queue. The solutions architect needs to design a new architecture for the application on AWS. The solutions architect wants to use fully managed AWS services for the new architecture. The new architecture must provide unlimited scalability for the message queue's throughput Which solution will meet these requirements?", "opts": {"A": "Use Amazon Simple Queue Service (Amazon SQS) to create a new message queue. Subscribe the SQS queue to an Amazon Simple Notification Service (Amazon SNS) topic. Use Amazon EC2 Reserved Instances that run Kubernetes containers to consume messages from the message queue.", "B": "Use Amazon MQ to create a new message queue. Subscribe the Amazon MQ queue to an Amazon Simple Notification Service (Amazon SNS) topic. Use Amazon Elastic Kubernetes Service (Amazon EKS) containers on AWS Fargate to consume messages from the message queue.", "C": "Use Amazon MQ to create a new message queue. Subscribe the Amazon MQ queue to an Amazon Simple Notification Service (Amazon SNS) topic. Use AWS Lambda functions to poll messages from the Amazon MQ queue by using Lambda event source mappings.", "D": "Use Amazon Simple Queue Service (Amazon SQS) to create a new message queue. Subscribe the SQS queue to an Amazon Simple Notification Service (Amazon SNS) topic. Use Amazon Elastic Container Service (Amazon ECS) containers on AWS Fargate to consume messages from the message queue."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out। এর সঙ্গে **Amazon ECS** — AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon MQ): এই সেবা ভিন্ন কাজের — managed ActiveMQ/RabbitMQ — পুরনো message broker (JMS/AMQP) migration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon MQ): এই সেবা ভিন্ন কাজের — managed ActiveMQ/RabbitMQ — পুরনো message broker (JMS/AMQP) migration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 28, "set": 0, "stem": "A company has an industrial application that controls a process in real time. The company plans to rearchitect the application to distribute jobs across several Amazon EC2 instances in a VPC. The solution needs to maximize the network throughput and minimize the network latency between the instances Which solution will meet these requirements?", "opts": {"A": "Place the instances in a host-level partition placement group. Choose instance types that support enhanced networking", "B": "Place the instances in several dedicated hosts in the same partition of a partition placement group. Choose dedicated hosts that support enhanced networking.", "C": "Place the instances in several dedicated hosts in the same rack of a rack-level placement group. Choose dedicated hosts that support enhanced networking", "D": "Place the instances in a cluster placement group. Choose instance types that support enhanced networking"}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** Place the instances in a cluster placement group. Choose instance types that support enhanced networking\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 29, "set": 0, "stem": "A company uses local storage volumes to run a latency-sensitive application on premises. The volumes that the application uses range from 100 GB to 2 TB in size. The company is planning to migrate the application to AWS. The company does not want to change the application architecture. The application requires persistent storage. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Host the application on an Amazon Elastic Container Service (Amazon ECS) cluster. Use an Amazon FSx for Lustre file system for storage.", "B": "Host the application on Amazon EC2 instances in an Auto Scaling group. Use an Amazon Elastic File System (Amazon EFS) standard volume for storage.", "C": "Host the application on Amazon EC2 instances in an Auto Scaling group. Use instance store volumes for storage.", "D": "Host the application on Amazon EC2 instances in an Auto Scaling group. Use Amazon Elastic Block Store (Amazon EBS) General Purpose SSD (gp3) volumes for storage."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Amazon EBS** — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 30, "set": 0, "stem": "A company's SAP application has a backend SQL Server database in an on-premises environment. The company wants to migrate its on-premises application and database server to AWS. The company needs an instance type that meets the high demands of its SAP database On-premises performance data shows that both the SAP application and the database have high memory utilization. Which solution will meet these requirements?", "opts": {"A": "Use the compute optimized instance family for the application. Use the memory optimized instance family for the database.", "B": "Use the storage optimized instance family for both the application and the database.", "C": "Use the memory optimized instance family for both the application and the database.", "D": "Use the high-performance computing (HPC) optimized instance family for the application. Use the memory optimized instance family for the database."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Use the memory optimized instance family for both the application and the database.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 31, "set": 0, "stem": "A company is launching a new gaming application. The company will use Amazon EC2 Auto Scaling groups to deploy the application. The application stores user data in a relational database the company has office locations around the world that need to run analytics on the user data in the database. The company needs a cost-effective database solution that provides cross-Region disaster recovery with low-latency read performance across AWS Regions. Which solution will meet these requirements?", "opts": {"A": "Create an Amazon ElastiCache (Redis OSS) cluster in the Region where the application is deployed. Create read replicas in regions where the company offices are located. Ensure the company offices read from the read replica instances.", "B": "Create Amazon DynamoDB global tables. Deploy the tables to the Regions where the company offices are located and to the Region where the application is deployed. Ensure that each company office reads from the tables that are in the same Region as the office.", "C": "Create an Amazon Aurora global database. Configure the primary cluster to be in the Region where the application is deployed. Configure the secondary Aurora replicas to be in the Regions where the company offices are located. Ensure the company offices read from the Aurora replicas.", "D": "Create an Amazon RDS Multi-AZ DB cluster deployment in the Region where the application is deployed. Ensure the company offices read from read replica instances."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 32, "set": 0, "stem": "A company is building an ecommerce platform that will allow customers to place orders online. Customer traffic varies significantly. An order-processing microservice is running on a group of Amazon EC2 instances. A solutions architect must ensure that the application remains responsive and decoupled from the frontend. The application must also be able to reprocess orders that the application fails to process on the first attempt Which solution will meet these requirements?", "opts": {"A": "Deploy an Application Load Balancer in front of the order-processing microservice. Configure the Amazon EC2 instances to scale out automatically based on CPU utilization metrics as traffic increases.", "B": "Deploy an Amazon Simple Queue Service (Amazon SQS) queue to integrate the frontend and the order-processing microservice. Configure the frontend to send messages to the queue. Configure the EC2 instances to process messages from the queue.", "C": "Establish direct HTTPS connections from the frontend to the microservice. Use a dynamically expanding thread pool to handle concurrency at the microservice layer.", "D": "Use Amazon Kinesis Data Streams to ingest all order requests from the frontend. Configure the Amazon EC2 instances to continuously poll the stream and process orders in near real time."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, কোনো request নষ্ট না হওয়া ও পুনরায় process।\n✅ **সঠিক উত্তর B:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 33, "set": 0, "stem": "A company is deploying a new application to Amazon Elastic Kubernetes Service (Amazon EKS) with an AWS Fargate cluster. The application needs a storage solution for data persistence. The solution must be highly available and fault tolerant. The solution also must be shared between multiple application containers. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Create Amazon Elastic Block Store (Amazon EBS) volumes in the same Availability Zones where EKS worker nodes are placed. Register the volumes in a StorageClass object on an EKS cluster. Use EBS Multi-Attach to share the data between containers.", "B": "Create an Amazon Elastic File System (Amazon EFS) file system. Register the file system in a StorageClass object on an EKS cluster. Use the same file system for all containers.", "C": "Create an Amazon Elastic Block Store (Amazon EBS) volume. Register the volume in a StorageClass object on an EKS cluster. Use the same volume for all containers.", "D": "Create Amazon Elastic File System (Amazon EFS) file systems in the same Availability Zones where EKS worker nodes are placed. Register the file systems in a StorageClass object on an EKS cluster. Create an AWS Lambda function to synchronize the data between file systems."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এর সঙ্গে **Amazon EKS** — managed Kubernetes; IRSA দিয়ে pod-এ IAM role।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 34, "set": 0, "stem": "A financial services company must keep log data for 1 year. The company stores log files in an Amazon S3 bucket. The company wants to prevent any user from deleting or overwriting the log files for 1 year. The data must be available for read-only requests. Which solution will meet these requirements?", "opts": {"A": "Enable S3 Versioning on the bucket. Use Object Lock in compliance mode with a 1-year retention period.", "B": "Enable S3 Transfer Acceleration on the bucket. Create an S3 Lifecycle Configuration rule to move objects to Amazon S3 Glacier Flexible Retrieval after 1 year.", "C": "Enable S3 Versioning on the bucket. Create an S3 Lifecycle Configuration rule to move objects to Amazon S3 Glacier Flexible Retrieval after 1 year.", "D": "Create an AWS Lambda function to programmatically check the timestamp of S3 data and to move the data to Amazon S3 Glacier Deep Archive if the data is older than 1 year."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 35, "set": 0, "stem": "A company runs a self-managed Microsoft SQL Server on Amazon EC2 instarices and Amazon Elastic Block Store (Amazon EBS), Daily snapshots are taken of the EBS volumes. Recently, all the company's EBS snapshots were accidentally deleted while running a snapshot cleaning script that deletes all expired EBS snapshots. A solutions architect needs to update the architecture to prevent data loss without retaining EBS snapshots indefinitely. Which solution will meet these requirements with the LEAST development effort?", "opts": {"A": "Change the IAM policy of the user to deny EBS snapshot deletion.", "B": "Copy the EBS snapshots to another AWS Region after completing the snapshots daily", "C": "Create a 7-day EBS snapshot retention rule in Recycle Bin and apply the rule for all snapshots.", "D": "Copy EBS snapshots to Amazon S3 Standard-Infrequent Access (S3 Standard-IA)."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon EBS** ব্যবহার করা হয়েছে। একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 36, "set": 0, "stem": "A company hosts an ecommerce application that stores all data in a single Amazon RDS for MySQL DB instance that is fully managed by AWS. The company needs to mitigate the risk of a single point of failure. Which solution will meet these requirements with the LEAST implementation effort?", "opts": {"A": "Modify the RDS DB instance to use a multi-AZ deployment. Apply the changes during the next maintenance window.", "B": "Migrate the current database to a new Amazon DynamoDB Multi-AZ deployment. Use AWS Database Migration Service (AWS DMS) with a heterogeneous migration strategy to migrate the current RDS DB instance to DynamoDB tables.", "C": "Create a new RDS DB instance in a multi-AZ deployment. Manually restore the data from the existing RDS DB instance from the most recent snapshot.", "D": "Configure the DB instance in an Amazon EC2 Auto Scaling group with a minimum group size of three. Use Amazon Route 53 simple routing to distribute requests to all DB instances."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 37, "set": 0, "stem": "A company runs a monolithic application in its on-premises data center. The company used Java/Tomcat to build the application. The application uses Microsoft SQL Server as a database. The company wants to migrate the application to AWS Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Use AWS App2Container to containerize the application. Deploy the application on Amazon Elastic Kubernetes Service (Amazon EKS). Deploy the database to Amazon RDS for SQL Server. Configure a multi-AZ deployment.", "B": "Containerize the application and deploy the application on a self-managed Kubernetes cluster on an Amazon EC2 instance. Deploy the database on a separate EC2 instance. Set up Microsoft SQL Server Always On availability groups.", "C": "Deploy the frontend of the web application as a website on Amazon S3. Use Amazon DynamoDB for the database tier.", "D": "Use AWS App2Container to containerize the application. Deploy the application on Amazon Elastic Kubernetes Service (Amazon EKS). Use Amazon DynamoDB for the database tier"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon EKS** ব্যবহার করা হয়েছে। managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 38, "set": 0, "stem": "A research company uses on-premises devices to generate data for analysis. The company wants to use the AWS Cloud to analyze the data. The devices generate .csv files and support writing the data to an SMB file share. Company analysts must be able to use SQL commands to query the data. The analysts will run queries periodically throughout the day. Which combination of steps will meet these requirements MOST cost-effectively? (Select THREE.)", "opts": {"A": "Deploy an AWS Storage Gateway on premises in Amazon S3 File Gateway mode.", "B": "Deploy an AWS Storage Gateway on premises in Amazon FSx File Gateway mode.", "C": "Set up an AWS Glue crawler to create a table based on the data that is in Amazon S3.", "D": "Set up an Amazon EMR cluster with EMR File System (EMRFS) to query the data that is in Amazon S3. Provide access to analysts.", "E": "Set up an Amazon Redshift cluster to query the data that is in Amazon S3. Provide access to analysts F. Set up Amazon Athena to query the data that is in Amazon S3. Provide access to analysts."}, "ans": ["A", "C", "E"], "sel": 3, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **AWS Storage Gateway** ব্যবহার করা হয়েছে। on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর C:** এখানে **AWS Glue** ব্যবহার করা হয়েছে। serverless ETL ও data catalog। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর E:** এখানে **Amazon Redshift** ব্যবহার করা হয়েছে। petabyte-scale data warehouse, analytical (OLAP) query। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 39, "set": 0, "stem": "A weather forecasting company collects temperature readings from various sensors on a continuous basis. An existing data ingestion process collects the readings and aggregates the readings into larger Apache Parquet files. Then the process encrypts the files by using client-side encryption with KMS managed keys (CSE-KMS), Finally, the process writes the files to an Amazon S3 bucket with separate prefixes for each calendar day. The company wants to run occasional SQL queries on the data to take sample moving averages for a specific calendar day. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure Amazon Athena to read the encrypted files. Run SQL queries on the data directly in Amazon S3.", "B": "Use Amazon S3 Storage Lens to run SQL queries on the data directly in Amazon S3", "C": "Configure Amazon Redshift to read the encrypted files. Use Redshift Spectrum and Redshift query editor v2 to run SQL queries on the data directly in Amazon S3.", "D": "Configure Amazon EMR Serverless to read the encrypted files. Use Apache SparkSQL to run SQL queries on the data directly in Amazon S3."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর A:** এখানে **Amazon Athena** ব্যবহার করা হয়েছে। S3-এর ডেটায় serverless SQL query, server লাগে না। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Redshift): এই সেবা ভিন্ন কাজের — petabyte-scale data warehouse, analytical (OLAP) query। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 40, "set": 0, "stem": "A company's application is experiencing a sudden increase in demand. The company needs to provision Amazon EC2 instances by using a large Amazon Machine Image (AMI). The EC2 instances must run in an Auto Scaling group. The company needs a solution that provides minimum initialization latency to meet the demand. Which solution will meet these requirements?", "opts": {"A": "Use the Amazon EC2 register-image command to create a new AMI from a snapshot. Use AWS Step Functions to replace the AMI in the Auto Scaling group.", "B": "Set up Amazon Elastic Block Store (Amazon EBS) fast snapshot restore (FSR) for a snapshot. Use the snapshot to provision a new AMI. Replace the AMI in the Auto Scaling group with the new AMI", "C": "Use Amazon Data Lifecycle Manager to create a copy of the AMI and define lifecycle rules. Create an AWS Lambda function that modifies the AMI copy in the Auto Scaling group.", "D": "Use an Amazon EventBridge rule to invoke AWS Backup lifecycle policies to provision instances from the AMI. Configure Auto Scaling group capacity limits as an event source in EventBridge."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon EBS** ব্যবহার করা হয়েছে। একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 41, "set": 0, "stem": "A company hosts an application on an Amazon EC2 instance. The application needs to access a MySQL database that the company hosts on a second EC2 instance. The EC2 instances are in separate VPCs within the same AWS account. The traffic between the application and MySQL database needs to be secure and private. What combination of steps will meet these requirements? (Select TWO.)", "opts": {"A": "Configure a VPC peering connection and routing between the VPCS", "B": "Configure the application to use Amazon RDS Proxy to access the MySQL database", "C": "Configure the MySQL instance to use an SSL certificate.", "D": "Ensure the public IP address of the application EC2 instance is allowed in the ACL of the VPC that contains the MySQL instance", "E": "Ensure the security group ID of the application EC2 instance is allowed in the ACL of the VPC that contains the MySQL instance."}, "ans": ["A", "C"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** এখানে **VPC Peering** ব্যবহার করা হয়েছে। দুটি VPC-এর মধ্যে সরাসরি private সংযোগ।\n✅ **সঠিক উত্তর C:** Configure the MyS
