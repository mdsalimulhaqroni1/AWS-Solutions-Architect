 Review the findings with the security team."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** দুষ্ট কার্যকলাপ শনাক্ত, sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর B:** এখানে **Amazon Macie** ব্যবহার করা হয়েছে। S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে। এর সঙ্গে **Amazon GuardDuty** — AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS CloudTrail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 255, "set": 5, "stem": "A company temporarily stages transactional datasets in an Amazon S3 bucket before the company moves the datasets to their final destinations. Some datasets include personally identifiable information (PII). The company must remove Pll data during staging before the company moves the datasets to their destinations. A solutions architect needs to configure Amazon Macie to continuously monitor the datasets. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Create an AWS Lambda function to launch an Amazon Macie discovery job when a new dataset is stored in the target S3 bucket if a Macie discovery job is not already running. Create a second Lambda function to remove the Pll data that the Macie discovery job finds.", "B": "Set up Amazon Macie automated sensitive data discovery. Create an AWS Lambda function to remove the Pll data that Macie finds. Configure an Amazon EventBridge nule to invoke the Lambda function when Macie discovers Pll data.", "C": "Schedule a daily Amazon Macie discovery job. Create an AWS Lambda function to run once every day to remove the Pll data that the daily Macie job finds.", "D": "Create an AWS Lambda function that runs once each day to list all datasets that are saved to the S3 bucket every day. Call Amazon Macie on the list of datasets. Create a second Lambda function to remove the Pll data that Macie finds. Configure an Amazon EventBridge rule to invoke the Pll removal Lambda function every day."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর B:** এখানে **Amazon Macie** ব্যবহার করা হয়েছে। S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Macie): এই সেবা ভিন্ন কাজের — S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 256, "set": 5, "stem": "A company is running a critical workload on an Amazon RDS DB instance. The company needs the DB instance to be highly available. The company requires a recovery time of less than 5 minutes. Which solution will meet these requirements?", "opts": {"A": "Create a read replica of the DB instance.", "B": "Use AWS CloudFormation to create a template of the DB instance.", "C": "Take periodic snapshots of the DB instance. Store the snapshots in Amazon S3.", "D": "Modify the DB instance to use a Multi-AZ deployment."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** Modify the DB instance to use a Multi-AZ deployment.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 257, "set": 5, "stem": "A company is using Amazon CloudFront with its website. The company has enabled logging on the CloudFront distribution, and logs are saved in one of the company's Amazon S3 buckets. The company needs to perform advanced analyses on the logs and build visualizations. What should a solutions architect do to meet these requirements?", "opts": {"A": "Use standard SQL queries in Amazon Athena to analyze the CloudFront logs in the S3 bucket. Visualize the results with AWS Glue.", "B": "Use standard SQL queries in Amazon Athena to analyze the CloudFront logs in the S3 bucket. Visualize the results with Amazon QuickSight.", "C": "Use standard SQL queries in Amazon DynamoDB to analyze the CloudFront logs in the S3 bucket. Visualize the results with AWS Glue.", "D": "Use standard SQL queries in Amazon DynamoDB to analyze the CloudFront logs in the S3 bucket. Visualize the results with Amazon QuickSight."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon Athena** ব্যবহার করা হয়েছে। S3-এর ডেটায় serverless SQL query, server লাগে না। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Athena): এই সেবা ভিন্ন কাজের — S3-এর ডেটায় serverless SQL query, server লাগে না। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 258, "set": 5, "stem": "A company runs a three-tier web application in a VPC on AWS. The company deployed an application load balancer (ALB) in a public subnet. The web tier and application tier Amazon EC2 instances are deployed in a private subnet. The company uses a self-managed MySQL database that runs on EC2 instances in an isolated private subnet for the database tier. The company wants a mechanism that will give a DevOps team the ability to use SSH to access all the servers. The company also wants to have a centrally managed log of all connections made to the servers. Which combination of solutions will meet these requirements with the MOST operational efficiency? (Select TWO)", "opts": {"A": "Create a bastion host in the public subnet. Configure security groups in the public, private, and isolated subnets to allow SSH access.", "B": "Create an interface VPC endpoint for AWS Systems Manager Session Manager. Attach the endpoint to the VPC.", "C": "Create an IAM policy that grants access to AWS Systems Manager Session Manager. Attach the IAM policy to the EC2 instances.", "D": "Create a gateway VPC endpoint for AWS Systems Manager Session Manager. Attach the endpoint to the VPC.", "E": "Attach an AmazonSSMManagedInstanceCore AWS managed IAM policy to all the EC2 instance roles."}, "ans": ["B", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর B:** Create an interface VPC endpoint for AWS Systems Manager Session Manager. Attach the endpoint to the VPC.\n✅ **সঠিক উত্তর E:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 259, "set": 5, "stem": "A company wants to build a serverless application in which multiple microservices need to exchange messages. The company needs to ensure that messages that the microservices send to one another are processed exactly once in the exact order the messages are sent. Which solution will meet these requirements in the MOST operationally efficient way?", "opts": {"A": "Create an Amazon SQS FIFO queue. Configure the microservices to use the SQS queue to exchange messages.", "B": "Use Amazon SNS topics to connect the microservices to one another. Subscribe the microservices to the SNS topics. Use the Amazon SNS API to send and receive notifications between microservices", "C": "Create an Amazon SQS standard queue. Connect the microservices to one another by using Amazon EventBridge events that the microservices exchange through the SQS queue.", "D": "Use Amazon Managed Streaming for Apache Kafka (Amazon MSK) on Amazon EC2 instances to deploy the application."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 260, "set": 5, "stem": "A company wants to use Amazon EC2 instances to provide a static website to users all over the world. The company needs to minimize latency for the users. Which solution meets these requirements?", "opts": {"A": "Use EC2 instances in a single Availability Zone.", "B": "Use EC2 instances across multiple Availability Zones in the same AWS Region.", "C": "Use Amazon CloudFront with the EC2 instances configured as the source.", "D": "Use EC2 instances in the same edge location and the same AWS Region."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 261, "set": 5, "stem": "A company must ensure that all Amazon EBS volumes are encrypted. A recent security audit found multiple EBS volumes that were unencrypted. The company has over 100,000 EBS volumes. The company wants to minimize the cost and operational effort required to check encryption on all existing and future EBS volumes. Which solution will meet these requirements?", "opts": {"A": "Call APIs to describe the EBS volumes and to confirm that the EBS volumes are encrypted. Use Amazon EventBridge to schedule an AWS Lambda function to run the API calls on a schedule.", "B": "Create an Amazon EventBridge rule to monitor Amazon EBS createVolume events. Configure the rule to alert administrators if a volume is not encrypted.", "C": "Create an IAM policy that requires the use of tags on EBS volumes. Use AWS Cost Explorer to display resources that are not properly tagged. Encrypt the untagged resources.", "D": "Create an AWS Config rule for Amazon EBS to evaluate whether a volume is encrypted and to flag the volume if it is not encrypted. Set the AWS Config rule's trigger type to be periodic. Set the trigger frequency."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর D:** এখানে **AWS Config** ব্যবহার করা হয়েছে। resource configuration ইতিহাস ও compliance মূল্যায়ন। এর সঙ্গে **Amazon EBS** — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 262, "set": 5, "stem": "A company uses an Amazon RDS for MySQL database with provisioned IOPS in a Multi-AZ deployment. The company recently migrated the database to Amazon DynamoDB tables successfully. However, the company needs to retain the RDS for MySQL database for several months for occasional post-migration testing and debugging. The company took a snapshot of the RDS database immediately after the migration. The RDS database must be available to query within 10 minutes when needed. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use the stop-db-cluster AWS CLI command and the stop-db-instance CLI command to stop the RDS database. Restart the database as needed by using CLI commands.", "B": "Create a new RDS database. Attach Amazon EBS magnetic volumes that contain the original RDS database snapshot to the new database. Terminate the original RDS database.", "C": "Create a new RDS database in a single Availability Zone based on the original RDS database snapshot. Terminate the original RDS database.", "D": "Create an Amazon Aurora MySQL Serverless v2 cluster based on the RDS database snapshot. Terminate the original RDS database."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 263, "set": 5, "stem": "A company hosts a photo sharing web application on AWS. Users upload and share thousands of photos each hour. The company needs a durable storage solution that provides retrieval mechanisms for the photos. Most uploaded photos are not accessed often after 30 days, but the company does not want to delete older photos. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Store the photos in an Amazon EFS file system for immediate use. Use AWS Backup with on- demand backups and point-in-time recovery (PITR) to store photos that are older than 30 days.", "B": "Store the photos in an Amazon S3 bucket. Use Amazon S3 Lifecycle configurations to move photos that are older than 30 days to S3 Intelligent-Tiering.", "C": "Store the photos in Amazon DynamoDB for immediate use. Use AWS Backup with on-demand backups and point-in-time recovery (PITR) to store photos that are older than 30 days.", "D": "Store the photos in Amazon FSx for Lustre for immediate use. Use AWS Backup with continuous backups and point-in-time recovery (PITR) to store photos that are older than 30 days."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, উচ্চ durability।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon FSx for Lustre): এই সেবা ভিন্ন কাজের — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 264, "set": 5, "stem": "A company hosts a database that runs on an Amazon RDS instance that is deployed to multiple Availability Zones. The company periodically runs a script against the database to report new entries that are added to the database. The script that runs against the database negatively affects the performance of a critical application. The company needs to improve application performance with minimal costs. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Add functionality to the script to identify the instance that has the fewest active connections. Configure the script to read from that instance to report the total new entries.", "B": "Create a read replica of the database. Configure the script to query only the read replica to report the total new entries.", "C": "Instruct the development team to manually export the new entries for the day in the database at the end of each day.", "D": "Use Amazon ElastiCache to cache the common queries that the script runs against the database."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** Create a read replica of the database. Configure the script to query only the read replica to report the total new entries.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 265, "set": 5, "stem": "A company deploys an application that consists of an Amazon EC2 instance and an Amazon RDS instance in a Single-AZ configuration. The company deploys both instances without public IP addresses. The company wants to minimize the overall data transfer costs for communication between the EC2 instance and the RDS instance. Which solution will meet this requirement?", "opts": {"A": "Deploy the EC2 instance in the same Availability Zone as the RDS instance.", "B": "Deploy the EC2 instance and the RDS instance in separate Availability Zones within the same AWS Region.", "C": "Configure UDP connectivity between the EC2 instance and the RDS instance.", "D": "Configure IPv6 connectivity between the EC2 instance and the RDS instance."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 266, "set": 5, "stem": "A company is planning to migrate multiple workloads to Amazon EC2 instances and needs to determine an appropriate AWS account structure. The workloads must be isolated from one another and belong to separate business units. The company needs to be able to perform chargeback to the business units by using a consolidated monthly view. Which solution will meet these requirements with the LEAST administrative overhead?", "opts": {"A": "Create a separate standalone AWS account for each business unit. Create a script to call AWS Cost Explorer APIs from each account to perform chargeback.", "B": "Create a single organization in AWS Organizations. Create a member account for each business unit. Use the bill from the organization management account to perform chargeback", "C": "Create a single AWS account for all the business units. Assign tags to the EC2 instances that correspond with the business units. Activate the tags for cost allocation to perform chargeback by using AWS Cost Explorer.", "D": "Create a separate organization in AWS Organizations for each business unit. Use the bill in each organization management account to perform chargeback."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 267, "set": 5, "stem": "A company uses server-side encryption with AWS KMS keys (SSE-KMS) to encrypt objects that the company stores in an Amazon S3 bucket. The company requires all objects in the S3 bucket to be replicated to a secondary AWS account in the same AWS Region. All objects in the source account S3 bucket must be available in the secondary account within several minutes. All replicated object must be immediately accessible. The company has already modified the key policy for the KMS key that encrypts the bucket in the source account to allow access from the secondary account. Which solution will meet these requirements?", "opts": {"A": "Create a new S3 bucket in the secondary account. Configure an AWS PrivateLink connection between the new S3 bucket and the existing S3 bucket Grant PrivateLink permission to access the KMS keys that encrypt the data", "B": "Create an AWS Backup job for the source S3 bucket. Create a backup vault in the secondary AWS account. Configure the backup plan to copy the backup jobs to the new backup vault.", "C": "Create a new S3 bucket in the secondary account. Configure an S3 replication rule on the source bucket to replicate objects to the secondary account. Enable S3 Replication Time Control (S3 RTC).", "D": "Configure an AWS Lambda function in the source account to automatically invoke an Amazon S3 Batch Operations job to copy the objects to the secondary account S3 bucket every five minutes."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 268, "set": 5, "stem": "A company stores a large amount of log files in an Amazon S3 bucket. The company must retain the log files for 10 years. The company accesses the log files frequently during the first 90 days after creation. The company rarely accesses the log files after 90 days. The company wants to optimize storage costs for the files. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Create an S3 Lifecycle configuration to move the logs from the S3 Standard storage class to S3 Glacier Instant Retrieval after 90 days. Set the configuration to expire the logs after 10 years.", "B": "Store the log files in the S3 Intelligent-Tiering storage class. Configure an S3 Lifecycle rule to delete the logs after 10 years.", "C": "Store the data directly in the S3 Glacier Deep Archive storage class. Create an S3 Lifecycle configuration to delete the logs after 10 years", "D": "Create an S3 Lifecycle configuration to move the logs from the S3 Standard storage class to S3 Glacier Deep Archive after 90 days. Set the configuration to expire the logs after 10 years."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 269, "set": 5, "stem": "A finance company uses scheduled scripts to store and visualize stock market data in an Amazon DynamoDB table. The company deletes records after a month to optimize costs. However, the company needs a cost-optimized solution to generate reports and visualizations based on historical data. Which solution will meet these requirements?", "opts": {"A": "Use an integration between DynamoDB and Amazon Redshift to load records directly into Amazon Redshift. Use the built-in Amazon Redshift query engine to generate reports and visualizations.", "B": "Use Amazon Kinesis Data Streams and Amazon Data Firehose to stream DynamoDB records to an Amazon S3 bucket. Load the data into Amazon Redshift. Use the built-in Amazon Redshift query editor to query the data to generate reports and visualizations.", "C": "Use Amazon Kinesis Data Streams and Amazon Data Firehose to stream DynamoDB records to an Amazon S3 bucket. Use Amazon Athena to query the data. Use Amazon QuickSight to generate reports and visualizations.", "D": "Use AWS DMS to continuously copy DynamoDB records into an Amazon RDS database for long- term storage. Use Amazon QuickSight to generate reports and visualizations."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Kinesis Data Streams** ব্যবহার করা হয়েছে। real-time streaming data ingestion ও processing। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 270, "set": 5, "stem": "A company is deploying a new SFTP service. The service consists of Amazon EC2 instances in an Auto Scaling group that spans two Availability Zones and a shared Amazon EFS file system. The service is behind a Network Load Balancer (NLB) that has a security group attached. A solutions architects needs to grant a list of IP address access to the new service. Which solution will meet this requirement?", "opts": {"A": "Edit the default network ACL to add an inbound rule for Port 22 and an outbound rule for Ports 32768-61000 for the subnet that contains the NLB and the Auto Scaling group. Add a rule to deny all other traffic.", "B": "Add an inbound rule to the NLB security group that allows TCP Port 22 traffic from the IP addresses. Add an inbound rule to the security group referenced by the Auto Scaling group that allows TCP Port 22 traffic from the NLB security group.", "C": "Add an inbound rule to the NLB security group that allows TCP Port 22 traffic from the IP addresses. Add an inbound rule to the security group referenced by the Auto Scaling group to allow all traffic from the NLB security group.", "D": "Add an inbound rule to the NLB security group that allows TCP Port 22 from 0.0.0.0/0. Add an inbound rule to the security group referenced by the Auto Scaling group that allows TCP Port 22 traffic from the NLB security group"}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Network Load Balancer (NLB)** ব্যবহার করা হয়েছে। Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 271, "set": 5, "stem": "A company has an application that uses an Amazon RDS for PostgreSQL database. The company is developing an application feature that will store sensitive information for an individual in the database. During a security review of the environment, the company discovers that the RDS DB instance is not encrypting data at rest. The company needs a solution that will provide encryption at rest for all the existing data and for any new data that is entered for an individual. Which combination of steps should the company take to meet these requirements? (Select TWO.)", "opts": {"A": "Create a snapshot of the DB instance. Enable encryption on the snapshot. Use the encrypted snapshot to create a new DB instance, Adjust the application configuration to use the new DB instance.", "B": "Create a snapshot of the DB instance. Create an encrypted copy of the snapshot. Use the encrypted snapshot to create a new DB instance. Adjust the application configuration to use the new DB instance.", "C": "Modify the configuration of the DB instance by enabling encryption. Create a snapshot of the DB instance. Use the snapshot to create a new DB instance. Adjust the application configuration to use the new DB instance.", "D": "Use AWS KMS to create a new default AWS managed aws/rds key. Select this key as the encryption key for operations with Amazon RDS.", "E": "Use AWS KMS to create a new customer managed key. Select this key as the encryption key for operations with Amazon RDS."}, "ans": ["B", "E"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা, sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর B:** Create a snapshot of the DB instance. Create an encrypted copy of the snapshot. Use the encrypted snapshot to create a new DB instance. Adjust the application configuration to use the new DB instance.\n✅ **সঠিক উত্তর E:** এখানে **AWS KMS** ব্যবহার করা হয়েছে। encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 272, "set": 5, "stem": "A company hosts a website on multiple Amazon EC2 instances that run in an Auto Scaling group. Users are reporting slow responses during peak times between 6 PM and 11 PM every weekend. A solutions architect must implement a solution to improve performance during these peak times. What is the MOST operationally efficient solution that meets these requirements?", "opts": {"A": "Create a scheduled Amazon EventBridge rule to invoke an AWS Lambda function to increase the desired capacity before peak times.", "B": "Configure a scheduled scaling action with a recurrence option to change the desired capacity before and after peak times.", "C": "Create a target tracking scaling policy to add more instances when memory utilization is above 70%.", "D": "Configure the cooldown period for the Auto Scaling group to modify desired capacity before and after peak times."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Configure a scheduled scaling action with a recurrence option to change the desired capacity before and after peak times.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 273, "set": 5, "stem": "A company needs to archive an on-premises relational database. The company wants to retain the data. The company needs to be able to run SQL queries on the archived data to create annual reports. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use AWS DMS to migrate the on-premises database to an Amazon RDS instance. Retire the on- premises database. Maintain the RDS instance in a stopped state until the data is needed for reports.", "B": "Set up database replication from the on-premises database to an Amazon EC2 instance. Retire the on-premises database. Make a snapshot of the EC2 instance. Maintain the EC2 instance in a stopped state until the data is needed for reports.", "C": "Create a database backup on premises. Use AWS DataSync to transfer the data to Amazon S3. Create an S3 Lifecycle configuration to move the data to S3 Glacier Deep Archive. Restore the backup to Amazon EC2 instances to run reports.", "D": "Use AWS DMS to migrate the on-premises databases to Amazon S3 in Apache Parquet format. Store the data in S3 Glacier Flexible Retrieval. Use Amazon Athena to run reports."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 274, "set": 5, "stem": "A company wants to migrate an on-premises video processing application to AWS. Processing times range from 5-30 minutes. The application must run multiple jobs in parallel. The application processes videos that users upload to an Amazon S3 bucket. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Configure the S3 bucket to send S3 event notifications to an Amazon SQS standard queue. Deploy the application on an Amazon ECS cluster. Configure automatic scaling for AWS Fargate tasks based on the SQS queue size.", "B": "Configure the S3 bucket to send 83 event notifications to an Amazon SQS FIFO queue. Deploy the application on Amazon EC2 instances. Create an Auto Scaling group to scale based on the SQS queue size.", "C": "Configure the S3 bucket to send S3 event notifications to an Amazon SQS standard queue. Deploy the application as an AWS Lambda function. Configure the Lambda function to poll the SQS queue.", "D": "Configure the S3 bucket to send S3 event notifications to an Amazon SNS topic. Deploy the application as an AWS Lambda function. Configure the SNS topic to invoke the Lambda function."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **Amazon ECS** — AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 275, "set": 5, "stem": "A company regularly receives route status updates from its delivery trucks as events in Amazon EventBridge. The company is building an API-based application in a VPC that will consume and process the events to create a delivery status dashboard. The API application must not be available by using public IP addresses because of security and compliance requirements. How should the company send events from EventBridge to the API application?", "opts": {"A": "Create an AWS Lambda function that runs in the same VPC as the API application. Configure the function as an EventBridge target. Use the function to send events to the APL.", "B": "Create an internet-facing Application Load Balancer (ALB) in front of the API application. Associate a security group with rules that block access from all external sources except for EventBridge. Configure the ALB as an EventBridge target.", "C": "Create an internet-facing Network Load Balancer (NLB) in front of the API application. Associate a security group with rules that block access from all external sources except for EventBridge. Configure the NLB as an EventBridge target.", "D": "Use the application API endpoint in the VPC as a target for EventBridge. Send events directly to the application API endpoint from EventBridge."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 276, "set": 5, "stem": "A software as a service (SaaS) company hosts an application on AWS. The application uses AWS Lambda functions for processing and an Amazon Aurora Multi-AZ cluster as a backend database. Because of increased traffic, the number of concurrent Lambda executions has increased recently. The existing Aurora database is not able to support the high volume of read and write connections in parallel. A solutions architect needs to design a solution to efficiently manage the incoming connections. The solution must also provide automatic failover for the Aurora database. Which solution will meet these requirements?", "opts": {"A": "Enable Aurora auto scaling. Use read replicas to handle the increased traffic. Promote a read replica to the primary database in the event of a database failure", "B": "Implement custom connection pooling in the Lambda functions. Use Aurora automatic failover to handle failure of the primary database.", "C": "Use an Amazon API Gateway HTTP API as a proxy. Forward the requests for the application from the Lambda functions to the Aurora database to handle connections. Use Aurora automatic failover to handle failure of the primary database.", "D": "Create an RDS Proxy. Configure the Lambda functions to connect to the RDS Proxy. Use RDS Proxy automatic failover to handie failure of the primary database."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর D:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 277, "set": 5, "stem": "A company wants to deploy its containerized application workloads to a VPC across three Availability Zones. The company needs a solution that is highly available across Availability Zones. The solution must require minimal changes to the application. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use Amazon ECS. Configure Amazon ECS Service Auto Scaling to use target tracking scaling. Set the minimum capacity to 3. Set the task placement strategy type to spread with an Availability Zone attribute.", "B": "Use Amazon EKS self-managed nodes. Configure Application Auto Scaling to use target tracking scaling. Set the minimum capacity to 3.", "C": "Use Amazon EC2 Reserved Instances. Launch three EC2 instances in a spread placement group. Configure an Auto Scaling group to use target tracking scaling. Set the minimum capacity to 3.", "D": "Use an AWS Lambda function. Configure the Lambda function to connect to a VPC. Configure Application Auto Scaling to use Lambda as a scalable target. Set the minimum capacity to 3."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 278, "set": 5, "stem": "A company is designing a new internal web application in the AWS Cloud. The new application must securely retrieve and store multiple employee usernames and passwords from an AWS managed service. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Store the employee credentials in AWS Systems Manager Parameter Store. Use AWS CloudFormation and the BatchGetSecretValue API to retrieve usernames and passwords from Parameter Store.", "B": "Store the employee credentials in AWS Secrets Manager. Use AWS CloudFormation and AWS Batch with the BatchGetSecretValue API to retrieve the usernames and passwords from Secrets Manager.", "C": "Store the employee credentials in AWS Systems Manager Parameter Store. Use AWS CloudFormation and AWS Batch with the BatchGetSecretValue API to retrieve the usernames and passwords from Parameter Store.", "D": "Store the employee credentials in AWS Secrets Manager. Use AWS CloudFormation and the BatchGetSecretValue API to retrieve the usernames and passwords from Secrets Manager."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** Store the employee credentials in AWS Secrets Manager. Use AWS CloudFormation and the BatchGetSecretValue API to retrieve the usernames and passwords from Secrets Manager.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 279, "set": 5, "stem": "A company uses an organization in AWS Organizations to manage multiple AWS accounts. The company is migrating users from IAM to AWS IAM Identity Center. The company wants to ensure that no new IAM users can be created in any of the member accounts. The company wants to allow only existing IAM users to have access to the accounts. Which solution will meet these requirements?", "opts": {"A": "Create a service control policy (SCP) that denies the iam:CreateUser action. Apply the SCP to all the member accounts in the organization.", "B": "Create an IAM policy that denies all IAM write operations. Attach the policy to all the users.", "C": "Create an IAM group in each account. Attach a policy that denies the iam:CreateAccessKey action to the IAM group. Add the existing IAM users to the IAM group.", "D": "Create a permissions boundary that denies the iam:CreateAccessKey action. Attach the permissions boundary to all IAM users and IAM groups in the organization."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Service Control Policy (SCP)** ব্যবহার করা হয়েছে। Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 280, "set": 5, "stem": "A company hosts an ecommerce application on AWS by using Amazon EC2 instances. The EC2 instances are spread across three Availability Zones behind an Application Load Balancer (ALB). The EC2 instances are in an Auto Scaling group. Some application users report that the application occasionally directs users who have already authenticated to the login page. The users must log in again. The company needs a solution that will prevent the application from redirecting authenticated users to the login page Which solution will meet this requirement?", "opts": {"A": "Manually terminate the EC2 instances. Wait for the Auto Scaling group to launch new EC2 instances automatically.", "B": "Configure the ALB to direct user activities to the appropriate EC2 instance through the IPv4 IP address of the instance that is registered as a target in the target group", "C": "Apply session affinity with application-based stickiness at the target group level.", "D": "Configure the ALB to direct user activities to just one EC2 instance that is registered as a target in the target group"}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Apply session affinity with application-based stickiness at the target group level.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 281, "set": 5, "stem": "A company deploys an application on Amazon EC2 Spot Instances. The company observes frequent unavailability issues that affect the application's output. The application instances all use the same instance type in a single Availability Zone. The application architecture does not require the use of any specific instance family. The company needs a solution to improve the availability of the application Which combination of steps will meet this requirement MOST cost-effectively? (Select THREE)", "opts": {"A": "Create an EC2 Auto Scaling group that includes a mix of Spot Instances and a base number of On-Demand Instances.", "B": "Create EC2 Capacity Reservations. B.", "C": "Use the lowest price allocation strategy for Spot Instances", "D": "Specify similarly sized instance types and Availability Zones for the Spot instances.", "E": "Use a different instance type for the web application. F. Use the price capacity optimized strategy for Spot Instances."}, "ans": ["A", "D", "E"], "sel": 3, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n✅ **সঠিক উত্তর D:** Specify similarly sized instance types and Availability Zones for the Spot instances.\n✅ **সঠিক উত্তর E:** Use a different instance type for the web application. F. Use the price capacity optimized strategy for Spot Instances.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 282, "set": 5, "stem": "An ecommerce company hosts an application on AWS across multiple Availability Zones. The application experiences uniform load throughout most days. The company hosts some components of the application in private subnets. The components need to access the internet to install and update patches. A solutions architect needs to design a cost-effective solution that provides secure outbound internet connectivity for private subnets across multiple Availability Zones. The solution must maintain high availability Which solution will meet these requirements?", "opts": {"A": "Deploy one NAT gateway in each Availability Zone. Configure the route table for each private subnet within an Availability Zone to route outbound traffic through the NAT gateway in the same Availability Zone.", "B": "Place one NAT gateway in a designated Availability Zone within the VPC. Configure the route tables of the private subnets in each Availability Zone to direct outbound traffic specifically through the NAT gateway for internet access.", "C": "Deploy an Amazon EC2 instance in a public subnet. Configure the EC2 instance as a NAT instance. Set up the instance with security groups that allow inbound traffic from private subnets and outbound internet access. Configure route tables to direct traffic from the private subnets through the NAT instance,", "D": "Use one NAT Gateway in a Network Load Balancer (NLB) target group. Configure private subnets in each Availability Zone to route traffic to the NLB for outbound internet access."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** Deploy one NAT gateway in each Availability Zone. Configure the route table for each private subnet within an Availability Zone to route outbound traffic through the NAT gateway in the same Availabili\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 283, "set": 5, "stem": "The company must encrypt finance reports that are stored in an Amazon S3 bucket. An AWS Lambda function must be able to decrypt the reports dynamically. An IAM group that the company's security administrators use must manage the encryption keys. The IAM group must manage key rotation, deletion, and creation. The company must grant access to the keys according to the principle of least privilege. Which solution will meet these requirements?", "opts": {"A": "Use server-side encryption with Amazon S3 managed keys (SSE-S3) to encrypt the reports in the S3 bucket. Use IAM policies to allow the Lambda function execution role to decrypt the reports.", "B": "Use customer managed AWS KMS keys to encrypt the reports in the S3 bucket. Use IAM policies to grant the Lambda function execution role permissions to decrypt the files. Use IAM policies to grant the security administrator IAM group permissions to perform only kms:CreateKey, kms:DeleteKey, and kms:RotateKey actions on KMS keys.", "C": "Use server-side encryption with AWS KMS keys to encrypt the reports in the S3 bucket. Use IAM policies to grant the Lambda function execution role permissions to decrypt the reports. Grant the security administrator IAM group permissions to generate KMS keys.", "D": "Use customer-managed AWS KMS keys to encrypt the reports in the S3 bucket. Grant the Lambda function execution role and the security administrator IAM group full access to perform all transactions on KMS keys."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর B:** এখানে **AWS KMS** ব্যবহার করা হয়েছে। encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 284, "set": 5, "stem": "A company runs a web application on Amazon EC2 instances behind an Application Load Balancer (ALB). The application experiences periodic spikes in malicious traffic attempts from attackers. The application receives mostly SQL injection and cross-site scripting (XSS) attacks from external sources. The company requires a solution to protect the application from the attacks. The solution must have minimal effect on application performance Which solution will meet these requirements?", "opts": {"A": "Deploy AWS WAF on the ALB. Configure rules to block malicious traffic activity. Enable AWS Shield Advanced", "B": "Use AWS CloudTrail data events to monitor the ALB traffic, Create alerts for suspicious incoming requests. Update the application's security group to drop malicious IP addresses.", "C": "Install an intrusion detection system (IDS) on each EC2 instance to analyze and block malicious traffic at the host level. Update the ALB to pass all traffic directly to the instances for analysis.", "D": "Configure a network ACL, to drop traffic from known malicious IP ranges. Enable Amazon GuardDuty."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** দুষ্ট কার্যকলাপ শনাক্ত।\n✅ **সঠিক উত্তর A:** Deploy AWS WAF on the ALB. Configure rules to block malicious traffic activity. Enable AWS Shield Advanced\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS CloudTrail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon GuardDuty): এই সেবা ভিন্ন কাজের — AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 285, "set": 5, "stem": "A company is using an on-premises solution to provide staff with SMB and NFS file shares to store and retrieve data. The company wants to use the AWS Cloud to expand storage capacity. The company must be able to access the data on-premises. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Deploy two AWS Storage Gateway hardware appliances on premises. Ensure that one appliance is an S3 File Gateway", "B": "Deploy an AWS Storage Gateway virtual machine (VM) on premises as an S3 File Gateway.", "C": "Deploy two AWS Storage Gateway virtual machines (VMs) on premises. Ensure that one VM is an S3 File Gateway.", "D": "Deploy two AWS Storage Gateway gateways to Amazon EC2 instances. Ensure that one instances is configured as an S3 File Gateway"}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **AWS Storage Gateway** ব্যবহার করা হয়েছে। on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 286, "set": 5, "stem": "A company wants to deploy a new public web application on AWS. The application includes a web server tier that uses Amazon EC2 instances. The application also includes a database tier that uses an Amazon RDS for MySQL DB instance. The application must be secure and accessible for global customers that have dynamic IP addresses. How should a solutions architect configure the security groups to meet these requirements?", "opts": {"A": "Configure the security group for the web servers to allow inbound traffic on port 443 from 0.0.0.0/0. Configure the security group for the DB instance to allow inbound traffic on port 3306 from the security group of the web servers.", "B": "Configure the security group for the web servers to allow inbound traffic on port 443 from the IP addresses of the customers. Configure the security group for the DB instance to allow inbound traffic on port 3306 from the security group of the web servers.", "C": "Configure the security group for the web servers to allow inbound traffic on port 443 from the IP addresses of the customers. Configure the security group for the DB instance to allow inbound traffic on port 3306 from the IP addresses of the customers.", "D": "Configure the security group for the web servers to allow inbound traffic on port 443 from 0.0.0.0/0. Configure the security group for the DB instance to allow inbound traffic on port 3306 from."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর A:** Configure the security group for the web servers to allow inbound traffic on port 443 from 0.0.0.0/0. Configure the security group for the DB instance to allow inbound traffic on port 3306 from the se\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 287, "set": 5, "stem": "A company wants to use a cloud storage service to store text and media files that are associated with active global marketing campaigns. The storage solution must be highly available. The company must protect the solution with a backup system that reduces the possibility of data loss as much as possible. Which solution will meet these requirements?", "opts": {"A": "Store the text and media files on an Amazon EC2 instance with an instance store volume. Configure the instance as an AWS Global Accelerator endpoint. Use AWS Backup to take daily backups of the instance,", "B": "Store the text and media files in an Amazon S3 bucket. Set the S3 bucket as the origin for an Amazon CloudFront distribution. Use AWS Backup to take continuous backups of the S3 bucket.", "C": "Store the text and media files on an Amazon EC2 instance with an Amazon EBS volume. Set the EBS volume as the origin for an Amazon CloudFront distribution. Use AWS Backup to take continuous backups of the EBS volume.", "D": "Store the text and media files in an AWS Lambda function with ephemeral storage. Set the function as the origin for an Amazon CloudFront distribution. Use AWS Backup to take continuous backups of the Lambda function."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, high availability / fault tolerance।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এর সঙ্গে **AWS Backup** — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 288, "set": 5, "stem": "A company is designing a website that displays stock market prices to users. The company wants to use Amazon ElastiCache (Redis OSS) for the data caching layer. The company needs to ensure that the website's data caching layer can automatically fail over to another node if necessary Which solution will meet this requirement?", "opts": {"A": "Enable read replicas in ElastiCache (Redis OSS). Promote the read replica when necessary.", "B": "Enable Multi-AZ in ElastiCache (Redis OSS). Fail over to a second node when necessary.", "C": "Export a backup of the ElastiCache (Redis OSS) cache to an Amazon S3 bucket. Restore the cache to a second cluster when necessary.", "D": "Export a backup of the ElastiCache (Redis OSS) cache by using AWS Backup. Restore the cache to a second cluster when necessary."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon ElastiCache** ব্যবহার করা হয়েছে। in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 289, "set": 5, "stem": "A company is building a containerized application on AWS. The application uses the Linux operating system. The company needs to provide a persistent storage solution for the application. The company expects the storage solution to have varying data access patterns. The solution must have native storage tiering capabilities and must be scalable. The solution must not require the company to provision storage upfront. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use Amazon FSx for NetApp ONTAP to set up persistent file storage that uses SSD storage for performance. Use the capacity pool storage tier.", "B": "Use an Amazon EFS file system in Elastic mode. Use the Intelligent Tiering lifecycle management feature.", "C": "Configure two Amazon FSx for Windows File Server file systems. Use an SSD-based file system for performance and an HDD-based file system for low-cost storage", "D": "Launch an Amazon EC2 instance that is backed by an Amazon EBS volume. Use the EBS volume to create a file share."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon FSx for NetApp ONTAP): এই সেবা ভিন্ন কাজের — NFS, SMB ও iSCSI একসাথে সাপোর্টকারী multi-protocol file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon FSx for Windows File Server): এই সেবা ভিন্ন কাজের — Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 290, "set": 5, "stem": "A company created four AWS Lambda functions that connect to a relational database server that runs on an Amazon RDS instance. The company must automatically change the database password every 30 days. Which solution will meet these requirements MOST securely?", "opts": {"A": "Store the database credentials in the environment variables of the Lambda function. Deploy the Lambda function with the new credentials every 30 days. OA", "B": "Store the database credentials in AWS Secrets Manager, Configure a 30-day rotation schedule for the credentials.", "C": "Store the database credentials in AWS Systems Manager Parameter Store secure strings. Configure a 30-day schedule for the secure strings.", "D": "Store the database credentials in an Amazon S3 bucket that uses server-side encryption with customer-provided encryption keys (SSE-C). Configure a 30-day key rotation schedule for the customer key."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Store the database credentials in AWS Secrets Manager, Configure a 30-day rotation schedule for the credentials.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 291, "set": 5, "stem": "A company is building a new application to process documents that users upload. The application must send processed documents back to users in email messages. The application must store uploaded documents durably for up to 18 months. The application must process documents as soon as users upload them. The application must include a mechanism to store any documents that fail to process. The company wants to use Amazon SQS queues and Amazon SNS topics Which combination of actions will meet these requirements with the LEAST management overhead? (Select THREE)", "opts": {"A": "Configure an SQS dead-letter queue to store any messages that the Amazon EC2 Auto Scaling group does not process.", "B": "Store the uploaded documents in an Amazon S3 bucket. Configure an S3 event notification to publish a message to an SNS topic for each new document.", "C": "Subscribe an SQS queue to an SNS topic. Configure the topic to insert messages into the queue. Configure an AWS Lambda function to consume the queue.", "D": "Configure an SQS dead-letter queue to store any messages that the AWS Lambda function does not process.", "E": "Subscribe an SQS queue to an SNS topic. Configure the topic to insert messages into the queue. Configure an Amazon EC2 Auto Scaling group to consume the queue. F. Store the uploaded documents in an Amazon Kinesis data stream. Use an AWS Lambda function to read data from the stream and to send messages to an SNS topic."}, "ans": ["B", "C", "D"], "sel": 3, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), উচ্চ durability।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n✅ **সঠিক উত্তর C:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 292, "set": 5, "stem": "A company is migrating applications from an on-premises Microsoft Active Directory that the company manages to AWS. The company deploys the applications in multiple AWS accounts. The company uses AWS Organizations to manage the accounts centrally. The company's security team needs a single sign-on solution across all the company's AWS accounts. The company must continue to manage users and groups that are in the on-premises Active Directory. Which solution will meet these requirements?", "opts": {"A": "Create an Enterprise Edition Active Directory in AWS Managed Microsoft AD. Configure the Active Directory to be the identity source for AWS IAM Identity Center. D", "B": "Enable AWS IAM Identity Center. Configure a two-way forest trust relationship to connect the company's self-managed Active Directory with IAM Identity Center by using AWS Managed Microsoft AD.", "C": "Use AWS Directory Service and create a two-way trust relationship with the company's self- managed Active Directory.", "D": "Deploy an identity provider (IdP) on Amazon EC2. Link the IdP as an identity source within AWS IAM Identity Center."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS IAM Identity Center): এই সেবা ভিন্ন কাজের — কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 293, "set": 5, "stem": "A company hosts a web application on Amazon EC2 instances behind an Application Load Balancer (ALB). The company uses Amazon Route 53 to route traffic. The company also has a static website that is configured in an Amazon S3 bucket. A solutions architect must use the static website as a backup to the web application. The failover to the static website must be fully automated. Which combination of actions will meet these requirements? (Select TWO.)", "opts": {"A": "Create a primary failover routing policy record. Configure the value to be the ALB", "B": "Create an AWS Lambda function to switch from the primary website to the secondary website when the health check fails.", "C": "Create a primary failover routing policy record. Configure the value to be the ALB Associate the record with a Route 53 health check.", "D": "Create a secondary failover routing policy record. Configure the value to be the static website. Associate the record with a Route 53 health check.", "E": "Create a secondary failover routing policy record. Configure the value to be the static website."}, "ans": ["C", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon Route 53** ব্যবহার করা হয়েছে। DNS ও routing policy (latency, failover, geolocation) + health check।\n✅ **সঠিক উত্তর E:** Create a secondary failover routing policy record. Configure the value to be the static website.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 294, "set": 5, "stem": "A company hosts an application on AWS that uses an Amazon S3 bucket and an Amazon Aurora database. The company wants to implement a multi-Region disaster recovery (DR) strategy that minimizes potential data loss. Which solution will meet these requirements?", "opts": {"A": "Create an Aurora read replica in a second Availability Zone within the same AWS Region. Enable S3 Versioning for the bucket.", "B": "Create an Aurora read replica in a second AWS Region. Configure AWS Backup to create continuous backups of the S3 bucket to a second bucket in a second Availability Zone.", "C": "Enable Aurora native database backups across multiple AWS Regions. Use S3 cross-account backups within the company's local Region", "D": "Migrate the database to an Aurora global database. Create a second 53 bucket in a second Region. Configure Cross-Region Replication."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 295, "set": 5, "stem": "A company uses an organization in AWS Organizations to manage multiple AWS accounts. The company is building a product that spans multiple accounts. Developers at the company who work in multiple accounts need to give AWS Lambda functions access to write logs to an Amazon S3 bucket that is in a central logging account. Which solution will meet this requirement in the MOST secure way?", "opts": {"A": "Create an IAM role in the central logging account that has write access to the S3 bucket. Create a trust policy that allows AWS Lambda functions in accounts within the organization to assume the IAM role.", "B": "Create an IAM user in the central logging account that has full access to the S3 bucket. Create an S3 bucket policy that allows the IAM user to write to the S3 bucket. Use the IAM user access key and secret key credentials as environment variables.", "C": "Create an S3 bucket policy for the S3 bucket in the central logging account. Configure the bucket policy to allow full access for AWS Lambda", "D": "Create an IAM user for each developer in the central logging account. Create an S3 bucket policy for the S3 bucket in the central logging account that allows full access for each IAM user."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 296, "set": 5, "stem": "A company is designing an application on AWS that provides real-time dashboards. The dashboard data comes from on-premises databases that use a variety
