of schemas and formats. The company needs a solution to transfer and transform the data to AWS with minimal latency. Which solution will meet these requirements?", "opts": {"A": "Integrate the dashboard with Amazon Managed Streaming for Apache Kafka (Amazon MSK) to transfer and transform the data from the on-premises databases to the dashboards.", "B": "Use Amazon Data Firehose to transfer the data to an Amazon S3 Bucket. Configure the dashboard application to import new data from the S3 bucket periodically.", "C": "Use AWS DMS Schema Conversion to consolidate the on-premises databases into a single AWS database. Use an AWS Lambda function that is scheduled by Amazon EventBridge to transfer data from the consolidated database to the dashboard application.", "D": "Use AWS DataSync to transfer data from the source databases to the dashboard application continuously. Configure the dashboard application to import data from DataSync."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** Integrate the dashboard with Amazon Managed Streaming for Apache Kafka (Amazon MSK) to transfer and transform the data from the on-premises databases to the dashboards.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 297, "set": 5, "stem": "A solutions architect is using Amazon EC2 instances to host an application. The solutions architect needs to grant permissions for the application to access an Amazon DynamoDB table. Which solution will meet this requirement?", "opts": {"A": "Create access keys to access the DynamoDB table. Assign the access keys to the EC2 instance profile.", "B": "Create an EC2 key pair to access the DynamoDB table. Assign the key pair to the EC2 instance profile.", "C": "Create an IAM user to access the DynamoDB table. Assign the IAM user to the EC2 instance profile.", "D": "Create an IAM role to access the DynamoDB table. Assign the IAM role to the EC2 instance profile."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 298, "set": 5, "stem": "A company is moving its on-premises Oracle database to Amazon Aurora PostgreSQL. The database has several applications that write to the same tables. The applications need to be migrated one by one with a month in between each migration. Management has expressed concerns that the database has a high number of reads and writes. The data must be kept in sync across both databases throughout the migration. What should a solutions architect recommend?", "opts": {"A": "Use AWS DataSync for the initial migration. Use AWS DMS to create a change data capture (CDC) replication task and a table mapping to select all tables.", "B": "Use AWS DataSync for the initial migration. Use AWS DMS to create a full load plus change data capture (CDC) replication task and a table mapping to select all tables.", "C": "Use the AWS SCT with AWS DMS using a memory optimized replication instance. Create a full load plus change data capture (CDC) replication task and a table mapping to select all tables.", "D": "Use the AWS SCT with AWS DMS using a compute optimized replication instance. Create a full load plus change data capture (CDC) replication task and a table mapping to select the largest tables."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Use the AWS SCT with AWS DMS using a memory optimized replication instance. Create a full load plus change data capture (CDC) replication task and a table mapping to select all tables.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 299, "set": 5, "stem": "A company has a batch processing application that runs every day. The process typically takes an average 3 hours to complete. The application can handle interruptions and can resume the process after a restart. Currently, the company runs the application on Amazon EC2 On-Demand Instances. The company wants to optimize costs while maintaining the same performance level. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Purchase a 1-year EC2 Instance Savings Plan for the appropriate instance family and size to meet the requirements of the application.", "B": "Use EC2 On-Demand Capacity Reservations based on the appropriate instance family and size to meet the requirements of the application. Run the EC2 instances in an Auto Scaling group.", "C": "Determine the appropriate instance family and size to meet the requirements of the application. Convert the application to run on AWS Batch with EC2 On-Demand Instances. Purchase a 1-year Compute Savings Plan.", "D": "Determine the appropriate instance family and size to meet the requirements of the application. Convert the application to run on AWS Batch with EC2 Spot Instances."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 300, "set": 5, "stem": "A company wants to optimize Amazon S3 storage costs for the company's video content. The company needs to archive the video content 6 months after the company creates the content. The company must delete the content after 24 months. Which solution will meet these requirements with the LEAST operational effort?", "opts": {"A": "Use S3 Intelligent-Tiering to transition the content to S3 Glacier Flexible Retrieval after 6 months. Configure an Object Lock retention period of 24 months.", "B": "Create an Amazon EFS lifecycle configuration to transition the content to $3 Glacier Flexible Retrieval after 6 months. Configure a lifecycle rule to expire the objects after 24 months.", "C": "Use AWS DataSync to transition the content to S3 Glacier Deep Archive after 6 months and to expire the objects after 24 months.", "D": "Create an S3 Lifecycle configuration to transition the content to $3 Glacier Flexible Retrieval after 6 months and to expire objects after 24 months."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 301, "set": 6, "stem": "A media company uses an Amazon CloudFront distribution to deliver content over the internet. The company wants only premium customers to have access to the media streams and file content. The company stores all content in an Amazon S3 bucket. The company also delivers content on demand to customers for a specific purpose, such as movie rentals or music downloads Which solution will meet these requirements?", "opts": {"A": "Generate and provide S3 signed cookies to premium customers.", "B": "Generate and provide CloudFront signed URLs to premium customers.", "C": "Use origin access control (OAC) to limit the access of non-premium customers.", "D": "Generate and activate field-level encryption to block non-premium customers."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 302, "set": 6, "stem": "A solutions architect needs to build a log storage solution for a client. The client has an application that produces user activity logs that track user API calls to the application. The application typically produces 50 GB of logs each day. The client needs a storage solution that makes the logs available for occasional querying and analytics. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Store user activity logs in an Amazon S3 bucket. Use Amazon Athena to perform queries and analytics.", "B": "Store user activity logs in an Amazon OpenSearch Service cluster. Use OpenSearch Dashboards to perform queries and analytics.", "C": "Store user activity logs in an Amazon RDS instance. Use an Open Database Connectivity (ODBC) connector to perform queries and analytics.", "D": "Store user activity logs in an Amazon CloudWatch Logs log group. Use CloudWatch Logs Insights to perform queries and analytics."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 303, "set": 6, "stem": "A company is designing a new ecommerce application for a high-traffic retail website. The application needs to process a large volume of customer orders The application must scale to handle spikes in order volume during peak shopping events. Which solution will meet these requirements?", "opts": {"A": "Use a single large Amazon EC2 instance to run processing logic and to store order information. Run a relational database on the same EC2 instance OA", "B": "Use a single Amazon EC2 instance to run processing logic. Control the flow of orders into the EC2 instance by using an Amazon SQS queue. Use an Amazon S3 bucket to store order information.", "C": "Use an Amazon API Gateway HTTP API and an AWS Lambda function to process orders. Use Amazon DynamoDB in on-demand mode to store order information.", "D": "Use an Application Load Balancer (ALB) to distribute order processing traffic across multiple Amazon EC2 instances that run processing logic. Use Amazon Aurora with multiple reader nodes as the database."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 304, "set": 6, "stem": "A company stores sensitive financial information for an application in Amazon RDS for MySQL. The company requires a stateful solution to ensure that only specific on-premises IP address can access the RDS database instances. The company wants to rotate database credentials automatically. The company does not want to hardcode the credentials into the application Which solution will meet these requirements?", "opts": {"A": "Use security groups to allow access only from the specified IP addresses. Store the database credentials in AWS Secrets Manager. Configure automatic rotation for the credentials.", "B": "Use IAM policies to restrict access based on IP address. Manage database credentials in the application code. Configure an AWS Lambda function to rotates the database credentials.", "C": "Use a network ACL to allow access only from the specified IP addresses. Store the database credentials in an encrypted Amazon S3 bucket. Configure an AWS Lambda function to rotate the database credentials.", "D": "Use security groups to allow access only from the specified IP addresses. Store the database credentials in AWS KMS. Configure automatic rotation for the credentials."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর A:** Use security groups to allow access only from the specified IP addresses. Store the database credentials in AWS Secrets Manager. Configure automatic rotation for the credentials.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 305, "set": 6, "stem": "A company is building a critical data processing application that will run on Amazon EC2 instances. The company must not run any two nodes on the same underlying hardware. The company requires at least 99.99% availability for the application. Which solution will meet these requirements?", "opts": {"A": "Deploy the application to one Availability Zone by using a cluster placement group strategy.", "B": "Deploy the application to three Availability Zones by using a spread placement group strategy.", "C": "Deploy the application to three Availability Zones by using a cluster placement group strategy.", "D": "Deploy the application to one Availability Zone by using a partition placement group strategy."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Deploy the application to three Availability Zones by using a spread placement group strategy.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 306, "set": 6, "stem": "An image-hosting company stores images as objects in Amazon S3 buckets. The company must prevent accidental exposure of the objects to the public. All S3 objects in the company's entire AWS account must remain private. Which solution will meet these requirements?", "opts": {"A": "Use Amazon GuardDuty to monitor S3 bucket policies. Create an automatic remediation action rule that uses an AWS Lambda function to remediate any change that makes the objects public.", "B": "Use AWS Trusted Advisor to find publicly accessible S3 buckets. Configure email notifications in Trusted Advisor when a change to S3 bucket policies is detected. Use the AWS CLI to change any S3 bucket policy that Trusted Advisor flags.", "C": "Use AWS Resource Access Manager (AWS RAM) to find publicly accessible S3 buckets. Use Amazon SNS to invoke an AWS Lambda function when AWS RAM detects a change in S3 bucket policies. Configure the Lambda function to programmatically remediate each detected change", "D": "Use the S3 Block Public Access feature at the account level. Deploy the AWS Config s3-account- level-public-access-blocks rule and an AWS Systems Manager document to take automatic remediation actions when the rule is in the non-compliant state."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Config** — resource configuration ইতিহাস ও compliance মূল্যায়ন।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon GuardDuty): এই সেবা ভিন্ন কাজের — AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 307, "set": 6, "stem": "A company that analyzes the stock market has two offices: one in the us-east-1 Region and another in the eu-west-2 Region. The company wants to implement an AWS database solution that can provide fast and accurate updates. The office in eu-west-2 has dashboards with complex analytical queries to display the data. The company will use these dashboards to make buying decisions, so the dashboards must have access to the application data in less than 1 second. Which solution meets these requirements and provides the MOST up-to-date dashboard?", "opts": {"A": "Deploy an Amazon RDS DB instance in us-east-1 with a read replica instance in eu-west-2. Create an Amazon ElastiCache cluster in eu-west-2 to cache data from the read replica to generate the dashboards.", "B": "Use an Amazon DynamoDB global table in us-east-1 with replication into eu-west-2. Use multi- active replication to ensure that updates are quickly propagated to eu-west-2", "C": "Use an Amazon Aurora global database. Deploy the primary DB cluster in us-east-1. Deploy the secondary DB cluster in eu-west-2. Configure the dashboard application to read from the secondary cluster.", "D": "Deploy an Amazon RDS for MySQL DB instance in us-east-1 with a read replica instance in eu- west-2. Configure the dashboard application to read from the read replica."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 308, "set": 6, "stem": "A company is developing a highly available natural language processing (NLP) application. The application handles large volumes of concurrent requests. The application performs NLP tasks such as entity recognition, sentiment analysis, and key phrase extraction on text data. The company needs to store data that the application processes in a highly available and scalable database Which solution will meet these requirements?", "opts": {"A": "Create an Amazon API Gateway REST API endpoint to handle incoming requests. Configure the REST API to invoke an AWS Lambda function for each request. Configure the Lambda function to call Amazon Comprehend to perform NLP tasks on the text data. Store the processed data in Amazon DynamoDB.", "B": "Create an Amazon API Gateway HTTP API endpoint to handle incoming requests. Configure the HTTP API to invoke an AWS Lambda function for each request. Configure the Lambda function to call Amazon Translate to perform NLP tasks on the text data. Store the processed data in Amazon ElastiCache.", "C": "Create an Amazon SQS queue to buffer incoming requests. Deploy the NLP application on Amazon EC2 instances in an Auto Scaling group. Use Amazon Comprehend to perform NLP tasks. Store the processed data in an Amazon RDS database.", "D": "Create an Amazon API Gateway WebSocket API endpoint to handle incoming requests. Configure the WebSocket API to invoke an AWS Lambda function for each request. Configure the Lambda function to call Amazon Textract to perform NLP tasks on the text data. Store the processed data in Amazon ElastiCache"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর A:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon Comprehend** — text থেকে NLP insight (sentiment, entity, PII)।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 309, "set": 6, "stem": "A company is building an application that needs to process real-time streaming data. The application must process and transform the data and then store the data for later analysis. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use Amazon Kinesis Data Streams to ingest streaming data. Configure Amazon EC2 instances to process and transform data records from the data streams. Configure the EC2 instances to store the processed and transformed date, in an Amazon RDS for MySQL database.", "B": "Send streaming data to an Amazon SQS queue. Configure AWS Lambda functions to process the data in the SQS queue. Store the processed data in an Amazon DynamoDB table.", "C": "Use Amazon Kinesis Data Streams to ingest streaming data. Configure an AWS Lambda function to process and transform data records from the data streams. Configure the Lambda function to store the processed and transformed data in an Amazon DynamoDB table.", "D": "Send streaming data to an Amazon SNS topic. Create an application to process the data on an Amazon EC2 instance. Store the processed data in an Amazon ElastiCache (Memcached) cache."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Kinesis Data Streams** ব্যবহার করা হয়েছে। real-time streaming data ingestion ও processing। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 310, "set": 6, "stem": "A company needs to give a globally distributed development team secure access to the company's AWS resources in a way that complies with security policies. The company currently uses an on-premises Active Directory for internal authentication. The company uses AWS Organizations to manage multiple AWS accounts that support multiple projects. The company needs a solution to integrate with the existing infrastructure to provide centralized identity management and access control. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Set up AWS Directory Service to create an AWS managed Microsoft Active Directory on AWS. Establish a trust relationship with the on-premises Active Directory. Use IAM roles that are assigned to Active Directory groups to access AWS resources within the company's AWS accounts.", "B": "Create an IAM user for each developer. Manually manage permissions for each IAM user based on each user's involvement with each project. Enforce multi-factor authentication (MFA) as an additional layer of security.", "C": "Use AD Connector in AWS Directory Service to connect to the on-premises Active Directory. Integrate AD Connector with AWS IAM Identity Center. Configure permissions sets to give each AD group access to specific AWS accounts and resources.", "D": "Use Amazon Cognito to deploy an identity federation solution. Integrate the identity federation solution with the on-premises Active Directory. Use Amazon Cognito to provide access tokens for developers to access AWS accounts and resources."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon Cognito): এই সেবা ভিন্ন কাজের — web/mobile app-এর user authentication ও federation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 311, "set": 6, "stem": "A company has an ecommerce application that users access through multiple mobile apps and web applications. The company needs a solution that will receive requests from the mobile apps and web applications through an API Request traffic volume varies significantly throughout each day. Traffic spikes during sales events. The solution must be loosely coupled and ensure that no requests are lost. Which solution will meet these requirements?", "opts": {"A": "Create an Application Load Balancer (ALB). Create an AWS Elastic Beanstalk endpoint to process the requests. Add the Elastic Beanstalk endpoint to the target group of the ALB.", "B": "Set up an Amazon API Gateway REST API with an integration to an Amazon SQS queue. Configure a dead-letter queue. Create an AWS Lambda function to poll the queue to process the requests.", "C": "Create an Application Load Balancer (ALB). Create an AWS Lambda function to process the requests. Add the Lambda function as a target of the ALB.", "D": "Set up an Amazon API Gateway HTTP API with an integration to an Amazon SNS topic. Create an AWS Lambda function to process the requests. Subscribe the function to the SNS topic to process the requests."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, কোনো request নষ্ট না হওয়া ও পুনরায় process।\n✅ **সঠিক উত্তর B:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 312, "set": 6, "stem": "A company currently runs a Linux-based application in a self-managed Docker container that runs on Amazon EC2 instances. The application runs a lightweight data processing tool that always completes its job within 3 minutes. The company wants an alternative deployment solution for the application to reduce infrastructure management overhead. The company is willing to make any required changes to the container image Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Deploy the application as an AWS Lambda function that uses the container image", "B": "Deploy the application on Amazon EKS with the AWS Fargate launch type.", "C": "Deploy the application on Amazon ECS with the AWS Fargate launch type.", "D": "Deploy the application as a custom Amazon Machine Image (AMI) by using AWS Batch."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 313, "set": 6, "stem": "A company runs a web application that uses an AWS Lambda function. The company has a strict latency requirement for the Lambda function. A solutions architect must configure the Lambda function to meet the latency requirement in a cost-effective way. Which solution will meet these requirements?", "opts": {"A": "Use AWS WAF to block excessive invocations of the Lambda function", "B": "Configure the Lambda function to use the lowest memory setting that will meet the company's latency requirement.", "C": "Configure the Lambda function to run on a compute-optimized instance.", "D": "Configure reserved concurrency for the Lambda function."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 314, "set": 6, "stem": "A university has a student enrollment application that runs on Amazon EC2 On-Demand Instances. There are only two windows of time each year when enrollment is open. Each enrollment window lasts for 2 weeks. The application requires high uptime during the enrollment windows. The university cannot make any code changes Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Deploy an Auto Scaling group with scheduled actions to scale the EC2 instances automatically based on the enrollment window dates.", "B": "Change the purchasing option for the EC2 instances to use Spot Instances with the most cost- effective allocation strategy.", "C": "Purchase an EC2 Instance Savings Plan for all the instances that are in use.", "D": "Reconfigure the application to run on AWS Lambda functions."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 315, "set": 6, "stem": "A company stores 5 PB of archived data on physical tapes in an on-premises data center. The company needs to retain the data for 10 years. The company does not want to change an existing backup workflow. The data center that stores the tapes has a 10 Gbps AWS Direct Connect connection to an AWS Region. The company wants to migrate the data to AWS as soon as possible. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use an on-premises backup application to read the data from the tapes. Use local storage to stage the data temporarily, Use AWS DataSync to migrate the data to Amazon S3 Glacier Flexible Retrieval storage.", "B": "Use an on-premises backup application to read the data from the tapes. Use the backup application to write directly to Amazon S3 Glacier Deep Archive storage.", "C": "Order multiple AWS Snowball Edge devices. Copy the physical tapes to virtual tapes on the Snowball Edge devices. Ship the Snowball Edge devices to AWS. Create an S3 Lifecycle policy to move the tapes to Amazon S3 Glacier Instant Retrieval storage.", "D": "Configure an on-premises AWS Storage Gateway Tape Gateway. Create virtual tapes on AWS. Use backup software to copy the physical tapes to the virtual tapes. Move the virtual tapes to Amazon S3 Glacier Deep Archive storage."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **AWS Storage Gateway** ব্যবহার করা হয়েছে। on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Snowball): এই সেবা ভিন্ন কাজের — বিশাল পরিমাণ ডেটা offline/physical device-এ AWS-এ স্থানান্তর। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 316, "set": 6, "stem": "A company is developing an ecommerce application on AWS. The company wants to be able to send user notifications when the status of an order change. The company wants to ensure that the application is highly available and scalable. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Store order data in an Amazon Aurora MySQL, cluster. Configure an AWS Lambda function to monitor database changes and to use AWS User Notifications to send notifications.", "B": "Store order data in a MySQL database that runs on an Amazon EC2 instance. Configure a script to run on the EC2 instance to poll the database for any changes and to use Amazon SNS to send notifications.", "C": "Store order data in an Amazon DynamoDB table. Use Amazon DynamoDB Streams to invoke an AWS Lambda function to send an Amazon SNS notification when an order status changes.", "D": "Store order data in an Amazon EFS file system. Configure a container that runs on AWS Fargate to poll the file system for any changes and to use AWS User Notifications to send notifications."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 317, "set": 6, "stem": "A company has an organization in AWS Organizations that includes a development organizational unit (OU) and a production OU, A solutions architect wants to create a service control policy (SCP) to allow development users to run Amazon EC2 instances in the development OU. The solutions architect wants to prohibit future IAM policies from overriding the configuration. Which solution will meet these requirements in the MOST secure way?", "opts": {"A": "Create an SCP that denies ec2: * permissions for all resources. Attach the SCP to the development OU. Configure an IAM policy that allows development users to use ec2: RunInstances actions to run EC2 instances.", "B": "Create an SCP that denies ec2: * permissions for all resources. Attach the SCP to the organization's root OU. Create a second SCP that allows ec2 RunInstances permissions. Attach the second SCP to the development OU.", "C": "Create an SCP that denies ec2* permissions for all resources. Attach the SCP to the production OU. Create an IAM user group named AllDevUsers for all development users. Create an IAM policy in the development OU and attach it to AllDevUsers. Configure the policy to allow ec2: Runinstances permissions with a condition that the StringNotEquals parameter is equal to AllDevUsers.", "D": "Create an SCP that denies ec2: * permissions for all resources. Attach the SCP to the production OU. Create an IAM role named DevAdminRole. Attach a permissions boundary to DevAdminRole to allow only the ec2 RunInstances action. Create an IAM policy and attach it to DevAdminRole. Configure the policy to grant ec2 RunInstances permissions."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Service Control Policy (SCP)** — Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 318, "set": 6, "stem": "A company uses two AWS accounts named Account A and Account B. Account A hosts a data analytics application. Account B hosts a data lake in an Amazon S3 bucket. Data analysts in Account A need to access the data lake in Account B. The access solution must be secure, use temporary credentials, enforce the principle of least privilege, and avoid long-term access keys. Which solution will meet these requirements?", "opts": {"A": "Create IAM users in Account B and share the access keys for the users with analysts in Account A.", "B": "Use an S3 bucket policy to configure the S3 bucket in Account B to be publicly accessible.", "C": "Configure a resource-based policy for the S3 bucket in Account B to allow access from an IAM role in Account A", "D": "Use a bastion host in Account B to proxy analyst requests from Account A through an Amazon EC2 instance."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **IAM Role** — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 319, "set": 6, "stem": "A company runs a database on Amazon Aurora in the us-east-1 Region. The company has a disaster recovery requirement that the database be available in another Region. Which solution meets this requirement with minimal disruption to the database operations?", "opts": {"A": "Perform an Aurora Multi-AZ deployment.", "B": "Deploy Aurora cross-Region read replicas.", "C": "Create Amazon EBS volume snapshots for Aurora and copy them to another Region.", "D": "Deploy Aurora Replicas."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 320, "set": 6, "stem": "A company is developing a photo sharing web application on AWS. The application allows users to upload, durably store, and share photos. The application processes uploaded photos into a variety of sizes. The company needs to ensure that the application can handle thousands of uploads each hour. The company wants to decouple upload operations from processing operations Which solutions will meet these requirements with the LEAST operational effort?", "opts": {"A": "Use Amazon EC2 instances to directly upload and process the images. Store the processed images in an Amazon S3 bucket and enable S3 Transfer Acceleration.", "B": "Use an Amazon S3 bucket to store uploaded images. Use an S3 event notification to invoke an AWS Lambda function to process each image. Store the processed images in a second S3 bucket.", "C": "Use an Amazon S3 bucket to store uploaded images. Use an Amazon EC2 instance to poll the S3 bucket for new images and to process them. Store each processed image in the original S3 bucket.", "D": "Use an Amazon EFS file system to store uploaded images. Use an Amazon EC2 instance to process uploaded images. Store the processed images in the original EFS file system."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead), উচ্চ durability।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 321, "set": 6, "stem": "A logistics company is creating a shipment notification platform to share shipment status information with sellers. The company will use an Amazon SNS topic to notify sellers about shipment updates. Each seller must receive updates only for their own shipments. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Ingest shipment updates into an Amazon SQS queue. Publish the updates to the SNS topic. Apply an SNS filter policy to rewrite the body of each message.", "B": "Ingest shipment updates into Amazon Kinesis Data Streams. Use an AWS Lambda function to consume the stream and rewrite the body of each message. Publish the updates to the SNS topic", "C": "Ingest the shipment updates from the application into a second SNS topic. Publish the updates to the original SNS topic. Apply a filter policy to rewrite the body of each message.", "D": "Ingest the shipment updates into an Amazon SQS queue. Use an AWS Lambda function to filter and rewrite the messages. Configure the Lambda function to publish the messages to the SNS topic."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 322, "set": 6, "stem": "A company's web application currently uses large sets of relational data that have table relationships in a MySQL database that runs on an Amazon EC2 instance. The web application has unpredictable and highly variable workloads. Outside of business hours, there are long periods of no database activity. The company has a backup of the existing database. The company needs a solution to optimize operational costs while allowing the database to automatically scale to meet demand. What solution will meet these requirements?", "opts": {"A": "Deploy an Amazon RDS for MySQL Single-AZ database instance. Choose On-Demand pricing. Import the database backup into the RDS for MySQL database. Relaunch the RDS database instance with a larger instance size during usage spikes.", "B": "Deploy Amazon RDS for MySQL Multi-AZ database instances. Purchase RDS Reserved Instances. Import the database backup into the RDS for MySQL database instances. Configure instance scaling by using the AWS CLI", "C": "Deploy an Amazon DynamoDB table with provisioned capacity. Enable auto scaling. Migrate the data to DynamoDB and update application queries to use DynamoDB APIs.", "D": "Deploy an Amazon Aurora Serverless v2 DB cluster. Import the database backup into the DB cluster. Configure the database to scale capacity based on workload"}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 323, "set": 6, "stem": "A company runs a non-production application on an Amazon EC2 instance that has the Amazon CloudWatch agent installed. The CloudWatch agent monitors application processes and sends custom metrics to CloudWatch. The application has a critical bug that causes crashes that require an instance reboot. The company does not currently have the resources to address the bug, but the server needs to remain as operational as possible. The company manually reboots the instance several times each day. The company needs a solution to automate the instance reboots until the company can address the root cause of the bug. Which solution will meet this requirement with the LEAST amount of operational overhead?", "opts": {"A": "Use a CloudWatch alarm state change event to invoke Amazon EventBridge to run AWS Systems Manager Run Command to restart the instance.", "B": "Use a CloudWatch alarm to invoke an AWS Lambda function to run AWS Systems Manager Run Command to restart the instance.", "C": "Use a CloudWatch alarm to invoke an Amazon SNS topic that notifies the operations team to restart the instance", "D": "Use a CloudWatch alarm to invoke an AWS Lambda function that automatically notifies the company through chat to restart the instance."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon CloudWatch** ব্যবহার করা হয়েছে। metric, log, alarm ও monitoring। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 324, "set": 6, "stem": "A company needs to run a critical Python data processing job each night. The job runs for approximately 1 hour and must not be interrupted. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Deploy an Amazon ECS cluster with the AWS Fargate launch type. Use the Fargate Spot capacity provider. Schedule the job to run once each night", "B": "Create an AWS Step Functions Express workflow. Define a state machine for the process. Use Amazon EventBridge to schedule the workflow.", "C": "Create an AWS Lambda function that uses the existing Python code. Configure Amazon EventBridge to invoke the function once each night.", "D": "Deploy an Amazon EC2 On-Demand Instance that runs Amazon Linux. Migrate the Python script to the EC2 instance. Use a cron job to schedule the script. Create an AWS Lambda function to start and stop the instance once each night."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 325, "set": 6, "stem": "A company stores a large number of image files in an Amazon S3 bucket. The images need to be readily available for 180 days. The company rarely accesses images that are older than 180 days. However, the company must be able to access images immediately when necessary. The company wants to archive images that are older than 360 days, but the company must be able to access the images instantly when required. The images cannot be deleted. The company requires high availability and redundancy throughout the entire lifecycle of the files. The company will use S3 Standard storage for the first 180 days. The company needs to configure $3 Lifecycle rules to handle the remaining lifecycle stages of the files. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Transition the objects to $3 One Zone-Infrequent Access (S3 One Zone-IA) after 180 days. Transition the objects to $3 Glacier Instant Retrieval after 360 days", "B": "Transition the objects to S3 One Zone-Infrequent Access (S3 One Zone-IA) after 180 days. Transition the objects to S3 Glacier Flexible Retrieval after 360 days.", "C": "Transition the objects to S3 Standard-Infrequent Access (S3 Standard-IA) after 180 days. Transition the objects to S3 Glacier Instant Retrieval after 360 days.", "D": "Transition the objects to S3 Standard-Infrequent Access (S3 Standard-IA) after 180 days. Transition the objects to S3 Glacier Flexible Retrieval after 360 days"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 326, "set": 6, "stem": "A company has an application on AWS. The company hosts the backend database in an Amazon DynamoDB table. The company uses Amazon ECS containers to host the application. Read operations are primarily key-based lookups. The application is read-heavy and often encounters a DynamoDB throughput exceeded exception. A solutions architect needs to design a cost-effective solution that will resolve the DynamoDB throughput exceeded exceptions Which solution will meet these requirements with the FEWEST changes to the current architecture?", "opts": {"A": "Use Amazon ElastiCache (Memcached) to create a cache. Point key-based read operations to the cache,", "B": "Increase the read capacity of the DynamoDB table manually every time there is a spike in read requests.", "C": "Create a DynamoDB Accelerator (DAX) cluster. Point key-based read operations to the DAX cluster.", "D": "Use Amazon RDS to create a copy of the DynamoDB table. Point read operations to the Amazon RDS instance."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 327, "set": 6, "stem": "A company wants to share data that is collected from self-driving cars with the automobile community. The data will be made available from within an Amazon S3 bucket. The company wants to minimize its cost of making this data available to other AWS accounts. What should a solutions architect do to accomplish this goal?", "opts": {"A": "Create an S3 VPC endpoint for the bucket.", "B": "Configure the S3 bucket to be a Requester Pays bucket.", "C": "Create an Amazon CloudFront distribution in front of the S3 bucket.", "D": "Require that the files be accessible only with the use of the BitTorrent protocol."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 328, "set": 6, "stem": "A company stores its financial reports in an Amazon S3 bucket. External auditors must be able to access the reports. The auditors do not have AWS accounts. The auditors have only business email addresses. There are other sensitive documents in the same S3 bucket that stores the financial reports. The auditors must not have access to the sensitive documents. All access to the financial reports must be traceable to an identity. Which solution will meet these requirements?", "opts": {"A": "Generate a presigned URL for each report in the S3 bucket. Share the URLs with the auditors.", "B": "Move the financial reports to a public $3 bucket. Share the direct object URLs with the auditors.", "C": "Enable Amazon Cognito. Create federated identities for the auditors by using their business email addresses. Attach a viewer IAM role to the identities to allow read-only access to the financial reports. Set up a Cognito login sign-in endpoint. Instruct the auditors to use the endpoint.", "D": "Use AWS IAM Identity Center to create user accounts for the auditors. Attach a permission set to the user accounts that allows read-only access to the objects in the bucket. Instruct the auditors to log in to the AWS console by using their business email addresses."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Cognito** ব্যবহার করা হয়েছে। web/mobile app-এর user authentication ও federation। এর সঙ্গে **IAM Role** — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS IAM Identity Center): এই সেবা ভিন্ন কাজের — কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 329, "set": 6, "stem": "A company runs all its business applications in the AWS Cloud. The company uses AWS Organizations to manage multiple AWS accounts. A solutions architect needs to review all permissions that are granted to IAM users to determine which IAM users have more permissions than required. Which solution will meet these requirements with the LEAST administrative overhead?", "opts": {"A": "Use Network Access Analyzer to review all access permissions in the company's AWS accounts. OA", "B": "Create an AWS CloudWatch alarm that activates when an IAM user creates or modifies resources in an AWS account.", "C": "Use AWS Identity and Access Management (IAM) Access Analyzer to review all the company's resources and accounts.", "D": "Use Amazon Inspector to find vulnerabilities in existing IAM policies."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Use AWS Identity and Access Management (IAM) Access Analyzer to review all the company's resources and accounts.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Inspector): এই সেবা ভিন্ন কাজের — EC2/ECR/Lambda-এ software vulnerability ও unintended network exposure স্ক্যান করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 330, "set": 6, "stem": "A media company stores customer-uploaded videos in an Amazon S3 bucket with the Standard storage class. The company wants to create an S3 Lifecycle configuration. The company will set the maximum retention time to 7 days. However, the configuration must delete any video that is more than 1 TB in size after 48 hours Which solution will meet these requirements?", "opts": {"A": "Create a single S3 Lifecycle configuration that has two rules. Configure the first rule to expire objects after 48 hours with a filter of ObjectSizeGreater Than and a value of 1 TB. Configure the second rule to expire objects after 7 days.", "B": "Create two $3 Lifecycle configurations. Include a rule in the first configuration to expire objects after 48 hours by using a Prefix filter of LargeFiles. Include a rule in the second configuration to expire objects after 7 days.", "C": "Create a single S3 Lifecycle configuration that has two rules. Configure the first rule to expire objects after 48 hours. Configure the second rule to expire objects after 7 days.", "D": "Create two S3 Lifecycle configurations. Include a rule in the first configuration to expire objects after 48 hours. Include a rule in the second configuration to expire objects after 7 days by using a filter of ObjectSizeLess Than and a value of 1 TB."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 331, "set": 6, "stem": "A company needs to integrate with a third-party data feed. The data feed sends a webhook to notify an external service when new data is ready for consumption. A developer wrote an AWS Lambda function to retrieve data when the company receives a webhook callback. The developer must make the Lambda function available for the third party to call. Which solution will meet these requirements with the MOST operational efficiency?", "opts": {"A": "Create a function URL for the Lambda function. Provide the Lambda function URL to the third party for the webhook.", "B": "Deploy an Application Load Balancer (ALB) in front of the Lambda function. Provide the ALB URL to the third party for the webhook.", "C": "Create an Amazon SNS topic. Attach the topic to the Lambda function. Provide the public hostname of the SNS topic to the third party for the webhook.", "D": "Create an Amazon SQS queue. Attach the queue to the Lambda function. Provide the public hostname of the SQS queue to the third party for the webhook."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 332, "set": 6, "stem": "A company hosts its order processing system on AWS. The architecture consists of a frontend and a backend. The frontend includes an Application Load Balancer (ALB) and Amazon EC2 instances in an Auto-Scaling group. The backend includes an EC2 instance and an Amazon RDS MySQL database. To prevent incomplete or lost orders, the company wants to ensure that order states are always preserved. The company wants to ensure that every order will eventually be processed, even after an outage or pause. Every order must be processed exactly once. Which solution will meet these requirements?", "opts": {"A": "Create an Auto Scaling group and an ALB for the backend. Create a read replica for the RDS database in a second Availability Zone. Update the backend RDS endpoint.", "B": "Create an Auto Scaling group and an ALB for the backend. Create an Amazon RDS proxy in front of the RDS database. Update the backend EC2 instance to use the Amazon RDS proxy endpoint.", "C": "Create an Auto Scaling group for the backend. Configure the backend EC2 instances to consume messages from an Amazon SQS FIFO queue. Configure a dead-letter queue (DLQ) for the SQs queue", "D": "Create an AWS Lambda function to replace the backend EC2 instance. Subscribe the function to an Amazon SNS topic. Configure the frontend to send orders to the SNS topic."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 333, "set": 6, "stem": "A software company needs to upgrade a critical web application. The application currently runs on a single Amazon EC2 instance that the company hosts in a public subnet. The EC2 instance runs a MySQL database. The application's DNS records are published in an Amazon Route 53 zone. A solutions architect must reconfigure the application to be scalable and highly available. The solutions architect must also reduce MySQL read latency Which combination of solutions will meet these requirements? (Select TWO.)", "opts": {"A": "Launch a second EC2 instance in a second AWS Region. Use a Route 53 failover routing policy to redirect the traffic to the second EC2 instance", "B": "Create and configure an Auto Scaling group to launch private EC2 instances in multiple Availability Zones. Add the instances to a target group behind a new Application Load Balancer", "C": "Migrate the database to an Amazon Aurora MySQL cluster. Create the primary DB instance and reader DB instance in separate Availability Zones.", "D": "Create and configure an Auto Scaling group to launch private EC2 instances in multiple AWS Regions. Add the instances to a target group behind a new Application Load Balancer.", "E": "Migrate the database to an Amazon Aurora MySQL cluster with cross-Region read replicas."}, "ans": ["B", "C"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর B:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 334, "set": 6, "stem": "A company hosts an application on Amazon EC2 instances behind an Application Load Balancer (ALB). The company wants the application be accessible only from inside the VPC that hosts the ALB. The company creates an alias record of example.com in Amazon Route 53. The DNS record for the application must be resolvable only in the VPC where the application runs. Which solution will meet these requirements?", "opts": {"A": "Use an internet-facing ALB. Create a Route 53 public hosted zone for the application DNS name.", "B": "Use an internal ALB. Create a Route 53 public hosted zone for the application DNS name.", "C": "Use an internet-facing ALB. Create a Route 53 private hosted zone for the application DNS name.", "D": "Use an internal ALB. Create a Route 53 private hosted zone for the application DNS name."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon Route 53** ব্যবহার করা হয়েছে। DNS ও routing policy (latency, failover, geolocation) + health check।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 335, "set": 6, "stem": "A company stores medical reports and images in Amazon S3 Standard storage. The company accesses each medical report only once each year. However, the company must be able to access the medical reports in real time when necessary. The company rarely accesses the medical images, but the company must retain each image for 7 years. The company can tolerate flexible retrieval times for the medical images. The company wants to optimize storage costs for the medical reports and images. Which solution will meet this requirement MOST cost-effectively?", "opts": {"A": "Store the medical reports and images in S3 Glacier Deep Archive.", "B": "Store the medical reports in S3 Glacier Instant Retrieval. Store the medical images in S3 Glacier Deep Archive.", "C": "Store the medical reports in S3 Intelligent-Tiering. Store the medical images in S3 Glacier Deep Archive", "D": "Store the medical reports in S3 Glacier Flexible Retrieval. Store the medical images in 53 Glacier Deep Archive."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 336, "set": 6, "stem": "A company hosts an Amazon EC2 instance in a private subnet in a new VPC. The VPC also has a public subnet that has the default route set to an internet gateway. The private subnet does not have outbound internet access. D The EC2 instance needs to have the ability to download monthly security updates from an outside vendor. However, the company must block any connections that are initiated from the internet. Which solution will meet these requirements?", "opts": {"A": "Configure the private subnet route table to use the internet gateway as the default route.", "B": "Create a NAT gateway in the public subnet. Configure the private subnet route table to use the NAT gateway as the default route.", "C": "Create a NAT instance in the private subnet. Configure the private subnet route table to use the NAT instance as the default route.", "D": "Create a NAT instance in the private subnet. Configure the private subnet route table to use the internet gateway as the default route."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Create a NAT gateway in the public subnet. Configure the private subnet route table to use the NAT gateway as the default route.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 337, "set": 6, "stem": "A company has an AWS Direct Connect connection from its on-premises location to an AWS account. The AWS account has 30 different VPCs in the same AWS Region. The VPCs use private virtual interfaces (VIFs). Each VPC has a CIDR block that does not overlap with other networks under the company's control. The company wants to centrally manage the networking architecture while still allowing each VPC to communicate with all other VPCs and on-premises networks Which solution will meet these requirements with the LEAST amount of operational overhead?", "opts": {"A": "Create a transit gateway, and associate the Direct Connect connection with a new transit VIF. Turn on the transit gateway's route propagation feature.", "B": "Create a Direct Connect gateway. Recreate the private VIFs to use the new gateway. Associate each VPC by creating new virtual private gateways.", "C": "Create a transit VPC. Connect the Direct Connect connection to the transit VPC. Create a peering connection between all other VPCs in the Region. Update the route tables.", "D": "Create AWS Site-to-Site VPN connections from on premises to each VPC. Ensure that both VPN tunnels are UP for each connection. Turn on the route propagation feature."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **AWS Transit Gateway** ব্যবহার করা হয়েছে। বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এর সঙ্গে **AWS Direct Connect** — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 338, "set": 6, "stem": "A company runs an application on a Kubernetes cluster on premises. The company wants to deploy the application and its components to AWS as a secondary site. The company does not want to make any major changes to the application's architecture. Which solution will meet these requirements with the LEAST operational effort?", "opts": {"A": "Create an Amazon EKS cluster. Deploy the application on Amazon EC2 nodes.", "B": "Create an Amazon ECS cluster. Deploy the application on AWS Fargate", "C": "Create a self-hosted Kubernetes cluster on Amazon EC2. Deploy the application to the cluster.", "D": "Create an Amazon EKS cluster on AWS Outposts. Deploy the application on Amazon EC2 nodes"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon EKS** ব্যবহার করা হয়েছে। managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি
