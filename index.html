): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 425, "set": 8, "stem": "A company is building a critical web application on AWS. The company needs to design architecture components that provide low-latency, global access to static content. The company must also provide highly durable and highly available storage for static content and user uploads. Which solution will meet these requirements?", "opts": {"B": "Create an Application Load Balancer (ALB) and an Amazon EC2 Auto Scaling group. Set the Auto Scaling group as the ALB target. Configure the instances in the Auto Scaling group to store static content on instance store volumes. Use an Amazon FSx for NetApp ONTAP Multi-AZ file system to store user uploads.", "C": "Create an Amazon CloudFront distribution. Create one Amazon S3 bucket and configure it as the origin for static content. Use an Amazon FSx for NetApp ONTAP Single-AZ file system to store user uploads.", "D": "Create an Application Load Balancer (ALB) and an Amazon EC2 Auto Scaling group. Set the Auto Scaling group as the ALB target. Configure the instances in the Auto Scaling group to store static content on instance store volumes. Use Amazon S3 Standard to store user uploads."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, high availability / fault tolerance, উচ্চ durability।\n✅ **সঠিক উত্তর A:** \n❌ **কেন অন্যগুলো নয়:**\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 426, "set": 8, "stem": "A company uses an organization in AWS Organizations to manage multiple AWS accounts. Multiple teams access each AWS account by assuming IAM roles. Each team has a unique IAM role. Each IAM role has a unique set of permissions. A security team wants to automate some security tasks by deploying AWS Lambda functions within each AWS account. The security team wants to ensure that only members of the security team can modify the Lambda functions directly. Which solution will meet these requirements?", "opts": {"A": "Create a service control policy (SCP) that prevents any entity from making changes to Lambda functions except for the IAM role of the security team that is specified in the Principal key. Attach the SCP to the root of the organization.", "B": "Create an IAM policy that denies all changes to the Amazon Resource Names (ARNs) of the Lambda functions. Attach the IAM policy to the root user of each AWS account.", "C": "Create a service control policy (SCP) that denies all changes to Lambda functions. Attach the SCP to the root of the organization.", "D": "Create a service control policy (SCP) that prevents any entity from making changes to Lambda functions except for the IAM role of the security team that is specified in the Condition clause. Attach the SCP to the root of the organization."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Service Control Policy (SCP)** ব্যবহার করা হয়েছে। Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **IAM Role** — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Service Control Policy (SCP)): এই সেবা ভিন্ন কাজের — Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Service Control Policy (SCP)): এই সেবা ভিন্ন কাজের — Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 427, "set": 8, "stem": "A company uses a single organization in AWS Organizations to manage multiple linked accounts for various business units. The business units each run a combination of AWS Lambda functions and AWS Fargate. The company wants to optimize its baseline compute costs for s for Lambda and Fargate across its organization but also wants to ensure that a research and development (R&D) business unit in the company maintains strict cost isolation from other accounts. Which solution will meet these requirements?", "opts": {"A": "Purchase Reserved Instances in the organization management account. Activate discount sharing only for the R&D linked accounts.", "B": "Purchase Compute Savings Plans in the organization management account. Activate discount sharing only for the R&D linked accounts.", "C": "Purchase Compute Savings Plans in both the organization management account and the R&D linked accounts. Deactivate discount sharing only for the R&D linked accounts.", "D": "Purchase Reserved Instances in both the organization management account and the R&D linked accounts. Deactivate discount sharing only for the R&D linked accounts."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Compute Savings Plans** ব্যবহার করা হয়েছে। Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Compute Savings Plans): এই সেবা ভিন্ন কাজের — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 428, "set": 8, "stem": "A company runs a multi-tier application on premises by using virtual machines (VMs). The application tiers communicate asynchronously through third-party middleware that guarantees exactly-once delivery. The company is planning to migrate the application to AWS and needs to replace the middleware solution. The solution must provide exactly-once delivery for messages from the application. Which combination of actions will meet these requirements with the LEAST infrastructure management? (Select TWO.)", "opts": {"A": "Use AWS Lambda functions to provide compute layers in the architecture.", "B": "Use Amazon EC2 instances to provide compute layers in the architecture.", "C": "Use Amazon SNS as a messaging component between the compute layers.", "D": "Use Amazon SQS FIFO queues as a messaging component between the compute layers.", "E": "Run containers on Amazon EKS to provide compute layers in the architecture."}, "ans": ["A", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** exactly-once মেসেজ ডেলিভারি, component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 429, "set": 8, "stem": "A company runs a multi-tier application on premises by using virtual machines (VMs). The application tiers communicate asynchronously through third-party middleware that guarantees exactly-once delivery. The company is planning to migrate the application to AWS and needs to replace the middleware solution. The solution must provide exactly-once delivery for messages from the application. Which combination of actions will meet these requirements with the LEAST infrastructure management? (Select TWO.)", "opts": {"A": "Use AWS Lambda functions to provide compute layers in the architecture.", "B": "Use Amazon EC2 instances to provide compute layers in the architecture.", "C": "Use Amazon SNS as a messaging component between the compute layers.", "D": "Use Amazon SQS FIFO queues as a messaging component between the compute layers.", "E": "Run containers on Amazon EKS to provide compute layers in the architecture."}, "ans": ["A", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** exactly-once মেসেজ ডেলিভারি, component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 430, "set": 8, "stem": "A company runs several application workloads as Kubernetes jobs in an Amazon EKS cluster. The jobs need to securely access other AWS services, including Amazon SNS, Amazon SQS, and Amazon DynamoDB. The company needs a solution to provide the jobs with the required access. Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Create an IAM user for each job type. Create IAM policies that grant access to the required services. Create access keys for each user and set the keys as environment variables in the Kubernetes jobs.", "B": "Set up identity federation to the company's identity provider (IdP) by using AWS Directory Service, Configure the EKS workloads to retrieve temporary credentials through the identity federation mechanism.", "C": "Assign VPC subnets that have specific IP ranges to the jobs. Assign resource-based policies directly to SNS topics, SQS queues, and DynamoDB tables to allow access from the subnet IP ranges.", "D": "Create IAM roles that have the necessary permissions to access the required services. Assign the roles to Kubernetes service accounts and associate the service accounts with the Kubernetes jobs."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** Create IAM roles that have the necessary permissions to access the required services. Assign the roles to Kubernetes service accounts and associate the service accounts with the Kubernetes jobs.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 431, "set": 8, "stem": "A company needs a solution to prevent photos with unwanted content from being uploaded to the company's web application. The solution must not involve training a machine learning (ML) model. Which solution will meet these requirements?", "opts": {"A": "Create and deploy a model by using Amazon SageMaker Autopilot. Create a real-time endpoint that the web application invokes when new photos are uploaded.", "B": "Create an AWS Lambda function that uses Amazon Rekognition to detect unwanted content. Create a Lambda function URL that the web application invokes when new photos are uploaded.", "C": "Create an Amazon CloudFront function that uses Amazon Comprehend to detect unwanted content. Associate the function with the web application.", "D": "Create an AWS Lambda function that uses Amazon Rekognition Video to detect unwanted content. Create a Lambda function URL that the web application invokes when new photos are uploaded."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon Rekognition** — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Rekognition): এই সেবা ভিন্ন কাজের — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 432, "set": 8, "stem": "A company runs a multi-tier application on premises by using virtual machines (VMs). The application tiers communicate asynchronously through third-party middleware that guarantees exactly-once delivery. The company is planning to migrate the application to AWS and needs to replace the middleware solution. The solution must provide exactly-once delivery for messages from the application. Which combination of actions will meet these requirements with the LEAST infrastructure management? (Select TWO.)", "opts": {"A": "Use AWS Lambda functions to provide compute layers in the architecture.", "B": "Use Amazon EC2 instances to provide compute layers in the architecture.", "C": "Use Amazon SNS as a messaging component between the compute layers.", "D": "Use Amazon SQS FIFO queues as a messaging component between the compute layers.", "E": "Run containers on Amazon EKS to provide compute layers in the architecture."}, "ans": ["A", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** exactly-once মেসেজ ডেলিভারি, component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 433, "set": 8, "stem": "A company is testing an application in a non-production AWS account. The company deploys the application by using an Amazon EC2 Auto Scaling group to replicate the production environment in a realistic way. The company wants to optimize costs for application testing. The solution must maintain a realistic replica of the production environment. The solution must ensure that the application is fully available to the company's developers during business hours in the company's time zone. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Replace the Auto Scaling group with a single EC2 On-Demand Instance that runs at all times.", "B": "Use EC2 Spot Instances in the Auto Scaling group. Configure the Auto Scaling group to scale in to one EC2 instance outside of business hours.", "C": "Modify the Auto Scaling group to set minimum capacity to 0. Configure scheduled scaling during business hours.", "D": "Run the application on AWS Lambda functions behind an Amazon API Gateway REST API"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 434, "set": 8, "stem": "A company has a development account that contains Amazon EC2 instances. The company uses the EC2 instances for testing. A recent audit of the development account showed that some developers occasionally forget to stop instances after the tests are finished, which incurs extra costs. The company wants to optimize costs for the development account. The company wants to use AWS Budgets to implement a budget for the account. Which solution will meet these requirements?", "opts": {"A": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of forecasted costs. Configure AWS Budgets to send an Amazon SNS notification to an AWS Lambda function. Configure the Lambda function to stop the EC2 instances when the function receives a notification.", "B": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of forecasted costs. Implement an action in the alert to automatically stop the EC2 instances.", "C": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of the budgeted amount. Create an Amazon EventBridge scheduled rule. Implement an AWS Lambda function to stop the EC2 instances based on the scheduled rule.", "D": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of the budgeted amount. Implement an action in the alert to automatically stop the EC2 instances."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **AWS Budgets** ব্যবহার করা হয়েছে। খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 435, "set": 8, "stem": "A company is building an ecommerce platform that will allow customers to place orders online. Customer traffic varies significantly. An order-processing microservice is running on a group of Amazon EC2 instances. A solutions architect must ensure that the application remains responsive and decoupled from the frontend. The application must also be able to reprocess orders that the application fails to process on the first attempt. Which solution will meet these requirements?", "opts": {"A": "Deploy an Application Load Balancer in front of the order-processing microservice. Configure the Amazon EC2 instances to scale out automatically based on CPU utilization metrics as traffic increases.", "B": "Deploy an Amazon SQS queue to integrate the frontend and the order-processing microservice. Configure the frontend to send messages to the queue. Configure the EC2 instances to process messages from the queue.", "C": "Establish direct HTTPS connections from the frontend to the microservice. Use a dynamically expanding thread pool to handle concurrency at the microservice layer.", "D": "Use Amazon Kinesis Data Streams to ingest all order requests from the frontend. Configure the Amazon EC2 instances to continuously poll the stream and process orders in near real time."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, কোনো request নষ্ট না হওয়া ও পুনরায় process।\n✅ **সঠিক উত্তর B:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 436, "set": 8, "stem": "A company has an ecommerce application that user’s access through multiple mobile apps and web applications. The company needs a solution that will receive requests from the mobile apps and web applications through an API Request traffic volume varies significantly throughout each day. Traffic spikes during sales events. The solution must be loosely coupled and ensure that no requests are lost. Which solution will meet these requirements?", "opts": {"A": "Create an Application Load Balancer (ALB). Create an AWS Elastic Beanstalk endpoint to process the requests. Add the Elastic Beanstalk endpoint to the target group of the ALB.", "B": "Set up an Amazon API Gateway REST API with an integration to an Amazon SQS queue. Configure a dead-letter queue. Create an AWS Lambda function to poll the queue to process the requests.", "C": "Create an Application Load Balancer (ALB). Create an AWS Lambda function to process the requests. Add the Lambda function as a target of the ALB.", "D": "Set up an Amazon API Gateway HTTP API with an integration to an Amazon SNS topic. Create an AWS Lambda function to process the requests. Subscribe the function to the SNS topic to process the requests."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, কোনো request নষ্ট না হওয়া ও পুনরায় process।\n✅ **সঠিক উত্তর B:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 437, "set": 8, "stem": "A company runs an analytics application on a cluster of Amazon EC2 instances. Amazon CloudWatch metrics show that the instances used 25% of CPU and 40% of memory consistently over the previous 3 months. The company wants a solution to optimize costs for the application. The solution must not affect the application's performance. Which solution will meet this requirement in the MOST cost-effective way?", "opts": {"A": "Migrate the workload to compute optimized EC2 instances.", "B": "Migrate the workload to the type of EC2 instances that AWS Compute Optimizer recommends.", "C": "Migrate the workload to memory-optimized EC2 instances.", "D": "Migrate the workload to a combination of EC2 Spot Instances and EC2 On-Demand Instances."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **AWS Compute Optimizer** — ব্যবহার (CPU/memory) বিশ্লেষণ করে সঠিক (right-size) instance type সাজেশন দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 438, "set": 8, "stem": "A company has a development account that contains Amazon EC2 instances. The company uses the EC2 instances for testing. A recent audit of the development account showed that some developers occasionally forget to stop instances after the tests are finished, which incurs extra costs. The company wants to optimize costs for the development account. The company wants to use AWS Budgets to implement a budget for the account. Which solution will meet these requirements?", "opts": {"A": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of forecasted costs. Configure AWS Budgets to send an Amazon SNS notification to an AWS Lambda function. Configure the Lambda function to stop the EC2 instances when the function receives a notification.", "B": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of forecasted costs. Implement an action in the alert to automatically stop the EC2 instances.", "C": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of the budgeted amount. Create an Amazon EventBridge scheduled rule. Implement an AWS Lambda function to stop the EC2 instances based on the scheduled rule.", "D": "Define an alert in AWS Budgets for when the budget threshold reaches 100% of the budgeted amount. Implement an action in the alert to automatically stop the EC2 instances."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **AWS Budgets** ব্যবহার করা হয়েছে। খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Budgets): এই সেবা ভিন্ন কাজের — খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 439, "set": 8, "stem": "A company hosts a PostgreSQL database on an Amazon EC2 instance. Database usage has increased recently. Users are experiencing higher latency during queries on the database. The company needs to update the database to reduce latency for users. The new solution must achieve a recovery time objective (RTO) and a recovery point objective (RPO) of less than 5 minutes. The company also wants to deploy the database to multiple AWS Regions to meet new availability requirements. Which solution will meet these requirements?", "opts": {"A": "Use AWS Backup to automatically create backups of the EC2 instance. In the event of a database failure, use the backups to restore the EC2 instance to a second Region.", "B": "Use AWS DMS to migrate the database to an Amazon Aurora PostgreSQL database. Configure the Aurora database as a global database. Set the Aurora parameter group RPO setting to 60 seconds. In the event of a database failure, promote a secondary database in a second Region automatically.", "C": "Use AWS Elastic Disaster Recovery service to replicate the EC2 instance to a second Region. In the event of a database failure, use the Elastic Disaster Recovery dashboard to perform a failover.", "D": "Use AWS DMS to migrate the database to Amazon RDS for PostgreSQL Create cross-Region read replicas in the Regions where most users are located in the event of a database failure, manually promote a read replica to become the primary database."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 440, "set": 8, "stem": "A company allows users to upload and store photos through its website. The website has users from all around the world. All images that users upload are stored in a centralized Amazon S3 bucket. The company wants to increase the speed in which its entire user base can upload photos through the website. What should a solutions architect recommend to meet these requirements?", "opts": {"A": "Create an Amazon CloudFront distribution. Lise the Amazon S3 Standard storage class to store files.", "B": "Create an Amazon CloudFront distribution. Configure the distribution settings and origin.", "C": "Configure S3 Transfer Acceleration on the S3 bucket. Use the standard S3 endpoint to upload files", "D": "Configure S3 Transfer Acceleration on the S3 bucket. Use the S3 Accelerate endpoint to upload files."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 441, "set": 8, "stem": "A company needs to run its external website on Amazon EC2 instances and on-premises virtualized servers. The AWS environment has a 1 GB AWS Direct Connect connection to the data center. The application has IP addresses that will not change. The on-premises and AWS servers are able to restart themselves while maintaining the same IP address if a failure occurs. Some website users have to add their vendors to an allow list, so the solution must have a fixed IP address. The company needs a solution with the lowest operational overhead to handle this split traffic What should a solutions architect do to meet these requirements?", "opts": {"A": "Deploy an Amazon Route 53 Resolver with rules pointing to the on-premises and AWS IP addresses.", "B": "Deploy a Network Load Balancer on AWS. Create target groups for the on-premises and AWS IP addresses.", "C": "Deploy an Application Load Balancer on AWS. Register the on-premises and AWS IP addresses with the target group.", "D": "Deploy Amazon API Gateway to direct traffic to the on-premises and AWS IP addresses based on the header of the request."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Deploy a Network Load Balancer on AWS. Create target groups for the on-premises and AWS IP addresses.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 442, "set": 8, "stem": "A company is building a data processing application that uses AWS Lambda functions. The application's Lambda functions need to communicate with an Amazon RDS DB instance that is deployed within a VPC in the same AWS account. Which solution meets these requirements in the MOST secure way?", "opts": {"A": "Configure the DB instance to allow public access. Update the DB instance security group to allow access from the Lambda public address space for the AWS Region.", "B": "Deploy the Lambda functions inside the VPC. Attach a network ACL to the Lambda subnet. Provide outbound rule access to the VPC CIDR range only. Update the DB instance security group to allow traffic from 0.0.0.0/0.", "C": "Deploy the Lambda functions inside the VPC. Attach a security group to the Lambda functions. Provide outbound rule access to the VPC CIDR range only. Update the DB instance security group to allow traffic from the Lambda security group.", "D": "Peer the Lambda default VPC with the VPC that hosts the DB instance to allow direct network access without the need for security groups."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 443, "set": 8, "stem": "A company runs a critical data analysis job each week before the first day of the work week. The job requires at least 1 hour to complete the analysis. The job is stateful and cannot tolerate interruptions. The company needs a solution to run the job on AWS. Which solution will meet these requirements?", "opts": {"A": "Create a container for the job. Schedule the job to run as an AWS Fargate task on an Amazon ECS cluster by using Amazon EventBridge Scheduler.", "B": "Configure the job to run in an AWS Lambda function. Create a scheduled rule in Amazon EventBridge to invoke the Lambda function.", "C": "Configure an Auto Scaling group of Amazon EC2 Spot Instances that run Amazon Linux. Configure a crontab entry on the instances to run the analysis", "D": "Configure an AWS DataSync task to run the job. Configure a cron expression to run the task on a schedule."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **AWS Fargate** ব্যবহার করা হয়েছে। serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এর সঙ্গে **Amazon ECS** — AWS-native container orchestration। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 444, "set": 8, "stem": "A company's platform has reported multiple instances of duplicate orders in its order processing system. The company is using Amazon SQS FIFO queues to ensure that orders are processed in the order that they have been received. The company needs to identify the root cause of the duplicate orders to prevent future occurrences. The company also needs to identify whether the duplicate orders are originating from the company's message producers. Which Amazon CloudWatch metric for Amazon SQS should the company analyze?", "opts": {"A": "Use the Approximate NumberOfMessagesVisible metric to identify if messages are stuck in the queue", "B": "Use the NumberOfDeduplicatedSentMessages metric to determine if message producers are repeatedly sending the same message.", "C": "Use the ApproximateNumberOfGroups WithInflightMessages metric to determine if message groups are causing the duplicate orders.", "D": "Use the NumberOffbessagesSent metric to determine the total volume of messages that are processed."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** Use the NumberOfDeduplicatedSentMessages metric to determine if message producers are repeatedly sending the same message.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 445, "set": 8, "stem": "A company operates an online photo-sharing service and stores data in AWS Account A in a centralized Amazon S3 bucket the company wants to grant a second AWS account named Account B access to the centralized S3 bucket. The company owns Account B. Which solution will meet this requirement?", "opts": {"A": "Enable S3 Transfer Acceleration to provide Account B access to the centralized S3 bucket in Account A", "B": "Enable cross-Region replication between Account A and Account B to share the S3 bucket data.", "C": "Use Amazon CloudFront to distribute the S3 bucket contents. Grant Account B access the bucket contents through a signed URL", "D": "Create a bucket policy that grants Account B permission to access the centralized S3 bucket in Account A."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 446, "set": 8, "stem": "A research laboratory needs to process a multi-terabyte dataset multiple times each day. The laboratory requires sub-millisecond latency while processing the data. Hundreds of Amazons EC2 Linux instances will process the data from the source and store the data in a different location. Which solution will meet these requirements?", "opts": {"A": "Create an Amazon FSx for NetApp ONTAP file system. Set each volume's tiering policy to All Import the raw data into the file system. Mount the file system on the EC2 instances", "B": "Create an Amazon S3 bucket to store the raw data. Create an Amazon FSx for Lustre file system that uses persistent SSD storage. Configure the FSx for Lustre file system to import data from and export data to Amazon S3. Mount the file system on the EC2 instances.", "C": "Create an Amazon 83 bucket to store the raw data. Create an Amazon FSx for Lustre file system that uses persistent HDD storage. Configure the FSx for Lustre file system to import data from and export data to Amazon S3. Access the file system by using a Gateway Load Balancer.", "D": "Create an Amazon FSx for Windows File Server Multi-AZ file system with HDD storage. Enable shadow copies. Mount the file system on the EC2 instances by using SMB protocol"}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon FSx for Lustre** — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon FSx for NetApp ONTAP): এই সেবা ভিন্ন কাজের — NFS, SMB ও iSCSI একসাথে সাপোর্টকারী multi-protocol file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon FSx for Lustre): এই সেবা ভিন্ন কাজের — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon FSx for Windows File Server): এই সেবা ভিন্ন কাজের — Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 447, "set": 8, "stem": "A company runs a production web application on AWS in a VPC. The company's security team wants to use a virtual appliance to perform deep packet inspection of all inbound and outbound network packets. Which solution will meet these requirements?", "opts": {"A": "Enable VPC Flow Logs for the VPC that hosts the web application. Place a virtual appliance in the VPC. Provide IAM access for the security team to deploy and configure the virtual appliance to ingest and inspect network traffic from VPC Flow Logs.", "B": "Enable AWS CloudTrail for the web application resources. Provide IAM access for the security team to deploy and configure a virtual appliance to ingest and inspect network traffic from CloudTrail logs.", "C": "Deploy a Gateway Load Balancer (GWLB) and reconfigure network routing to go through the GWLB. Provide IAM access for the security team to deploy and configure a virtual appliance to ingest and inspect network traffic from the GWLB.", "D": "Deploy AWS WAF for the web application. Provide IAM access for the security team to deploy and configure a virtual appliance to ingest and inspect the network traffic from AWS WAF."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** Deploy AWS WAF for the web application. Provide IAM access for the security team to deploy and configure a virtual appliance to ingest and inspect the network traffic from AWS WAF.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (AWS CloudTrail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Gateway Load Balancer): এই সেবা ভিন্ন কাজের — third-party virtual appliance (firewall/IDS) deploy ও scale করার জন্য। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 448, "set": 8, "stem": "A company uses Amazon S3 to store customer data that contains personally identifiable information (PII) attributes. The company needs to make the customer information available to company resources through an AWS Glue Catalog. The company needs to have fine-grained access control for the data so that only specific IAM roles can access the Pll data. Which solution will meet these requirements with the MOST operational efficiency?", "opts": {"A": "Create one IAM policy that grants access to PII. Create a second IAM policy that grants access to non-Pil data. Assign the PIl policy to the specified IAM roles", "B": "Create one IAM role that grants access to PII. Create a second IAM role that grants access to non-Pll data. Assign the PII policy to the specified IAM roles. OB", "C": "Use AWS Lake Formation to provide the specified IAM roles access to the Pil data.", "D": "Use AWS Glue to create one view for Pil data. Create a second view for non-Pil data. Provide the specified IAM roles access to the Pll view."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর C:** Use AWS Lake Formation to provide the specified IAM roles access to the Pil data.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 449, "set": 8, "stem": "A company needs to allow AWS Account B and Account C to send AWS CloudTrail logs to a centralized Amazon S3 bucket in Account A. The company does not have full control over the source CloudTrail logs from Accounts B and C. The company needs to ensure that only CloudTrail logs can be written to the S3 bucket in Account A Which solution will meet these requirements?", "opts": {"A": "DA In Accounts B and C, create Amazon S3 gateway VPC endpoints. Create an endpoint policy that includes the following cornfiguration: \"s3:ResourceAccount\": \"Account B\" and \"s3:ResourceAccount\": \"Account C. Attach the policy to the S3 gateway VPC endpoint.", "B": "In Account A, create an S3 bucket policy that will allow only the source accounts to write to the bucket by using an aws SourceAccount condition.", "C": "In Account A, create cross-account IAM roles that can be assumed from Accounts B and C. Configure the IAM role to have write permissions for the S3 bucket.", "D": "In Account A, create an S3 bucket policy that allows the CloudTrail service principal to write to the S3 bucket. Use the aws: SourceAccount condition in the bucket policy to allow access to only Accounts B and C."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS CloudTrail** — API call/audit log।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 450, "set": 8, "stem": "An IT team runs an application on Amazon EC2 instances in VPC A. An operations team uses EC2 instances in VPC B. The operations team needs the ability to make secure calls to the IT team's application from VPC B. Both VPCs have overlapping IPv4 CIDR blocks. Which solution will meet these requirements?", "opts": {"A": "Create a VPC peering connection between the two VPCs. Update the route tables for both VPCs by using the peering connection ID.", "B": "Use AWS PrivateLink. Create an endpoint service in VPC A and a VPC endpoint in VPC В.", "C": "Create a transit gateway. Attach both VPCs to the transit gateway. Configure routing appropriately.", "D": "Create an IPsec tunnel between the hwo VPCs. Update the route tables for both VPCs by using the virtual gateway ID."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS PrivateLink** ব্যবহার করা হয়েছে। VPC থেকে service-এ private এন্ডপয়েন্ট (interface endpoint) দিয়ে নিরাপদ অ্যাক্সেস।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (VPC Peering): এই সেবা ভিন্ন কাজের — দুটি VPC-এর মধ্যে সরাসরি private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 451, "set": 9, "stem": "A company hosts a website on Amazon EC2 instances. The website processes classified data. The company stores the processed data in an Amazon S3 bucket. Because of security concerns, the company must ensure that traffic between the EC2 instances and the S3 bucket does not use public IP addresses. Which solution will meet these requirements?", "opts": {"A": "Create a gateway endpoint for the S3 bucket. Configure an S3 bucket policy to allow access from the endpoint.", "B": "Create an EC2 instance profile. Create an IAM policy to grant access from the EC2 instance IP addresses to the S3 bucket. Attach the IAM policy to the instance profile.", "C": "Create a NAT gateway. Update the VPC route table to route the prefixes defined by the AWS- managed S3 prefix list to the NAT gateway.", "D": "Create an IAM user that has an access key ID and a secret access key. Configure the EC2 instances to use the IAM user credentials to access the S3 bucket."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 452, "set": 9, "stem": "A home security company is expanding its business globally. The company needs to encrypt customer data. The company does not want to manage its own keys. The company needs the keys to be usable in multiple AWS Regions and needs to control access to the keys. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use AWS KMS to create multi-Region keys. Apply tags to identify each key. Use attribute-based access control (ABAC) condition keys to control access to the keys", "B": "Use AWS KMS to create multiple keys by importing key material. Apply tags to identify each key. Use attribute-based access control (ABAC) condition keys to control access to the keys.", "C": "Use AWS CloudHSM to create a CloudHSM cluster in the company's primary Region. Synchronize the CloudHSM cluster to additional Regions by using the CloudHSM Management Utility (CMU).", "D": "Use AWS CloudHSM to create users. Use the CloudHSM Management Utility (CMU) to share keys with the users. Use the shareKey command to share or unshare the key with additional users in each Region."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, সর্বনিম্ন পরিচালনা (operational overhead), encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর A:** এখানে **AWS KMS** ব্যবহার করা হয়েছে। encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 453, "set": 9, "stem": "A company hosts an industrial control application that receives sensor input through Amazon Kinesis Data Streams. The application needs to support new sensors for real-time anomaly detection in monitored equipment. The company wants to integrate new sensors in a loosely-coupled, fully managed, and serverless way. The company cannot modify the application code. Which solution will meet these requirements?", "opts": {"A": "Forward the existing stream in Kinesis Data Streams to Amazon Managed Service for Apache Flink for anomaly detection. Use a second stream in Kinesis Data Streams to send the Flink output to the application", "B": "Use Amazon Data Firehose to stream data to Amazon S3. Use Amazon Redshift Spectrum to perform anomaly detection on the 83 data. Use S3 Event Notifications to invoke an AWS Lambda function that sends analyzed data to the application through a second stream in Kinesis Data Streams.", "C": "Configure Amazon EC2 instances in an Auto Scaling group to consume data from the data stream and to perform anomaly detection. Create a second stream in Kinesis Data Streams to send data from the EC2 instances to the application.", "D": "Configure an Amazon ECS task that uses Amazon EC2 instances to consume data from the data stream and to perform anomaly detection. Create a second stream in Kinesis Data Streams to send data from the containers to the application."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon Kinesis Data Streams** ব্যবহার করা হয়েছে। real-time streaming data ingestion ও processing।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 454, "set": 9, "stem": "A company uses an organization in AWS Organizations to manage a multi-account landing zone. The company requires all users who access AWS accounts in the organization to use a centralized identity system that follows the principle of least privilege for operational tasks. The company currently uses an external identity provider (IdP). Which combination of solutions will meet these requirements? (Select TWO.)", "opts": {"A": "Use IAM to create IAM users and IAM user groups in each AWS account.", "B": "Create permission sets in AWS IAM Identity Center. Assign the appropriate permission sets to the IAM users and IAM user groups in the accounts.", "C": "Assign each IAM user to an IAM role by using an inline IAM policy based on operational duties. Assign each role to the appropriate AWS account in the organization.", "D": "Configure a SAML identity provider in IAM in each AWS account to establish a trust relationship with the company's external IdP.", "E": "Enable AWS IAM Identity Center in the organization management account. Create user accounts and user groups."}, "ans": ["D", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর D:** Configure a SAML identity provider in IAM in each AWS account to establish a trust relationship with the company's external IdP.\n✅ **সঠিক উত্তর E:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (AWS IAM Identity Center): এই সেবা ভিন্ন কাজের — কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 455, "set": 9, "stem": "An ecommerce company hosts a three-tier web application in a VPC. The web tier runs on Amazon EC2 instances in two Availability Zones. The company stores a product catalog and customer sales information in Amazon DynamoDB. The company's finance team uses a reporting application to generate reports of daily product sales. When the finance team runs the daily reports, a sudden performance decrease affects website customers. The company wants to improve the performance of the system. Which solution will meet these requirements with MINIMAL changes to the current architecture?", "opts": {"A": "Migrate the application to larger EC2 Instances. Migrate the database to Amazon RDS for MySQL Configure a read replica of the database in a second Availability Zone.", "B": "Increase the compute capacity of the EC2 instances. Migrate the database to Amazon ElastiCache (Memcached).", "C": "Implement DynamoDB Accelerator (DAX).", "D": "Configure DynamoDB streams."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 456, "set": 9, "stem": "A company receives data transfers from a small number of external clients that use SFTP software on an Amazon EC2 instance. The clients use an SFTP client to upload data. The clients use SSH keys for authentication. Every hour, an automated script transfers new uploads to an Amazon S3 bucket for processing. The company wants to move the transfer process to an AWS managed service and to reduce the time required to start data processing. The company wants to retain the existing user management and SSH key generation process. The solution must not require clients to make significant changes to their existing processes. Which solution will meet these requirements?", "opts": {"A": "Reconfigure the script that runs on the EC2 instance to run every 15 minutes. Create an S3 Event Notifications rule for all new object creation events. Set an Amazon SNS topic as the destination.", "B": "Create an AWS Transfer Family SFTP server that uses the existing S3 bucket as a target. Use service-managed users to enable authentication.", "C": "Require clients to add the AWS DataSync agent into their local environments. Create an IAM user for each client that has permission to upload data to the target S3 bucket.", "D": "Create an AWS Transfer Family SFTP connector that has permission to access the target S3 bucket for each client. Store credentials in AWS Systems Manager. Create an IAM role to allow the SFTP connector to securely use the credentials."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Transfer Family** ব্যবহার করা হয়েছে। SFTP/FTPS/FTP দিয়ে S3/EFS-এ managed file transfer। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Transfer Family): এই সেবা ভিন্ন কাজের — SFTP/FTPS/FTP দিয়ে S3/EFS-এ managed file transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 457, "set": 9, "stem": "A company uses a set of Amazon EC2 instances to host a website. The website uses an Amazon S3 bucket to store images and media files. The company wants to automate website infrastructure creation to deploy the website to multiple AWS Regions. The company also wants to provide the EC2 instances access to the S3 bucket so the instances can store and access data by using IAM. Which solution will meet these requirements MOST securely?", "opts": {"A": "Create an AWS CloudFormation template for the web server EC2 instances. Save an IAM access key in the UserData section of the AWS EC2: Instance entity in the CloudFormation template.", "B": "Create a file that contains an IAM secret access key and access key ID. Store the file in a new S3 bucket. Create an AWS CloudFormation template. In the template, create a parameter to specify the location of the S3 object that contains the access key and access key ID.", "C": "Create an IAM role and an IAM access policy that allows the web server EC2 instances to access the S3 bucket. Create an AWS CloudFormation template for the web server EC2 instances that contains an IAM instance profile entity that references the IAM role and the IAM access policy.", "D": "Create a script that retrieves an IAM secret access key and access key ID from IAM and stores them on the web server EC2 instances. Include the script in the UserData section of the AWS:EC2: Instance entity in an AWS CloudFormation template."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 458, "set": 9, "stem": "A company is designing a new web application that will run on Amazon EC2 Instances. The application will use Amazon DynamoDB for backend data storage. The application traffic will be unpredictable. The company expects that the application read and write throughput to the database will be moderate to high. The company needs to scale in response to application traffic. Which DynamoDB table configuration will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure DynamoDB with provisioned read and write by using the DynamoDB Standard table class. Set DynamoDB auto scaling to a maximum defined capacity.", "B": "Configure DynamoDB in on-demand mode by using the DynamoDB Standard table class.", "C": "Configure DynamoDB with provisioned read and write by using the DynamoDB Standard Infrequent Access (DynamoDB Standard-IA) table class. Set DynamoDB auto scaling to a maximum defined capacity.", "D": "Configure DynamoDB in on-demand mode by using the DynamoDB Standard Infrequent Access (DynamoDB Standard-IA) table class."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 459, "set": 9, "stem": "A company runs an application as a task in an Amazon ECS cluster. The application must have read and write access to a specific group of Amazon S3 buckets. The S3 buckets are in the same AWS Region and AWS account as the ECS cluster. The company needs to grant the application access to the S3 buckets according to the principle of least privilege. Which combination of solutions will meet these requirements? (Select TWO.)", "opts": {"A": "Add a tag to each bucket. Create an IAM policy that includes a StringEquals condition that matches the tags and values of the buckets.", "B": "Create an IAM policy that lists the full Amazon Resource Name (ARN) for each S3 bucket.", "C": "Attach the IAM policy to the instance role of the ECS task", "D": "Create an IAM policy that includes a wildcard Amazon Resource Name (ARN) that matches all combinations of the S3 bucket names.", "E": "Attach the IAM policy to the task role of the ECS task."}, "ans": ["B", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর E:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 460, "set": 9, "stem": "A company needs to run a production application on at least two Amazon EC2 instances. The instances must run continuously. A solutions architect needs to design a highly available and fault-tolerant architecture for the application. For the solution, the solutions architect first creates an Auto Scaling group of EC2 instances. Which EC2 configuration will meet these requirements?", "opts": {"A": "Set the Auto Scaling group's minimum capacity to two. Deploy one On-Demand Instance in one Availability Zone. Deploy another On-Demand Instance in a second Availability Zone.", "B": "Set the Auto Scaling group's minimum capacity to four. Deploy two On-Demand Instances in one Availability Zone. Deploy two On-Demand Instances in a second Availability Zone.", "C": "Set the Auto Scaling group's minimum capacity to two. Deploy four Spot Instances in one Availability Zone.", "D": "Set the Auto Scaling group's minimum capacity to four. Deploy two On-Demand Instances in one Availability Zone. Deploy two Spot Instances in a second Availability Zone."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 461, "set": 9, "stem": "A company hosts a website on Amazon EC2 instances that run Amazon Linux. The instances are behind an Application Load Balancer (ALB) and are part of an Auto Scaling group. Each instance uses Amazon EBS volumes to store product manuals. New instances often have outdated data. The new instances occasionally take up to 30 minutes to receive updates from an external source. The company must ensure that all instances have up-to-date product manuals. The company needs a solution that can adapt quickly to increased demand. The solution must not require modifications for the application code. Which solution will meet these requirements?", "opts": {"A": "Store the product manuals on instance store volumes that are attached to each EC2 instance.", "B": "Store the product manuals in an Amazon S3 bucket. Configure the EC2 instances to download updates from the S3 bucket.", "C": "Store the product manuals in an Amazon EFS volume. Mount the EFS volume on the EC2 instances.", "D": "Store the product manuals in an Amazon S3 bucket. Use the S3 Standard-Infrequent Access (S3 Standard-IA) storage class. Configure the EC2 instances to download updates from the S3 bucket."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 462, "set": 9, "stem": "A company is developing software that uses a PostgreSQL database schema. The company needs to configure development environments and test environments for its developers. Each developer at the company uses their own development environment, which includes a PostgreSQL database. On average, each development environment is used for an 8-hour workday. The test environments will be used for load testing that can take up to 2 hours each day. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure development environments and test environments with their own Amazon Aurora Serverless v2 PostgreSQL database.", "B": "For each development environment, configure an Amazon RDS for PostgreSQL Single-AZ DB instance. For the test environment, configure a single Amazon RDS for PostgreSQL Multi-AZ DB instance.", "C": "Configure development environments and test environments with their own Amazon Aurora PostgreSQL DB cluster.", "D": "Configure an Amazon Aurora global database. Allow developers to connect to the database with their own credentials."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 463, "set": 9, "stem": "A video production company stores raw 4K video footage on an Amazon EFS file system by using the EFS Standard storage class. Each video file is around 100 GB. The EFS file system is mounted to an Auto Scaling group of Amazon EC2 instances that transcode the video files. Editors need to access each file frequently for up to 90 days. After 90 days, the files are rarely needed. However, the files must remain available with sub-second latency for on-demand edit requests. The company wants to reduce monthly storage costs without any changes to the existing mount points that the editors use. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Apply the Transition into IA lifecycle policy to the file system. Configure the policy to move the files that have not been accessed for 90 days.", "B": "Migrate the video files to an Amazon S3 bucket. Mount the S3 bucket through an Amazon S3 File Gateway. Instruct the editors to download the files from and re-upload the files to the mounted gateway for each edit.", "C": "Export the video files to an Amazon S3 bucket. Configure an S3 Lifecycle configuration to transition the objects to the S3 Glacier Instant Retrieval storage class after 90 days. Re-mount the objects by using AWS DataSync.", "D": "Schedule an AWS Lambda function to compress files in place after 90 days. Store the compressed files on the same file system."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** Apply the Transition into IA lifecycle policy to the file system. Configure the policy to move the files that have not been accessed for 90 days.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 464, "set": 9, "stem": "A company manages an application that stores data on an Amazon RDS for PostgreSQL Multi-AZ DB instance High traffic on the application is causing increased latency for many read queries. A solutions architect must improve the performance of the application. Which solution will meet this requirement?", "opts": {"A": "Enable Amazon RDS Performance Insights. Configure storage capacity to scale automatically.", "B": "Configure the DB instance to use DynamoDB Accelerator (DAX).", "C": "Create a read replica of the DB instance. Serve read traffic from the read replica.", "D": "Use Amazon Data Firehose between the application and Amazon RDS to increase the concurrency of database requests."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** Create a read replica of the DB instance. Serve read traffic from the read replica.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 465, "set": 9, "stem": "A company runs a Python script on an employee's laptop to transform and update data that is stored in an Amazon RDS database. The company wants to migrate the transformation workload to the AWS Cloud. The solution must run the Python script every 30 minutes. Each run of the script takes approximately 20 seconds to update the data in the RDS database. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Launch an Amazon EC2 On-Demand Instance to run the Python script. Configure the EC2 instance to access the RDS database. Configure a cron job to invoke the Python script.", "B": "Launch an Amazon EC2 Spot Instance to run the Python script. Configure the EC2 instance to access the RDS database. Configure a cron job to invoke the Python script.", "C": "Configure an AWS Lambda function to access the RDS database. Use Amazon EventBridge Scheduler to invoke the Lambda function.", "D": "Configure an AWS Lambda function to access the RDS database. Configure the Lambda function with provisioned concurrency. Use an Amazon API Gateway HTTP API to invoke the Lambda function."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 466, "set": 9, "stem": "A company is designing a new application that uploads files to an Amazon S3 bucket. The uploaded files are processed to extract metadata. Processing must take less than 5 seconds. The volume and frequency of the uploads vary from a few files each hour to hundreds of concurrent uploads. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure AWS CloudTrail trails to log Amazon S3 API calls. Use AWS AppSync to process the files.", "B": "Configure a new object created S3 event notification within the bucket to invoke an AWS Lambda function to process the files.", "C": "Configure Amazon Kinesis Data Streams to deliver the files to the S3 bucket. Invoke an AWS Lambda function to process the files.", "D": "Deploy an Amazon EC2 instance. Create a script that lists all files in the S3 bucket and processes new files. Use a cron job that runs every minute to run the script."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS CloudTr
