QL instance to use an SSL certificate.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 42, "set": 0, "stem": "A company hosts its main public web application in one AWS Region across multiple Availability Zones. The application uses an Amazon EC2 Auto Scaling group and an Application Load Balancer (ALB) web development team needs a cost-optimized compute solution to improve the company's ability to serve dynamic content globally to millions of customers. Which solution will meet these requirements?", "opts": {"A": "Create an Amazon CloudFront distribution. Configure the existing ALB as the origin.", "B": "Use Amazon Route 53 to serve traffic to the ALB and EC2 instances based on the geographic location of each customer.", "C": "Create an Amazon S3 bucket with public read access enabled. Migrate the web application to the S3 bucket. Configure the S3 bucket for website hosting", "D": "Use AWS Direct Connect to directly serve content from the web application to the location of each customer."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর A:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 43, "set": 0, "stem": "A company's infrastructure consists of Amazon EC2 instances and an Amazon RDS DB instance in a single AWS Region. The company wants to back up its data in a separate Region. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use AWS Backup to copy EC2 backups and RDS backups to the separate Region.", "B": "Use Amazon Data Lifecycle Manager (Amazon DLM) to copy EC2 backups and RDS backups to the separate Region.", "C": "Create Amazon Machine Ima ges (AMIs) of the EC2 instances. Copy the AMis to the separate Region Create a read replica for the RDS DB instance in the separate Region.", "D": "Create Amazon Elastic Block Store (Amazon EBS) snapshots. Copy the EBS snapshots to the separate Region. Create RDS snapshots. Export the RDS snapshots to Amazon S3. Configure S3 Cross-Region Replication (CRR) to the separate Region."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **AWS Backup** ব্যবহার করা হয়েছে। একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 44, "set": 0, "stem": "A company needs to design a hybrid network architecture. The company's workloads are currently stored in the AWS Cloud and in on-premises data centers. The workloads require single-digit latencies to communicate. The company uses an AWS Transit Gateway transit gateway to connect multiple VPCs. Which combination of steps will meet these requirements MOST cost-effectively? (Select TWO.)", "opts": {"A": "Establish an AWS Site-to-Site VPN connection to each VPC.", "B": "Associate an AWS Direct Connect gateway with the transit gateway that is attached to the VPCs.", "C": "Establish an AWS Site-to-Site VPN connection to an AWS Direct Connect gateway.", "D": "Establish an AWS Direct Connect connection. Create a transit virtual interface (VIF) to a Direct Connect gateway.", "E": "Associate AWS Site-to-Site VPN connections with the transit gateway that is attached to the VPCs."}, "ans": ["B", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **AWS Direct Connect** ব্যবহার করা হয়েছে। on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এর সঙ্গে **AWS Transit Gateway** — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে।\n✅ **সঠিক উত্তর D:** এখানে **AWS Direct Connect** ব্যবহার করা হয়েছে। on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 45, "set": 0, "stem": "A media company is migrating a Microsoft Windows-based application to the AWS Cloud. The company uses the application to analyze media files. The company requires a resilient shared storage solution that the company can access by using the SMB protocol. Which storage solution will meet these requirements?", "opts": {"A": "Use an Amazon S3 bucket to store the media files. Connect the application servers to the bucket.", "B": "Use Amazon FSx for Windows File Server in a Multi-AZ deployment as shared storage for the application servers.", "C": "Use an Amazon Elastic Block Store (Amazon EBS) volume as shared storage for the application servers.", "D": "Use an Amazon FSx File Gateway as shared storage for the application servers."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon FSx for Windows File Server** ব্যবহার করা হয়েছে। Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 46, "set": 0, "stem": "A company runs a web application in a single AWS Region. A solutions architect wants to ensure that the web application can continue to operate if the application becomes unavailable in the Region. Which solution will meet this requirement?", "opts": {"A": "Deploy the application in multiple Regions. Use Amazon Route 53 DNS health checks to route traffic to a healthy Region.", "B": "Deploy the application in multiple Availability Zones within a single Region. Use Amazon Route 53 DNS health checks to route traffic to healthy application resources.", "C": "Deploy the application in multiple Regions. Use an Amazon Route 53 simple routing record to route traffic to a healthy Region.", "D": "Deploy the application in multiple Availability Zones within a single Region. Use an Amazon Route 53 latency record in each Availability Zone to route traffic to a healthy Availability Zone."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon Route 53** ব্যবহার করা হয়েছে। DNS ও routing policy (latency, failover, geolocation) + health check।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 47, "set": 0, "stem": "A company runs workloads on AWS. The company wants to centrally collect security logs to assess security across the company's entire AWS environment and to improve workload protection. Which solution will meet these requirements with the LEAST development effort?", "opts": {"A": "Configure a data lake in AWS Lake Formation. Use AWS Glue crawlers to ingest the security logs into the data lake.", "B": "Configure an AWS Lambda function to collect the security logs in CSV format. Upload the logs to an Amazon S3 bucket.", "C": "Configure a data lake in Amazon Security Lake to collect the security logs. Upload the logs to an Amazon S3 bucket.", "D": "Configure an AWS Database Migration Service (AWS DMS) replication instance to load the security logs into an Amazon RDS cluster."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 48, "set": 0, "stem": "A company uses a single Amazon S3 bucket to store data that multiple business applications must access. The company hosts the applications on Amazon EC2 Windows instances that are in a VPC. The company configured a bucket policy for the S3 bucket to grant the applications access to the bucket. The company continually adds more business applications to the environment. As the number of business applications increases, the policy document becomes more difficult to manage. The S3 bucket policy document will soon reach its policy size quota. The company needs a solution to scale its architecture to handle more business applications. Which solution will meet these requirements in the MOST operationally efficient way?", "opts": {"A": "Migrate the data from the S3 bucket to an Amazon Elastic File System (Amazon EFS) volume. Ensure that all application owners configure their applications to use the EFS volume.", "B": "Deploy an AWS Storage Gateway appliance for each application. Reconfigure the applications to use a dedicated Storage Gateway appliance to access the S3 objects instead of accessing the objects directly.", "C": "Create a new S3 bucket for each application. Configure 83 replication to keep the new buckets synchronized with the original S3 bucket. Instruct application owners to use their respective 83 buckets.", "D": "Create an S3 access point for each application. Instruct application owners to use their respective S3 access points."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 49, "set": 0, "stem": "A research company receives recorded interviews in audio format through a static webpage. The company configure configures an Amazon API Gateway HTTP API to invoke an AWS Lambda function to process the audio files into a format for analytics. The audio files vary in size. The files take between 10 seconds and 2 minutes to process the company discovers that 50% of recordings return a timeout error from the HTTP API. Not all files are processed as expected. The company must ensure that all files are processed. Which solution will meet this requirement?", "opts": {"A": "Increase the Lambda function timeout setting to 15 minutes. Configure the static webpage to throttle the connection to ensure there are not too many concurrent connections.", "B": "Create an Amazon Simple Queue Service (Amazon SQS) queue. Modify the Lambda function to insert the location of each file into the queue and to return a response immediately. Create a second Lambda function to process the audio files from the SQS queue.", "C": "Configure the HTTP API to invoke an AWS Fargate task to process the audio files. Use a scaling policy for the Fargate task to ensure there are not too many concurrent connections.", "D": "Increase the timeout setting of the HTTP API to be greater than 2 minutes. Configure the static webpage to throttle connections to ensure there are not too many concurrent connections."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Fargate): এই সেবা ভিন্ন কাজের — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 50, "set": 0, "stem": "A company is building a stock trading application in the AWS Cloud. The company requires a highly available solution that provides low-latency access to block storage across multiple Availability Zones. Which solution will meet these requirements with the LEAST implementation effort?", "opts": {"A": "Use an Amazon S3 bucket and an S3 File Gateway as shared storage for the application.", "B": "Create an Amazon EC2 instance in each Availability Zone. Attach a General Purpose SSD (gp3) Amazon Elastic Block Store (Amazon EBS) volume to each EC2 instance. Create a Bash script to sync data between volumes", "C": "Use an Amazon FSx for NetApp ONTAP Multi-AZ file system to access data by using the iSCSI protocol.", "D": "Create an Amazon EC2 instance in each Availability Zone Attach a Provisioned IOPS SSD (io2) Amazon Elastic Block Store (Amazon EBS) volume to each EC2 instance. Create a Python script to sync data between volumes."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon FSx for NetApp ONTAP** ব্যবহার করা হয়েছে। NFS, SMB ও iSCSI একসাথে সাপোর্টকারী multi-protocol file system।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 51, "set": 1, "stem": "A company is using microservices to build an ecommerce application on AWS. The company wants to preserve customer transaction information after customers submit orders. The company wants to store transaction data in an Amazon Aurora database. The company expects sales volumes to vary throughout each year. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use an Amazon API Gateway REST API to invoke an AWS Lambda function to send transaction data to the Aurora database. Send transaction data to an Amazon Simple Queue Service (Amazon SQS) queue that has a dead-letter queue. Use a second Lambda function to read from the SQS queue and to update the Aurora database.", "B": "Use an Amazon API Gateway HTTP API to send transaction data to an Application Load Balancer (ALB). Use the ALB to send the transaction data to Amazon Elastic Container Service (Amazon ECS) on Amazon EC2. Use ECS tasks to store the data in Aurora database.", "C": "Use an Application Load Balancer (ALB) to route transaction data to Amazon Elastic Kubernetes Service (Amazon EKS). Use Amazon EKS to send the data to the Aurora database", "D": "Use Amazon Data Firehose to send transaction data to Amazon S3. Use AWS Database Migration Service (AWS DMS) to migrate the data from Amazon S3 to the Aurora database."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon Aurora** — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 52, "set": 1, "stem": "A company stores a large volume of critical data in Amazon RDS for PostgreSQL tables. The company is developing several new features for an upcoming product launch. Some of the new features require many table alterations. The company needs a solution to test the altered tables for several days. After testing, the solution must make the new features available to customers in production. Which solution will meet these requirements with the HIGHEST availability?", "opts": {"A": "Create a new instance of the database in RDS for PostgreSQL to test the new features. When the testing is finished, take a backup of the test database, and restore the test database to the production database.", "B": "Create new database tables in the production database to test the new features. When the testing is finished, copy the data from the older tables to the new tables. Delete the older tables, and rename the new tables accordingly.", "C": "Create an Amazon RDS read replica to deploy a new instance of the database. Make updates to the database tables in the replica instance. When the testing is finished, promote the replica instance to become the new production instance.", "D": "Use an Amazon RDS blue/green deployment to deploy a new test instance of the database. Make database table updates in the test instance. When the testing is finished, promote the test instance to become the new production instance."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 53, "set": 1, "stem": "An ecommerce company is running a seasonal online sale. The company hosts its website on Amazon EC2 instances spanning multiple Availability Zones. The company wants its website to manage sudden traffic increases during the sale. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Create an Auto Scaling group that is large enough to handle peak traffic load. Stop half of the Amazon EC2 instances. Configure the Auto Scaling group to use the stopped instances to scale out when traffic increases.", "B": "Create an Auto Scaling group for the website. Set the minimum size of the Auto Scaling group so that it can handle high traffic volumes without the need to scale out.", "C": "Use Amazon CloudFront and Amazon ElastiCache to cache dynamic content with an Auto Scaling group set as the origin. Configure the Auto Scaling group with the instances necessary to populate CloudFront and ElastiCache. Scale in after the cache is fully populated.", "D": "Configure an Auto Scaling group to scale out as traffic increases. Create a launch template to start new instances from a preconfigured Amazon Machine Image (AMI)."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 54, "set": 1, "stem": "A company is migrating a legacy application to AWS. The company wants to deploy the application on Amazon EC2 instances and use an Amazon RDS for SQL Server database as the backend. The application relies on SQL queries and scripts. The company must protect the application from SQL injection attacks Which solution will meet this requirement?", "opts": {"A": "Enable AWS Shield Standard. Include the EC2 instances that host the application as protected resources.", "B": "Implement AWS WAF. Create rules that filter and block SQL injection attempts.", "C": "Enable AWS Shield Advanced. Add the EC2 instances that host the application as protected resources.", "D": "Enforce encryption in transit by using TLS for all SQL queries between clients and AWS services."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** Implement AWS WAF. Create rules that filter and block SQL injection attempts.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 55, "set": 1, "stem": "A company wants to migrate terabytes of frequently used JSON documents to AWS. The solution must allow fast JSON document queries that combine data from multiple sources, perform calculations on datasets, and search for text patterns within the data. The company expects the structure of the JSON documents to change in the future. Which solution will meet these requirements?", "opts": {"A": "Convert the documents to a relational data structure. Store the documents in an Amazon RDS DB cluster, Perform SQL queries on the DB cluster", "B": "Store the documents in an Amazon S3 bucket. Use Amazon Athena to perform SQL queries on the S3 bucket contents.", "C": "Store the documents in Amazon DocumentDB (with MongoDB compatibility). Run queries on the stored documents.", "D": "Store the JSON data in Amazon DynamoDB. Run queries on the stored data."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Store the documents in Amazon DocumentDB (with MongoDB compatibility). Run queries on the stored documents.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 56, "set": 1, "stem": "A company has multiple AWS accounts for development work. Some staff consistently use oversized Amazon EC2 instances, which causes the company to exceed the yearly budget for the development accounts. The company wants to centrally restrict the creation of AWS resources in these accounts. Which solution will meet these requirements with the LEAST development effort?", "opts": {"A": "Develop AWS Systems Manager templates that use an approved EC2 creation process. Use the approved Systems Manager templates to provision EC2 instances", "B": "Use AWS Organizations to organize the accounts into organizational units (OUs). Define and attach a service control policy (SCP) to control the usage of EC2 instance types.", "C": "Configure an Amazon EventBridge rule that invokes an AWS Lambda function when an EC2 instance is created. Stop disallowed EC2 instance types.", "D": "Set up AWS Service Catalog products for the staff to create the allowed EC2 instance types. Ensure that staff can deploy EC2 instances only by using the Service Catalog products."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এর সঙ্গে **Service Control Policy (SCP)** — Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 57, "set": 1, "stem": "A company uses an organization in AWS Organizations with all features enabled to manage multiple AWS accounts in an organizational unit (OU). The company runs multiple workloads in the ap- southeast-2 Region on Amazon EC2 instances that are backed by Amazon Elastic Block Store (Amazon EBS) volumes. The company must encrypt all the EBS volumes at rest Which combination of steps will meet these requirements? (Select TWO.)", "opts": {"A": "Enable EBS default encryption. Define an encryption key.", "B": "Create an IAM permissions boundary. Attach the permissions boundary to the OU. Configure the permissions boundary to deny the ec2: Create Volume action when the ec2 Encrypted condition equals false.", "C": "Create a service control policy (SCP). Attach the SCP to the root OU. Define the SCP to deny the ec2: Create Volume action when the ec2: Encrypted condition equals false.", "D": "Update the IAM policies for each account to deny the ec2: Create Volume action when the ec2. Encrypted condition equals false.", "E": "Create an AWS CloudHSM cluster. Share the cluster with the organization."}, "ans": ["A", "C"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর A:** এখানে **Amazon EBS** ব্যবহার করা হয়েছে। একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n✅ **সঠিক উত্তর C:** এখানে **Service Control Policy (SCP)** ব্যবহার করা হয়েছে। Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 58, "set": 1, "stem": "A company collects data from a large number of participants who use wearable devices. The company stores the data in an Amazon DynamoDB table and uses applications to analyze the data. The data workload is constant and predictable. The company wants to stay at or below its forecasted budget for DynamoDB Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Use provisioned mode and DynamoDB Standard-Infrequent Access (DynamoDB Standard- IA). Reserve capacity for the forecasted workload.", "B": "Use provisioned mode. Specify the read capacity units (RCUs) and write capacity units (WCUs).", "C": "Use on-demand mode. Set the read capacity units (RCUs) and write capacity units (WCUs) high enough to accommodate changes in the workload.", "D": "Use on-demand mode. Specify the read capacity units (RCUs) and write capacity units (WCUs) with reserved capacity."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 59, "set": 1, "stem": "A company runs complex workloads in Amazon RDS. The company frequently needs to create new Amazon RDS instances to perform tests. Some data is required to perform the tests. As the company has grown, the process to deploy testing instances has become time consuming. The company wants to automate the RDS deployment process. Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Create a new RDS instance, import the required data, and take a snapshot of the new instance. Create an AWS CloudFormation template that builds a new RDS instance from the snapshot. Use the CloudFormation template to deploy new RDS instances.", "B": "Use the AWS Management Console to take a snapshot of an existing RDS instance. Restore the snapshot to a new RDS instance. Create a script to delete the data and schema from new instances. Run the script from an Amazon EC2 instance to reset new RDS tables.", "C": "Create an AWS CloudFormation template that builds a new RDS instance. Create a Python script to load the required data into a new instance. Run the script from an Amazon EC2 instance each time a new RDS instance is created.", "D": "Create an AWS Lambda function that loads the required data on a target RDS instance. When a new RDS instance is created, update the Lambda function to target the new instance, and invoke the function"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 60, "set": 1, "stem": "An insurance company wants to migrate an application that calculates insurance premiums to AWS. The company needs to run calculations immediately when a customer submits information through the application. The application usually takes 10 seconds to process a calculation. A solutions architect needs to develop an architecture on AWS to handle the application. Which solution will meet this requirement?", "opts": {"A": "Set up an Amazon API Gateway HTTP API to receive the data. Use an AWS Lambda function to process the data immediately.", "B": "Upload the customer data to an Amazon S3 bucket. Start an Amazon EC2 Spot Instance to process every data upload.", "C": "Set up AWS Transfer Family to receive the customer data. Configure an Amazon Elastic Kubernetes Service (Amazon EKS) job to process the customer data on a schedule.", "D": "Upload the data to an Amazon S3 bucket Invoke an AWS Batch job to process every customer data upload"}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Transfer Family): এই সেবা ভিন্ন কাজের — SFTP/FTPS/FTP দিয়ে S3/EFS-এ managed file transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 61, "set": 1, "stem": "An ecommerce company is building a near real-time bidding platform on AWS. The company deploys the application as a target of an Application Load Balancer (ALB). The application stores bidding and catalog information in an Amazon DynamoDB table. The DynamoDB table receives heavy read loads. The company wants to add a feature to the application that allows customers to view the items that have received the most bids in the previous 24 hours. The company needs a solution to ensure that the bid prices are updated in near real time. The solution must not affect the performance of the DynamoDB table. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Configure an Amazon Kinesis data stream to replicate changes in item bid prices from the Amazon DynamoDB table to Amazon Managed Service for Apache Flink. Write the bid prices back into the DynamoDB table.", "B": "Configure the DynamoDB table to perform a zero-ETL data transfer to an Amazon Redshift table every hour. Configure the application to query the Redshift table to retrieve the latest bid prices.", "C": "Configure an AWS Glue connector to export the data from a DynamoDB snapshot to an Amazon S3 bucket. Invoke an AWS Lambda function to calculate the latest bid price and to send the latest price to the application.", "D": "Configure an Amazon DynamoDB Accelerator (DAX) cluster with eventual consistency. Update the application configuration to access the DAX endpoint to retrieve the latest price information."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 62, "set": 1, "stem": "A company is building an application on AWS that connects to an Amazon RDS database. The company wants to manage the application configuration and to securely store and retrieve credentials for the database and other services. Which solution will meet these requirements with the LEAST administrative overhead?", "opts": {"A": "Use AWS AppConfig to store and manage the application configuration. Use AWS Secrets Manager to store and retrieve the credentials.", "B": "Use AWS Lambda to store and manage the application configuration. Use AWS Systems Manager Parameter Store to store and retrieve the credentials.", "C": "Use an encrypted application configuration file. Store the file in Amazon S3 for the application configuration. Create another $3 file to store and retrieve the credentials", "D": "Use AWS AppConfig to store and manage the application configuration. Use Amazon RDS to store and retrieve the credentials."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** Use AWS AppConfig to store and manage the application configuration. Use AWS Secrets Manager to store and retrieve the credentials.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 63, "set": 1, "stem": "A company needs to ensure that an IAM group that contains database administrators can perform operations only within Amazon RDS The company must ensure that the members of the IAM group cannot access any other AWS services. Which solution will meet this requirement?", "opts": {"A": "Create an IAM policy that includes a statement that has the Effect \"Allow\" and the Action \"rds:\". Attach the IAM policy to the IAM group.", "B": "Create an IAM policy that includes two statements. Configure the first statement to have the Effect \"Allow\" and the Action \"rds:\"\". Configure the second statement to have the Effect \"Deny and the Action Attach the IAM policy to the IAM group.", "C": "Create an IAM policy that includes a statement that has the Effect \"Deny\" and the NotAction \"rds:\"\". Attach the IAM policy to the IAM group.", "D": "Create an IAM policy with a statement that includes the Effect \"Allow\" and the Action \"rds:\"\". Include a permissions boundary that has the Effect \"Allow\" and the Action \"rds:\"\". Attach the IAM policy to the IAM group."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 64, "set": 1, "stem": "A financial services company needs to migrate an on-premises MySQL database workload to AWS. The database requires consistent low-latency performance with a baseline of 32,000 IOPS to process transactions. Which solution will meet these requirements?", "opts": {"A": "Migrate the database to an Amazon S3 bucket. Enable S3 Transfer Acceleration.", "B": "Migrate the data to a Provisioned IOPS SSD (io2) Amazon Elastic Block Store (Amazon EBS) Express volume.", "C": "Migrate the data to an Amazon Elastic File System (Amazon EFS) Standard file system.", "D": "Migrate the data to a General Purpose SSD (gp3) Amazon Elastic Block Store (Amazon EBS) volume."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon EBS** ব্যবহার করা হয়েছে। একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 65, "set": 1, "stem": "A company collects 10 GB of telemetry data every day from multiple devices. The company stores the data in an Amazon S3 bucket that is in a source data account. The company has hired several consulting agencies to analyze the company's data. Each agency has a unique AWS account. Each agency requires read access to the company's data. The company needs a secure solution to share the data from the source data account to the consulting agencies. Which solution will meet these requirements with the LEAST operational effort?", "opts": {"A": "Set up an Amazon CloudFront distribution. Use the S3 bucket as the origin.", "B": "Make the S3 bucket public for a limited time. Inform only the agencies that the bucket is publicly accessible.", "C": "Configure cross-account access for the S3 bucket to the accounts that the agencies own.", "D": "Set up an IAM user for each agency in the source data account. Grant each agency IAM user access to the company's S3 bucket"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 66, "set": 1, "stem": "A company deploys an API in a VPC behind a public Application Load Balancer (ALB). The company deploys a client application that needs to consume the API in a VPC that is in a second AWS account. The application is deployed in private subnets The company wants to connect the application to the API securely. The company wants to optimize costs. Which solution will meet these requirements?", "opts": {"A": "Configure a VPC peering connection between the two VPCs. Update the route tables.", "B": "Establish an AWS Direct Connect connection between the two VPCS.", "C": "Deploy a NAT gateway in the application VPC. Update the route tables in the application VPC", "D": "Create a transit gateway in the API account. Create transit gateway attachments in the application VPC, and configure routing"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **VPC Peering** ব্যবহার করা হয়েছে। দুটি VPC-এর মধ্যে সরাসরি private সংযোগ।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 67, "set": 1, "stem": "A company runs an application that uses Docker containers in an on-premises data center. The application runs on a container host that stores persistent data files in a local volume, Container instances use the stored persistent data. The company wants to migrate the application to fully managed AWS services. Which solution will meet these requirements?", "opts": {"A": "Use Amazon Elastic Kubernetes Service (Amazon EKS) with self-managed nodes. Attach an Amazon Elastic Block Store (Amazon EBS) volume to an Amazon EC2 instance. Mount the EBS volume on the containers to provide persistent storage.", "B": "Use Amazon Elastic Container Service (Amazon ECS) with the AWS Fargate launch type. Create an Amazon Elastic File System (Amazon EFS) volume. Mount the EFS volume on the containers to provide persistent storage.", "C": "Use Amazon Elastic Container Service (Amazon ECS) with the AWS Fargate launch type. Create an Amazon DynamoDB table. Configure the application to use the DynamoDB table for persistent storage", "D": "Use Amazon Elastic Container Service (Amazon ECS) with the Amazon EC2 launch type. Create an Amazon Elastic File System (Amazon EFS) volume. Mount the EFS volume on the containers to provide persistent storage."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **AWS Fargate** — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এর সঙ্গে **Amazon EFS** — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 68, "set": 1, "stem": "A company hosts a web application on multiple Amazon EC2 instances. The EC2 instances are in an Auto Scaling group that scales in response to user demand. The company wants to optimize costs for the application but does not want to make any long-term commitments. Which solution will meet these requirements?", "opts": {"A": "Purchase Dedicated Instances only.", "B": "Purchase Reserved Instances with a partial upfront payment.", "C": "Purchase a mix of On-Demand Instances and Spot Instances.", "D": "Purchase a mix of On-Demand Instances and Reserved Instances."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** Purchase a mix of On-Demand Instances and Spot Instances.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 69, "set": 1, "stem": "A transaction processing company has weekly scripted batch jobs that run on Amazon EC2 instances. The EC2 instances are in an Auto Scaling group. The number of transactions can vary, but the baseline CPU utilization that is noted on each run is at least 60%. The company needs to provision the capacity 30 minutes before the jobs run. Currently, engineers complete this task by manually modifying the Auto Scaling group parameters. The company does not have the resources to analyze the required capacity trends for the Auto Scaling group counts. The company needs an automated way to modify the Auto Scaling group's desired capacity Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Create a dynamic scaling policy for the Auto Scaling group. Configure the policy to scale based on the CPU utilization metric. Set the target value for the metric to 60%", "B": "Create a scheduled scaling policy for the Auto Scaling group. Set the appropriate desired capacity, minimum capacity, and maximum capacity. Set the recurrence to weekly. Set the start time to 30 minutes before the batch jobs run.", "C": "Create a predictive scaling policy for the Auto Scaling group. Configure the policy to scale based on forecast. Set the scaling metric to CPU utilization. Set the target value for the metric to 60%. In the policy, set the instances to pre-launch 30 minutes before the jobs run.", "D": "Create an Amazon EventBridge event to invoke an AWS Lambda function when the CPU utilization metric value for the Auto Scaling group reaches 60%. Configure the Lambda function to increase the Auto Scaling group's desired capacity and maximum capacity by 20%."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 70, "set": 1, "stem": "A company has a social media application that is experiencing rapid user growth. The current architecture uses 1-family Amazon EC2 instances. The current architecture struggles to handle the increasing number of user posts and images. The application experiences performance slowdowns during peak usage times. A solutions architect needs to design an updated architecture that will resolve the performance issues and scale as usage increases Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use the largest Amazon EC2 instance in the same family to host the application. Install a relational database on the instance to store all account information and to store posts and images.", "B": "Use Amazon Simple Queue Service (Amazon SQS) to buffer incoming posts. Use a larger EC2 instance in the same family to host the application. Store account information in Amazon DynamoDB. Store posts and images in the local EC2 instance file system.", "C": "Use an Amazon API Gateway REST API and AWS Lambda functions to process requests. Store account information in Amazon DynamoDB. Use Amazon S3 to store posts and images.", "D": "Deploy multiple EC2 instances in the same family. Use an Application Load Balancer to distribute traffic. Use a shared file system to store account information and to store posts and images."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 71, "set": 1, "stem": "An ecommerce company wants to use machine learning (ML) algorithms to build and train models. The company will use the models to visualize complex scenarios and to detect trends in customer data. The architecture team wants to integrate its ML models with a reporting platform to analyze the augmented data and to use the data directly in its business intelligence dashboards. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use AWS Glue to create an ML transform to build and train models. Use Amazon OpenSearch Service to visualize the data.", "B": "Use Amazon SageMaker to build and train models. Use Amazon QuickSight to visualize the data.", "C": "Use an Amazon Machine Image (AMI) from the AWS Marketplace to build and train models. Use Amazon OpenSearch Service to visualize the data.", "D": "Use Amazon QuickSight to build and train models and to visualize the data"}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **Amazon QuickSight** ব্যবহার করা হয়েছে। BI dashboard ও visualization। এর সঙ্গে **Amazon Rekognition** — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon QuickSight): এই সেবা ভিন্ন কাজের — BI dashboard ও visualization। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 72, "set": 1, "stem": "A solutions architect is designing a scalable web application that runs on Amazon EC2. The application users must stay on the same server after login. The application must be protected from common exploits Which solution will meet these requirements?", "opts": {"A": "Create an Application Load Balancer (ALB) with a target group. Attach the target group to an Auto Scaling group. Enable duration-based stickiness on the target group. Associate the ALB with an AWS Network Firewall firewall.", "B": "Create a Network Load Balancer (NLB) with a target group. Attach the target group to an Auto Scaling group. Associate the NLB with an AWS WAF web ACL.", "C": "Create an Application Load Balancer (ALB) with a target group. Attach the target group to an Auto Scaling group. Enable application-based stickiness on the target group. Associate the ALB with an AWS WAF web ACL.", "D": "Create a Network Load Balancer (NLB) with a target group. Attach the target group to an Auto Scaling group. Enable target group stickiness on the NLB. Associate the NLB with an AWS Network Firewall firewall."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Application Load Balancer (ALB)** ব্যবহার করা হয়েছে। Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 73, "set": 1, "stem": "A company runs an application on several Amazon EC2 instances. Multiple Amazon Block Store (Amazon EBS) volumes are attached to each EC2 instance. The company needs to back up the configurations and the data of the EC2 instances every night. The application must be recoverable in a secondary AWS Region. Which solution will meet these requirements in the MOST operationally efficient way?", "opts": {"A": "Configure an AWS Lambda function to take nightly snapshots of the application's EBS volumes and to copy the snapshots to a secondary Region.", "B": "Create a backup plan in AWS Backup to take nightly backups. Copy the backups to a secondary Region. Add the EC2 instances to a resource assignment as part of the backup plan.", "C": "Create a backup plan in AWS Backup to take nightly backups. Copy the backups to a secondary Region. Add the EBS volumes to a resource assignment as part of the backup plan.", "D": "Configure an AWS Lambda function to take nightly snapshots of the application's EBS volumes and to copy the snapshots to a secondary Availability Zone"}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Backup** ব্যবহার করা হয়েছে। একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 74, "set": 1, "stem": "An online gaming company hosts its platform on Amazon EC2 instances behind Network Load Balancers (NLBs) across multiple AWS Regions. The NLBs can route requests to targets over the internet. The company wants to improve the customer playing experience by reducing end-to-end load time for its global customer base. Which solution will meet these requirements?", "opts": {"A": "Create Application Load Balancers (ALBs) in each Region to replace the existing NLBs. Register the existing EC2 instances as targets for the ALBs in each Region.", "B": "Configure Amazon Route 53 to route equally weighted traffic to the NLBs in each Region.", "C": "Create additional NLBs and EC2 instances in other Regions where the company has large customer bases.", "D": "Create a standard accelerator in AWS Global Accelerator. Configure the existing NLBs as target endpoints."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর D:** এখানে **AWS Global Accelerator** ব্যবহার করা হয়েছে। AWS global network দিয়ে anycast IP-এ TCP/UDP traffic কম latency-তে routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 75, "set": 1, "stem": "A company has an ecommerce site. The site is designed as a distributed web application that is hosted in multiple AWS accounts that are in one organization in AWS Organizations. The web application is comprised of multiple microservices. All microservices expose their AWS services either through Amazon CloudFront distributions or public Application Load Balancers (ALBs). The company wants to protect public endpoints from malicious attacks. The company also wants to monitor security configurations. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use AWS WAF to protect the public endpoints. Use AWS Firewall Manager from a dedicated security account to manage rules in AWS WAF. Use AWS Config rules to monitor the Regional and global WAF configurations.", "B": "Use AWS WAF to protect the public endpoints. Apply AWS WAF rules in each account. Use AWS Config rules and AWS Security Hub to monitor the WAF configurations of the ALBs and the CloudFront distributions", "C": "Use AWS WAF to protect the public endpoints. Use AWS Firewall Manager from a dedicated security account to manage the rules in AWS WAF. Use Amazon Inspector and AWS Security Hub to monitor the WAF configurations of the ALBs and the CloudFront distributions.", "D": "Use AWS Shield Advanced to protect the public endpoints. Use AWS Config rules to monitor the Shield Advanced configuration for each account."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), দুষ্ট কার্যকলাপ শনাক্ত।\n✅ **সঠিক উত্তর A:** এখানে **AWS Config** ব্যবহার করা হয়েছে। resource configuration ইতিহাস ও compliance মূল্যায়ন।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Config): এই সেবা ভিন্ন কাজের — resource configuration ইতিহাস ও compliance মূল্যায়ন। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Inspector): এই সেবা ভিন্ন কাজের — EC2/ECR/Lambda-এ software vulnerability ও unintended network exposure স্ক্যান করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Config): এই সেবা ভিন্ন কাজের — resource configuration ইতিহাস ও compliance মূল্যায়ন। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 76, "set": 1, "stem": "A company is building a serverless application to process clickstream data from its website. The clickstream data is sent to an Amazon Kinesis Data Streams data stream from the application web servers. The company wants to enrich the clickstream data by joining the clickstream data with customer profile data from an Amazon Aurora Multi-AZ database. The company wants to use Amazon Redshift to analyze the enriched data. The solution must be highly available Which solution will meet these requirements?", "opts": {"A": "Use an AWS Lambda function to process and enrich the clickstream data. Use the same Lambda function to write the clickstream data to Amazon S3. Use Amazon Redshift Spectrum to query the enriched data in Amazon S3.", "B": "Use an Amazon EC2 Spot Instance to poll the data stream and enrich the clickstream data. Configure the EC2 instance to use the COPY command to send the enriched results to Amazon Redshift", "C": "Use an Amazon Elastic Container Service (Amazon ECS) task with AWS Fargate Spot capacity to poll the data stream and enrich the clickstream data. Configure an Amazon EC2 instance to use the COPY command to send the enriched results to Amazon Redshift.", "D": "Use Amazon Data Firehose to load the clickstream data from Kinesis Data Streams to Amazon S3. Use AWS Glue crawlers to infer the schema and populate the AWS Glue Data Catalog. Use Amazon Athena to query the raw data in Amazon S3."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Redshift** — petabyte-scale data warehouse, analytical (OLAP) query।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 77, "set": 1, "stem": "A company has workloads that run on AWS. Each workload has a separate Amazon RDS database. A security audit finds that the company does not meet a requirement to rotate the RDS master user credentials every 30 days. Each RDS DB instance must also have a different set of credentials that are accessible only by the relevant application layer and by the team that supports the workload. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use AWS Secrets Manager to set up RDS password management. Use a combination of IAM policies and RDS policies to restrict access to the credentials.", "B": "Use AWS Secrets Manager to set up RDS password management. Use a combination of IAM policies and Secrets Manager policies to restrict access to the credentials.", "C": "Create an Amazon Simple Notification Service (Amazon SNS) topic for each workload. Create a scheduled AWS Lambda function that rotates the RDS master user credentials every 30 days. Configure the Lambda function to publish the new credentials to the SNS topic for each application and team.", "D": "Create an Amazon S3 bucket that uses AWS Key Management Service (AWS KMS) for encryption. Create a scheduled AWS Lambda function that rotates the RDS master user credentials every 30 days. Configure the Lambda function to push the new credentials to the S3 bucket. Use KMS key policies to restrict access to the credentials."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 78, "set": 1, "stem": "A company uses an Amazon Aurora PostgreSQL DB cluster to store its critical data in the us-east-1 Region. The company wants to develop a disaster recovery plan to recover the database in the us- west-1 Region. The company has a recovery time objective (RTO) of 5 minutes and has a recovery point objective (RPO) of 1 minute. What should a solutions architect do to meet these requirements?", "opts": {"A": "Create a read replica in us-west-1. Set the DB cluster to automatically fail over to the read replica if the primary instance is not responding.", "B": "Create an Aurora global database. Set us-west-1 as the secondary Region. Update connections to use the writer and reader endpoints as appropriate.", "C": "Set up a second Aurora DB cluster in us-west-1. Use logical replication to keep the databases synchronized. Create an Amazon EventBridge rule to change the database endpoint if the primary DB cluster does not respond.", "D": "Use Aurora automated snapshots to store data in an Amazon S3 bucket. Enable S3 Versioning. Configure S3 Cross-Region Replication to us-west-1. Create a second Aurora DB cluster in us west-1. Create an Amazon EventBridge rule to restore the snapshot if the primary DB cluster does not respond."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 79, "set": 1, "stem": "A solutions architect needs to optimize a large data analytics job that runs on an Amazon EMR cluster. The job takes 13 hours to finish. The cluster has multiple core nodes and worker nodes that are deployed on large, compute-optimized instances. After reviewing EMR logs, the solutions architect discovers that several nodes are idle for more than 5 hours while the job is running. The solutions architect needs to optimize cluster performance. Which solution will meet this requirement MOST cost-effectively?", "opts": {"A": "Increase the number of core nodes to ensure there is enough processing power to handle the analytics job without any idle time.", "B": "Use the EMR managed scaling feature to automatically resize the cluster based on workload", "C": "Migrate the analytics job to a set of AWS Lambda functions. Configure reserved concurrency for the functions.", "D": "Migrate the analytics job core nodes to a memory-optimized instance type to reduce the total job runtime."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** Use the EMR managed scaling feature to automatically resize the cluster based on workload\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 80, "set": 1, "stem": "A company needs to use its on-premises LDAP directory service to authenticate its users to the AWS Management Console. The directory service is not compatible with Security Assertion Markup Language (SAML). Which solution meets these requirements?", "opts": {"A": "Enable AWS IAM Identity Center between AWS and the on-premises LDAP.", "B": "Create an IAM policy that uses AWS credentials, and integrate the policy into LDAP", "C": "Set up a process that rotates the IAM credentials whenever LDAP credentials are updated.", "D": "Develop an on-premises custom identity broker application or process that uses AWS Security Token Service (AWS STS) to get short-lived credentials."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** Develop an on-premises custom identity broker application or process that uses AWS Security Token Service (AWS STS) to get short-lived credentials.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS IAM Identity Center): এই সেবা ভিন্ন কাজের — কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 81, "set": 1, "stem": "A finance company uses backup software to back up its data to physical tape storage on premises. To comply with regulations, the company needs to store the data for 7 years. The company must be able to restore archived data within one week when necessary. The company wants to migrate the backup data to AWS to reduce costs. The company does not want to change the current backup software Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Use AWS Storage Gateway Tape Gateway to copy the data to virtual tapes. Use AWS DataSync to migrate the virtual tapes to the Amazon S3 Standard-Infrequent Access (S3 Standard-IA). Change the target of the backup software to S3 Standard-IA.", "B": "Convert the physical tapes to virtual tapes. Use AWS DataSync to migrate the virtual tapes to the Amazon S3 Glacier Flexible Retrieval. Change the target of the backup software to the S3 Glacier Flexible Retrieval", "C": "Use AWS Storage Gateway Tape Gateway to copy the data to virtual tapes. Migrate the virtual tapes to Amazon S3 Glacier Deep Archive. Change the target of the backup software to the virtual tapes.", "D": "Convert the physical tapes to virtual tapes. Use AWS Snowball Edge storage-optimized devices to migrate the virtual tapes to Amazon S3 Glacier Flexible Retrieval. Change the target of the backup software to S3 Glacier Flexible Retrieval."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **AWS Storage Gateway** ব্যবহার করা হয়েছে। on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Snowball): এই সেবা ভিন্ন কাজের — বিশাল পরিমাণ ডেটা offline/physical device-এ AWS-এ স্থানান্তর। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 82, "set": 1, "stem": "A company is moving data from an on-premises data center to the AWS Cloud The company must store all its data in an Amazon S3 bucket. To comply with regulations, the company must also ensure that the data will be protected against overwriting indefinitely. Which solution will ensure that the data in the S3 bucket cannot be overwritten?", "opts": {"A": "Enable versioning for the S3 bucket. Use server-side encryption with Amazon S3 managed keys (SSE-S3) to protect the data", "B": "Disable versioning for the S3 bucket. Configure S3 Object Lock for the S3 bucket with a retention period of 1 year.", "C": "Enable versioning for the S3 bucket. Configure S3 Object Lock for the S3 bucket with a legal hold.", "D": "Configure S3 Storage Lens for the S3 bucket. Use server-side encryption with customer-provided keys (SSE-C) to protect the data."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 83, "set": 1, "stem": "A database is on an Amazon RDS MySQL 5.6 Multi-AZ DB instance that experiences highly dynamic reads. Application developers notice a significant slowdown when testing read performance from a secondary AWS Region. The developers want a solution that provides less than 1 second of read replication latency. What should the solutions architect recommend?", "opts": {"A": "Install MySQL on Amazon EC2 in the secondary Region.", "B": "Migrate the database to Amazon Aurora with cross-Region replicas.", "C": "Create another RDS for MySQL read replica in the secondary Region.", "D": "Implement Amazon ElastiCache to improve database query performance."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর B:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 84, "set": 1, "stem": "A company has set up hybrid connectivity between an on-premises data center and AWS by using AWS Site-to-Site VPN. The company is migrating a workload to AWS. The company sets up a VPC that has two public subnets and two private subnets. The company wants to monitor the total packet loss and round-trip-time (RTT) between the data center and AWS. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use Amazon CloudWatch Network Monitor to set up Internet Control Message Protocol (ICMP) probe monitoring from each subnet to the on-premises destination.", "B": "Create an Amazon EC2 instance in each subnet. Create a scheduled job to send Internet Control Message Protocol (ICMP) packets to the on-premises destination.", "C": "Create an AWS Lambda function in each subnet. Write a script to perform Internet Control Message Protocol (ICMP) connectivity checks.", "D": "Create an AWS Batch job in each subnet. Write a script to perform Internet Control Message Protocol (ICMP) connectivity checks."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **Amazon CloudWatch** ব্যবহার করা হয়েছে। metric, log, alarm ও monitoring।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 85, "set": 1, "stem": "A company has a three-tier web application. An Application Load Balancer (ALB) is in front of Amazon EC2 instances that are in the ALB target group. An Amazon S3 bucket stores documents. The company requires the application to meet a recovery time objective (RTO) of 60 seconds. Which solution will meet this requirement?", "opts": {"A": "Replicate S3 objects to a second AWS Region. Create a second ALB and a minimum set of EC2 instances in the second Region. Ensure that the EC2 instances are shut down until they are needed. Configure Amazo
