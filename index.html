ail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 467, "set": 9, "stem": "A company stores financial documents in an Amazon S3 bucket. The company generates links to share specific documents with external advisors for review and feedback. The advisors must have access for only 48 hours after the company generates the links. The solution must ensure that advisors cannot share permanent URLs. The solution must not require advisors to have AWS accounts or any sort of credentials. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Create an IAM user for each external advisor. Configure the IAM users to have read-only access to specific S3 object prefixes. Use the AWS CLI to disable access to the object prefixes after 48 hours.", "B": "Enable S3 Object Lock. Configure S3 Object Lock to use a 48-hour retention period. Configure public read access on the bucket. Use S3 Lifecycle policies to delete the documents after expiration.", "C": "Use the AWS CLI to generate presigned URLs that include a 48-hour expiration time for the required documents. Distribute the presigned URLs to the external advisors.", "D": "Deploy an Amazon EC2 instance. Mount the S3 bucket as a local file system. Use an Amazon RDS database to log document access. Use a cron script to revoke access after 48 hours."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** Use the AWS CLI to generate presigned URLs that include a 48-hour expiration time for the required documents. Distribute the presigned URLs to the external advisors.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 468, "set": 9, "stem": "A company wants to run transient workloads in an Amazon EMR cluster that runs on Amazon EC2 instances. The company wants to use On-Demand Instances for core nodes and Spot Instances for task nodes. The company wants to use memory optimized EC2 instances to launch EMR clusters in the AWS Region where the company operates. The company has configured multiple subnets in multiple Availability Zones. The company must ensure that the EMR clusters are launched only in Availability Zones where specified instance types and purchasing options are available. Which solution will meet these requirements with the MOST operational efficiency?", "opts": {"A": "Deploy Amazon EMR with an instance group configuration. Launch the EMR clusters into multiple subnets that are associated with multiple Availability Zones.", "B": "Deploy Amazon EMR with an instance group configuration. Launch the EMR clusters into a single subnet. Configure Amazon EMR to determine whether an Availability Zone has the necessary capacity when an EMR cluster is launched.", "C": "Deploy Amazon EMR with an instance fleet configuration. Launch the EMR clusters into multiple subnets that are associated with multiple Availability Zones.", "D": "Deploy Amazon EMR with an instance fleet configuration. Launch the EMR clusters into a single subnet. Configure Amazon EMR to determine whether an Availability Zone has the necessary capacity when an EMR cluster is launched."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Deploy Amazon EMR with an instance fleet configuration. Launch the EMR clusters into multiple subnets that are associated with multiple Availability Zones.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 469, "set": 9, "stem": "A company is designing the network for an online multi-player game. The game uses the UDP networking protocol and will be deployed in eight AWS Regions. The network architecture needs to minimize latency and packet loss to give end users a high-quality gaming experience. Which solution will meet these requirements?", "opts": {"A": "Set up a transit gateway in each Region. Create inter-Region peering attachments between each transit gateway.", "B": "Set up AWS Global Accelerator with UDP listeners and endpoint groups in each Region.", "C": "Set up Amazon CloudFront with UDP turned on. Configure an origin in each Region.", "D": "Set up a VPC peering mesh between each Region. Turn on UDP for each VPC."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Global Accelerator** ব্যবহার করা হয়েছে। AWS global network দিয়ে anycast IP-এ TCP/UDP traffic কম latency-তে routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (VPC Peering): এই সেবা ভিন্ন কাজের — দুটি VPC-এর মধ্যে সরাসরি private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 470, "set": 9, "stem": "A company hosts a website analytics application on a single Amazon EC2 On-Demand Instance. The analytics application is highly resilient and is designed to run in stateless mode. The company notices that the application is showing signs of performance degradation during busy times and is presenting 5xx errors. The company needs to make the application scale seamlessly. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Create an Amazon Machine Image (AMI) of the web application. Use the AMI to launch a second EC2 On-Demand Instance. Use an Application Load Balancer to distribute the load across the two EC2 instances.", "B": "Create an Amazon Machine Image (AMI) of the web application. Use the AMI to launch a second EC2 On-Demand Instance. Use Amazon Route 53 weighted routing to distribute the load across the two EC2 instances.", "C": "Create an AWS Lambda function to stop the EC2 instance and change the instance type. Create an Amazon CloudWatch alarm to invoke the Lambda function when CPU utilization is more than 75%.", "D": "Create an Amazon Machine Image (AMI) of the web application. Apply the AMI to a launch template. Create an Auto Scaling group that includes the launch template. Configure the launch template to use a Spot Fleet. Attach an Application Load Balancer to the Auto Scaling group."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 471, "set": 9, "stem": "A company hosts a public product catalog. The product catalog is made accessible through an Amazon API Gateway REST API with AWS Lambda function integrations in a single AWS Region. Most traffic consists of read-only GET requests to the /products resource from global users. The catalog changes approximately once every hour. The company needs to lower latency for global users and reduce the load on the Lambda functions. Which solution will meet these requirements?", "opts": {"A": "Enable API Gateway response caching for the GET/products resource. Set a 1-hour TTL.", "B": "Place Amazon CloudFront in front of API Gateway. Cache GET responses with a 1-hour TTL.", "C": "Increase Lambda function memory for the functions that handle the GET/products resource.", "D": "Move the API to an Application Load Balancer that uses Amazon EC2 instances to cache the catalog."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এর সঙ্গে **Amazon API Gateway** — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 472, "set": 9, "stem": "A company stores data in Amazon S3. According to regulations, the data must not contain personally identifiable information (PII). The company recently discovered that S3 buckets have some objects that contain PII. The company needs to automatically detect PII in S3 buckets and to notify the company's security team. Which solution will meet these requirements?", "opts": {"A": "Use Amazon Macie. Create an Amazon EventBridge rule to filter the SensitiveData event type from Macie findings and to send an Amazon SNS notification to the security team.", "B": "Use Amazon GuardDuty. Create an Amazon EventBridge rule to filter the CRITICAL event type from GuardDuty findings and to send an Amazon SNS notification to the security team.", "C": "Use Amazon Macie. Create an Amazon EventBridge rule to filter the SensitiveData: S3Object/Personal event type from Macie findings and to send an Amazon SQS notification to the security team.", "D": "Use Amazon GuardDuty. Create an Amazon EventBridge rule to filter the CRITICAL event type from GuardDuty findings and to send an Amazon SQS notification to the security team."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর A:** এখানে **Amazon Macie** ব্যবহার করা হয়েছে। S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon GuardDuty): এই সেবা ভিন্ন কাজের — AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Macie): এই সেবা ভিন্ন কাজের — S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon GuardDuty): এই সেবা ভিন্ন কাজের — AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 473, "set": 9, "stem": "A company uses an Amazon Aurora PostgreSQL DB cluster to store structured sensitive data about its customers. To meet compliance requirements, the company introduced a policy that all the customer-related data must be encrypted at rest. Which solution will ensure that the company is compliant with the policy with the LEAST operational overhead?", "opts": {"A": "Modify the existing Aurora PostgreSQL DB cluster to enable encryption at rest by using an AWS KMS key. Use the encrypted cluster to store the customer data.", "B": "Create a new Aurora PostgreSQL DB cluster. Enable encryption by using an AWS KMS key during database creation. Manually migrate the data from the old database to the new database.", "C": "Create a new Aurora PostgreSQL DB cluster. Enable encryption by using server-side encryption (SSE) during database creation. Migrate the data from the old database to the new database.", "D": "Create a snapshot of the existing Aurora PostgreSQL DB cluster. Enable encryption by using an AWS KMS key. Restore the snapshot to a new Aurora PostgreSQL DB cluster."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), encryption / ডেটা সুরক্ষা, sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর D:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এর সঙ্গে **AWS KMS** — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 474, "set": 9, "stem": "A company needs to design a resilient web application to process customer orders. The web application must automatically handle increases in web traffic and application usage without affecting the customer experience or losing customer orders. Which solution will meet these requirements?", "opts": {"A": "Use a NAT gateway to manage web traffic. Use Amazon EC2 Auto Scaling groups to receive, process, and store processed customer orders. Use an AWS Lambda function to capture and store unprocessed orders.", "B": "Use a Network Load Balancer (NLB) to manage web traffic. Use an Application Load Balancer to receive customer orders from the NLB. Use Amazon Redshift with a Multi-AZ deployment to store unprocessed and processed customer orders.", "C": "Use a Gateway Load Balancer (GWLB) to manage web traffic. Use Amazon ECS to receive and process customer orders. Use the GWLB to capture and store unprocessed orders. Use Amazon DynamoDB to store processed customer orders.", "D": "Use an Application Load Balancer to manage web traffic. Use Amazon EC2 Auto Scaling groups to receive and process customer orders. Use Amazon SQS to store unprocessed orders. Use Amazon RDS with a Multi-AZ deployment to store processed customer orders."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** এখানে **Application Load Balancer (ALB)** ব্যবহার করা হয়েছে। Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Gateway Load Balancer): এই সেবা ভিন্ন কাজের — third-party virtual appliance (firewall/IDS) deploy ও scale করার জন্য। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 475, "set": 9, "stem": "A company has multiple petabytes (PB) of media files that are stored in an Amazon S3 bucket in the eu-west-1 Region. The company wants to move all the data to an S3 bucket in the us-west-2 Region as soon as possible. The company needs a data migration solution. The data needs to be verified after it is copied. The company also needs to have visibility into the data movement process. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use the AWS CLI to increase the max concurrent requests parameter value to 20 in the AWS CLI configuration. Use the AWS CLI to copy the data from the S3 bucket in eu-west-1 to the S3 bucket in us-west-2.", "B": "Use AWS DataSync with Basic mode to copy the data from the S3 bucket in eu-west-1 to the S3 bucket in us-west-2.", "C": "Use AWS DataSync with Enhanced mode to copy the data from the S3 bucket in eu-west-1 to the S3 bucket in us-west-2.", "D": "Use AWS DataSync with an agent that is deployed on an Amazon EC2 instance in eu-west-1 to move the data from the source bucket to the destination bucket."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **AWS DataSync** ব্যবহার করা হয়েছে। on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 476, "set": 9, "stem": "A company is planning to migrate to AWS. The network layout will include more than 1,000 VPCs in a single AWS Region. The resources in the VPCs need to communicate with each other. What should a solutions architect recommend to meet these requirements?", "opts": {"A": "Create VPN tunnels from all the VPCs to each other. Enable route propagation.", "B": "Create an AWS Direct Connect gateway, and attach a public virtual interface (VIF) to each VPC. Enable route propagation.", "C": "Peer all the VPCs together by creating and accepting peering requests. Update route tables with the new routes.", "D": "Create a transit gateway, and place attachments in subnets of all the VPCs. Configure a transit gateway route table with the new routes."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **AWS Transit Gateway** ব্যবহার করা হয়েছে। বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 477, "set": 9, "stem": "A company runs a website on Amazon EC2 instances. Clients use the HTTP protocol to connect to the application. The company does not want the EC2 instances to have internet access. However, the application should remain available through the internet. The application must scale in response to traffic demands. Which solution will meet these requirements?", "opts": {"A": "Host the application on EC2 instances in an Auto Scaling group behind an internet-facing Network Load Balancer (NLB). Launch the EC2 instances in public subnets that use an internet gateway.", "B": "Host the application on EC2 instances in an Auto Scaling group behind an internet-facing Network Load Balancer (NLB). Launch the EC2 instances in private subnets that do not have internet access.", "C": "Host the application on EC2 instances in an Auto Scaling group behind an internet-facing Application Load Balancer (ALB). Launch the EC2 instances in private subnets that do not have internet access", "D": "Host the application on EC2 instances in an Auto Scaling group behind an internet-facing Application Load Balancer (ALB). Launch the EC2 instances in public subnets that use an internet gateway."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 478, "set": 9, "stem": "A company uses AWS AppSync to host GraphQL APIs. The company wants to protect the APIs against common web exploits such as SQL injection and cross-site scripting. Which solution will meet this requirement?", "opts": {"A": "Enforce multi-factor authentication (MFA) through Amazon Cognito user pools. Configure AWS AppSync to use an Amazon Cognito authorizer for access control.", "B": "Use AWS STS to assume an IAM role that enforces fine-grained access control policies through AWS AppSync resolvers.", "C": "Configure AWS AppSync to use OpenID Connect (OIDC) for authentication. Integrate with an AWS Lambda authorizer to validate claims and enforce request policies.", "D": "Create a web ACL in AWS WAF. Define rules to block common web exploits. Associate the web ACL with the AWS AppSync API."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** Create a web ACL in AWS WAF. Define rules to block common web exploits. Associate the web ACL with the AWS AppSync API.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Cognito): এই সেবা ভিন্ন কাজের — web/mobile app-এর user authentication ও federation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 479, "set": 9, "stem": "A company runs several applications on Amazon EC2 instances. The company stores configuration files in an Amazon S3 bucket. A solutions architect must provide the company's applications with access to the configuration files. The solutions architect must follow AWS best practices for security. Which solution will meet these requirements?", "opts": {"A": "Use the AWS account root user access keys.", "B": "Use the AWS access key ID and the EC2 secret access key.", "C": "Use an IAM role to grant the necessary permissions to the applications.", "D": "Activate multi-factor authentication (MFA) and versioning on the S3 bucket."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 480, "set": 9, "stem": "A company runs an application that consists of multiple microservices. The company mandates that the microservices use messages to communicate with each other. The application must archive the microservices' messages for 30 days. Which solution will meet these requirements with the LEAST amount of development effort?", "opts": {"A": "Use an Amazon EventBridge event bus to route messages between the microservices. Use message filtering to ensure that each microservice receives only messages that are relevant to each microservice. Create an archive in Amazon EventBridge to store the messages for 30 days.", "B": "Use a single Amazon SNS topic to distribute the messages. Subscribe each microservice to the topic. Use message filtering to ensure that each microservice receives only messages that are relevant to each microservice. Use an Amazon SQS queue to store the messages for 30 days.", "C": "Use a single Amazon SNS topic to distribute the messages. Subscribe each microservice to the topic. Use message filtering to ensure that each microservice receives only messages that are relevant to each microservice. Store messages in an Amazon S3 bucket for 30 days.", "D": "Create a private Amazon API Gateway HTTP API for the microservices to send messages. Use an AWS Lambda function to forward the messages to the appropriate microservices based on query parameters. Archive messages in Amazon S3 for 30 days."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon EventBridge** ব্যবহার করা হয়েছে। event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 481, "set": 9, "stem": "A company manages a Development account and a Production account. The accounts are part of an organization in AWS Organizations. Employees must authenticate through a corporate SAML identity. provider (IdP). Employees must use single sign-on (SSO) for access to the AWS Management Console and the AWS CLI. The company wants to avoid long-lived access keys. The company must grant administrator access in only the Development account. The company must enforce read-only access through multi-factor authentication (MFA) in only the Production account. The company wants IdP groups to manage onboarding with minimal operational overhead. Which solution will meet these requirements?", "opts": {"A": "Create an Amazon Cognito user pool for workforce signs in to the console and AWS CLI. Attach IAM policies to Amazon Cognito groups for each account.", "B": "Create IAM users in each account and enable MFA. Attach the AdministratorAccess managed policy to users in the Development account. Attach the ReadOnlyAccess policy to users in the Production account. Rotate access keys monthly.", "C": "Create a shared IAM user with programmatic keys in the Development account. Attach the AdministratorAccess managed policy to the user. Configure cross-account roles in the Production account by using sts: AssumeRole. Distribute the credentials to employees.", "D": "Use AWS IAM Identity Center with SAML federation. Create a permission set for administrator access. Assign the permission set to an IdP group for the Development account. Create a permission set for read-only access. Assign the permission set to an IdP group for the Production account."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Cognito): এই সেবা ভিন্ন কাজের — web/mobile app-এর user authentication ও federation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 482, "set": 9, "stem": "A company runs a critical Amazon RDS for MySQL DB instance in a single Availability Zone. The company must improve the availability of the DB instance. Which solution will meet this requirement?", "opts": {"A": "Configure the DB instance to use a multi-Region DB instance deployment.", "B": "Create an Amazon SQS queue in the AWS Region where the company hosts the DB instance to manage writes to the DB instance.", "C": "Configure the DB instance to use a multi-AZ DB instance deployment.", "D": "Create an Amazon SQS queue in a different AWS Region than the Region where the company hosts the DB instance to manage writes to the DB instance."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Configure the DB instance to use a multi-AZ DB instance deployment.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 483, "set": 9, "stem": "An application is experiencing performance issues based on increased demand. This increased demand is on read-only historical records pulled from an Amazon RDS-hosted database with custom views and queries. A solutions architect must improve performance without changing the database structure. Which approach will improve performance and MINIMIZE management overhead?", "opts": {"A": "Deploy Amazon DynamoDB, move all the data, and point to DynamoDB.", "B": "Deploy Amazon ElastiCache (Redis OSS) and cache the data for the application.", "C": "Deploy Memcached on Amazon EC2 and cache the data for the application.", "D": "Deploy Amazon DynamoDB Accelerator (DAX) on Amazon RDS to improve cache performance."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon ElastiCache** ব্যবহার করা হয়েছে। in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 484, "set": 9, "stem": "A company is migrating a document management application to AWS. The application runs on Linux servers. The company will migrate the application to Amazon EC2 instances in an Auto Scaling group. The company stores 7 TiB of documents in a shared storage file system. An external relational database tracks the documents. Documents are stored once and can be retrieved multiple times for reference at any time. The company cannot modify the application during the migration. The storage solution must be highly available and must support scaling over time. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Deploy an EC2 instance with enhanced networking as a shared NFS storage system. Export the NFS share. Mount the NFS share on the EC2 instances in the Auto Scaling group.", "B": "Create an Amazon S3 bucket that uses the S3 Standard-Infrequent Access (S3 Standard-IA) storage class. Mount the S3 bucket on the EC2 instances in the Auto Scaling group.", "C": "Deploy an SFTP server endpoint by using AWS Transfer for SFTP and an Amazon S3 bucket. Configure the EC2 instances in the Auto Scaling group to connect to the SFTP server.", "D": "Create an Amazon EFS file system with mount points in multiple Availability Zones. Use the EFS Standard-Infrequent Access (Standard-IA) storage class. Mount the NFS share on the EC2 instances in the Auto Scaling group."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 485, "set": 9, "stem": "A company is migrating its order processing system to the AWS Cloud. The order processing system must use exact message ordering, a highly available architecture, and loosely coupled components. Which solution will meet these requirements?", "opts": {"A": "Ingest the orders in an Amazon SQS standard queue. Use Amazon EC2 Spot Instances to process the orders", "B": "Push the orders to an Amazon SNS topic. Subscribe an AWS Lambda function to the SNS topic to process the orders.", "C": "Push the orders to a stream in Amazon Kinesis Data Streams. Use Amazon EC2 Spot Instances to process the orders", "D": "Ingest the orders in an Amazon SQS FIFO queue. Invoke an AWS Lambda function to process the orders."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 486, "set": 9, "stem": "A retail company has an application that runs on an Amazon ECS cluster. During weekly sales events, the application experiences performance issues because of sudden traffic surges. The company wants to prepare for the traffic surges before the surges happen. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Use step scaling policies and Amazon CloudWatch alarms.", "B": "Preprovision ECS tasks to the maximum expected capacity to ensure that resources are always available.", "C": "Use ECS predictive scaling to automatically scale based on historical patterns.", "D": "Implement a combination of target tracking and simple scaling policies with 5-minute intervals."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 487, "set": 9, "stem": "A company has a three-tier web application that processes orders from customers. The web tier consists of Amazon EC2 instances behind an Application Load Balancer. The processing tier consists of EC2 instances. The company decoupled the web tier and processing tier by using Amazon SQS. The storage layer uses Amazon DynamoDB. At peak times, some users report order processing delays and halts. The company has noticed that during these delays, the EC2 instances are running at 100% CPU usage, and the SQS queue fills up. The peak times are variable and unpredictable. The company needs to improve the performance of the application. Which solution will meet these requirements?", "opts": {"A": "Use scheduled scaling for Amazon EC2 Auto Scaling to scale out the processing tier instances for the duration of peak usage times. Use the CPUUtilization metric to determine when to scale.", "B": "Use Amazon ElastiCache (Redis OSS) in front of the DynamoDB backend tier. Use target utilization as a metric to determine when to scale.", "C": "Add an Amazon CloudFront distribution to cache the responses for the web tier. Use HTTP latency as a metric to determine when to scale.", "D": "Use an Amazon EC2 Auto Scaling target tracking policy to scale out the processing tier instances. Use the ApproximateNumberOfMessages attribute to determine when to scale."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 488, "set": 9, "stem": "A company is building a new application that will run on Amazon EC2 instances in one AWS Region. The EC2 instances will use Amazon EBS volumes. The business continuity plan requires the ability to fail over to a secondary Region. The failover must have a recovery time objective (RTO) of 4 hours and a recovery point objective (RPO) of 1 hour. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Deploy the application on a smaller number of EC2 instances in the secondary Region. Configure the secondary Region to sync with the primary Region.", "B": "Refactor the application to use an active-active strategy across both Regions. Use Amazon Route 53 and health checks to route requests to the lowest latency Region.", "C": "Use AWS Backup to create a backup plan for the EC2 instances that includes cross-Region backups to the secondary Region. Restore the EC2 instances in the secondary Region in case of failover.", "D": "Deploy a similar number of EC2 instances in the secondary Region. Use AWS DataSync to transfer the data on the EBS volumes from the primary Region to the secondary Region."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **AWS Backup** ব্যবহার করা হয়েছে। একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 489, "set": 9, "stem": "A company develops a multi-tenant application that runs on Amazon EC2 instances in an AWS account. The company performs a security audit. The security audit identifies that the company must separate tenants into dedicated AWS accounts to reduce the potential impact of exploited vulnerabilities across customers The company recently purchased a Savings Plan for the account where the application runs. The company wants to use the discounts in all the accounts where the application will run. Which combination of steps will meet these requirements while following AWS Well-Architected design patterns? (Select TWO.)", "opts": {"A": "From the management account in the AWS Management Console, turn on discount sharing from the billing preferences section.", "B": "From the AWS Management Console of the account that purchased the existing Savings Plan, turn on discount sharing from the billing preferences section. Include all accounts.", "C": "From the AWS Organizations management account, use AWS Resource Access Manager (AWS RAM) to share the Savings Plan with other accounts.", "D": "Create a new AWS account and enable AWS Organizations. Invite the existing AWS account to join the organization. Create new AWS accounts from the management account.", "E": "Create a new AWS account and enable AWS Organizations. Invite the existing AWS account to join the organization. Create the required new AWS accounts from the Organizations management console."}, "ans": ["A", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** From the management account in the AWS Management Console, turn on discount sharing from the billing preferences section.\n✅ **সঠিক উত্তর E:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Compute Savings Plans): এই সেবা ভিন্ন কাজের — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 490, "set": 9, "stem": "A company needs a solution to ingest millions of small telemetry records each minute. The records come from globally distributed mobile devices and run near real-time aggregations. The solution must give multiple downstream applications the ability to replay the ingested data from any point in time. The solution must also scale seamlessly without manual sharding. Which solution will meet these requirements?", "opts": {"A": "Configure Amazon SQS FIFO queues so that multiple consumer groups pull messages and delete the messages after processing.", "B": "Deploy Amazon Kinesis Data Streams. Enable enhanced fan-out consumers to read shards in parallel. Retain the data for 24 hours.", "C": "Provision Amazon MQ ActiveMQ brokers. Create durable topics. Require consumer delivery acknowledgments for each record.", "D": "Invoke AWS Step Functions Standard Workflows from each device. Route the telemetry through parallel processing branches."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon Kinesis Data Streams** ব্যবহার করা হয়েছে। real-time streaming data ingestion ও processing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon MQ): এই সেবা ভিন্ন কাজের — managed ActiveMQ/RabbitMQ — পুরনো message broker (JMS/AMQP) migration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 491, "set": 9, "stem": "A company runs a containerized data processing application. The company deploys the application on a Kubernetes cluster in a remote field office. The company experiences multiple hardware failures that disrupt operations The company needs a solution that can add resilience and deliver minimal latency for the company's field equipment. The solution must be highly available and resilient to temporary network outages. Which solution will meet these requirements?", "opts": {"A": "Deploy an AWS Site-to-Site VPN connection from the field office to the nearest AWS Region. Deploy Amazon EKS across multiple Availability Zones in that Region.", "B": "Deploy an AWS Direct Connect connection from the field office to the nearest Direct Connect location. Deploy Amazon EKS in the nearest AWS Region across multiple Availability Zones", "C": "Order a single AWS Outposts server for the field office. Deploy Amazon EKS with the extended cluster deployment option on the Outposts server", "D": "Order multiple AWS Outposts servers for the field office. Deploy Amazon EKS with the local cluster deployment option on the Outposts servers."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EKS** ব্যবহার করা হয়েছে। managed Kubernetes; IRSA দিয়ে pod-এ IAM role।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 492, "set": 9, "stem": "A company is migrating a PostgreSQL database to AWS. The database load is consistently high. The company has no plans to modify the CPU or memory requirements for next year. The company wants a solution that maximizes cost savings and reduces maintenance overhead. Which combination of options will meet these requirements? (Select TWO.)", "opts": {"A": "Launch an Amazon Aurora PostgreSQL serverless instance.", "B": "Purchase a 3-year No Upfront Compute Savings Plan.", "C": "Launch an Amazon RDS for PostgreSQL instance.", "D": "Purchase a 1-year All Upfront EC2 Instance Savings Plan.", "E": "Purchase a 1-year All Upfront reserved DB instance."}, "ans": ["C", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n✅ **সঠিক উত্তর E:** Purchase a 1-year All Upfront reserved DB instance.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Compute Savings Plans): এই সেবা ভিন্ন কাজের — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 493, "set": 9, "stem": "A gaming company uses an Amazon CloudFront distribution to make files available for download for users around the world. The CloudFront distribution has a custom origin. The company wants to customize the files that are served to users from the cache and origin based on the country where each user is located. Which solution will meet these requirements?", "opts": {"A": "Create an origin request policy. Attach the origin request policy to a cache behavior configuration", "B": "Create a response header policy. Attach the response header policy to a cache behavior configuration.", "C": "Create a cache policy. Attach the cache policy to a cache behavior configuration.", "D": "Add a custom CloudFront-Viewer-Country header to the CloudFront origin"}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Create a cache policy. Attach the cache policy to a cache behavior configuration.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 494, "set": 9, "stem": "A financial services company needs to store and manage trading documentation. The documentation includes real-time trade confirmation data, financial statements, and settlement documents that frequently exceed 1 MB in size. The company's current provisioned database solution stores and manages this documentation. This current solution experiences high-volume trading activity during market hours but very low activity during off-hours The company currently uses a provisioned database solution that is sized to handle the load for peak trading hours. This solution results in significant unused capacity during off-hours. The company needs a solution that will maintain performance during peak hours. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Deploy Amazon RDS for MySQL on Reserved Instances with read replicas for scaling", "B": "Deploy Amazon DocumentDB serverless with automatic capacity scaling.", "C": "Deploy Amazon DynamoDB with auto scaling", "D": "Deploy a MongoDB cluster on Amazon EC2 instances in an Auto Scaling group."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** Deploy Amazon DocumentDB serverless with automatic capacity scaling.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 495, "set": 9, "stem": "A company needs to store email message archives for compliance and auditing purposes. The archives must be accessible from the company's on-premises location by auditors at any time, Which combination of steps will meet these requirements MOST cost-effectively? (Select TWO)", "opts": {"A": "Store the email message archives in Amazon S3 Standard-Infrequent Access (S3 Standard-IA)", "B": "Use Amazon EFS to store and share the email message archives with the auditors.", "C": "Store the email message archives on Amazon EBS volumes. Attach the volumes to Amazon EC2 instances and use scheduled snapshots.", "D": "Deploy Amazon S3 File Gateway on premises to access the email message archives.", "E": "Deploy AWS Storage Gateway Volume Gateway with stored volumes."}, "ans": ["A", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 496, "set": 9, "stem": "A company has an application that runs on Amazon EC2 instances in a private subnet. The application needs to process sensitive information from an Amazon S3 bucket. The application must not use public IP addresses to connect to the S3 bucket Which solution will meet these requirements?", "opts": {"A": "Configure an internet gateway. Update the S3 bucket policy to allow access from the internet gateway. Update the application to use the new internet gateway.", "B": "Configure a VPN connection. Update the S3 bucket policy to allow access from the VPN connection. Update the application to use the new VPN connection.", "C": "Configure a NAT gateway. Update the NAT gateway policy to allow access to the S3 bucket. Update the application to use the new NAT gateway.", "D": "Configure a gateway endpoint for Amazon S3. Update the S3 bucket policy to allow access from the VPC endpoint. Update the application to use the new endpoint."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 497, "set": 9, "stem": "A company has an online delivery system that runs on Amazon EC2 instances and an Amazon RDS for MySQL instance. The RDS for MySQL instance stores 10 GB of delivery and transaction data. The company wants to implement a database disaster recovery (DR) strategy that achieves a recovery time objective (RTO) of less than 3 hours. The company also wants the database DR strategy to achieve a recovery point objective (RPO) of 15 minutes Which solution will meet these requirements?", "opts": {"A": "Schedule a database backup to Amazon S3 Glacier every 15 minutes. Copy the transaction logs to an Amazon S3 bucket every 5 minutes.", "B": "Schedule a database backup to Amazon S3 every hour. Copy the transaction logs to an S3 bucket every 5 minutes.", "C": "Set up asynchronous replication in the database by using a multi-AZ deployment configuration. Copy the transaction logs to an Amazon S3 bucket every 20 minutes", "D": "Schedule a database backup to AWS Storage Gateway every hour. Copy the transaction logs to an Amazon S3 bucket every 20 minutes."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 498, "set": 9, "stem": "A company stores compliance reports and related artifacts as objects in Amazon S3. The report and artifact data totals approximately 50 TB in size. After 30 days, the company rarely accesses the data. When requested, the data must be retrievable within 3 hours Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Store the data in S3 Standard and transition to S3 Glacier Deep Archive after 30 days.", "B": "Store the data in S3 Standard and use an S3 Lifecycle rule to transition to S3 Glacier Flexible Retrieval after 30 days.", "C": "Use S3 Intelligent-Tiering with Archive Access and Deep Archive Access tiers enabled for all objects", "D": "Store the reports on Amazon EBS General Purpose SSD (gp3) volumes. Attach the volumes to an Amazon EC2 host that exports the stored files over SFTP to Amazon S3."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 499, "set": 9, "stem": "A solutions architect is migrating an on-premises application to AWS. The application currently runs on containers. The components of the application are loosely coupled. The application consumes messages from a message queue The solutions architect needs to design a new architecture for the application on AWS. The solutions architect wants to use fully managed AWS services for the new architecture. The new architecture must provide unlimited scalability for the message queue's throughput. Which solution will meet these requirements?", "opts": {"A": "Use Amazon SQS to create a new message queue. Subscribe the SQS queue to an Amazon SNS topic. Use Amazon EC2 Reserved Instances that run Kubernetes containers to consume messages from the message queue.", "B": "Use Amazon NQ to create a new message queue. Subscribe the Amazon MQ queue to an Amazon SNS topic. Use Amazon EKS containers on AWS Fargate to consume messages from the message queue.", "C": "Use Amazon MQ to create a new message queue, Subscribe the Amazon MQ queue to an Amazon SNS topic. Use AWS Lambda functions to poll messages from the Amazon MQ queue by using Lambda event source mappings.", "D": "Use Amazon SQS to create a new message queue. Subscribe the SQS queue to an Amazon SNS topic. Use Amazon ECS containers on AWS Fargate to consume messages from the message queue."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out। এর সঙ্গে **Amazon ECS** — AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon MQ): এই সেবা ভিন্ন কাজের — managed ActiveMQ/RabbitMQ — পুরনো message broker (JMS/AMQP) migration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon MQ): এই সেবা ভিন্ন কাজের — managed ActiveMQ/RabbitMQ — পুরনো message broker (JMS/AMQP) migration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 500, "set": 9, "stem": "A team of analysts uses AWS Account A. The team of analysts needs read-only access to an Amazon S3 bucket in Account B.  The solution must follow the listed guidelines:  Avoid public access  Follow the principle of least privilege  Reduce administrative complexity Which solution will meet these requirements?", "opts": {"A": "Add a bucket policy that grants s3:GetObject to the Account A root principal. Allow analysts to use their own IAM user accounts.", "B": "In Account B, create an IAM role that is trusted by Account A. Attach a least-privilege S3 policy. Require analysts to assume the role to read from the bucket.", "C": "Create an IAM user in Account B with access keys. Share the keys with the team of analysts for bucket access.", "D": "Use S3 object ACLs to grant READ to each analyst's canonical user ID from Account A."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 501, "set": 10, "stem": "A company uses Amazon EC2 instances spread across two Availability Zones to provide large and small maps to customers. The large maps do not change. The company updates the small maps by adding small metadata files each day. Customers download the large maps once but download the smaller maps frequently. Several Amazon EBS volumes of replicated data are spread between the Availability Zones. Which solutions will store the map data MOST cost-effectively? (Select TWO.)", "opts": {"A": "Deploy an Amazon EFS file system. Mount the file system to the EC2 instances. Move the map and metadata files to the file system. Apply a storage lifecycle policy to move files older than 30 days into the EFS Infrequent Access (IA) storage class.", "B": "Create an Amazon S3 bucket. Update the application to read data files from the S3 bucket. Apply an S3 Lifecycle configuration to move files older than 30 days into the S3 Infrequent Access (IA) storage class.", "C": "Create an Amazon FSx for OpenZFS file system. Move the map and metadata files to the file system. Configure the file system to use the Intelligent-Tiering storage class.", "D": "Create a shared EBS volume. Connect the EC2 instances to the shared volume. Move the map and metadata files into the new volume. Detach and delete the original EBS volumes from the EC2 instances.", "E": "Create an Amazon FSx for Lustre file system that uses the SCRATCH_2 deployment type. Move the map and metadata files to the file system."}, "ans": ["A", "B"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon FSx for Lustre): এই সেবা ভিন্ন কাজের — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 502, "set": 10, "stem": "A company is launching a new product and needs to collect data about the product's usage frequency. The company will review the data in an existing Amazon Quick Sight dashboard. The data is in multiple formats, including Parquet, JSON, and CSV. The company wants to unify the data format and review the data by using ready-made SQL queries without using external tools. Which combination of steps will meet these requirements? (Select TWO.)", "opts": {"A": "Collect product data by using Amazon Kinesis Data Streams. Send the data to Amazon Data Firehose for processing. Set up a partition schema. Save the data in an Amazon S3 bucket", "B": "Set up an AWS Glue transformation job to convert data into Parquet format. Store the data in an Amazon S3 bucket. Prepare Amazon Athena queries for data reporting. Authorize connection access from the Quick Sight dashboard to Athena.", "C": "Create an Amazon Managed Grafana dashboard that has prebuilt queries. Use Amazon CloudWatch as the data source. Use an Amazon EventBridge rule to run an AWS Lambda function that loads data from Amazon S3 into CloudWatch custom metrics.", "D": "Collect product information by using an Amazon API Gateway REST API, Integrate an AWS Lambda function with the REST API. Configure the Lambda function to sort data into a partition schema and store the data in an Amazon S3 bucket.", "E": "Set up an AWS Step Functions workflow to convert data into Parquet format. Store the data in an Amazon S3 bucket."}, "ans": ["B", "D"], "sel": 2, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Glue** ব্যবহার করা হয়েছে। serverless ETL ও data catalog। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n✅ **সঠিক উত্তর D:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 503, "set": 10, "stem": "A company's compliance archive holds 120 TB of objects in an Amazon S3 bucket in the Standard access tier. The company accesses the objects frequently during the first 30 days after creation. After the initial 30 days, the company rarely reads the objects. However, the objects must be retrievable in under 1 minute when the company needs the objects. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Store objects in S3 Standard-Infrequent Access (Standard-IA) for the full retention period.", "B": "Use an S3 Lifecycle rule to transition objects to S3 Glacier Instant Retrieval after 30 days.", "C": "Use an S3 Lifecycle rule to transition objects to S3 Glacier Flexible Retrieval after 30 days.", "D": "Enable S3 Intelligent-Tiering. Configure S3 Intelligent-Tiering to store objects in S3 Glacier Deep Archive automatically after 30 days."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 504, "set": 10, "stem": "A company manages client deployments in individual VPCs and one shared services VPC. Each VPC uses one NAT gateway for each Availability Zone and an internet gateway for outbound traffic. The client deployments use the outbound connections only to call an external API that is available over IPv4 and IPv6. The company wants to reduce the quantity of NAT gateways to reduce costs. The client deployments should only have outbound access to the internet. The shared services VPC does not require internet access. Which solution will meet these requirements?", "opts": {"A": "Move the clients into public subnets. Assign only an IPv6 address. Delete all NAT gateways.", "B": "Create an outbound-only internet gateway in each VPC. Add a route that directs all IPv6 traffic to the outbound-only internet gateway. Delete all NAT gateways.", "C": "Create an AWS Transit Gateway in the shared services VPC. Attach all client VPCs to the Transit Gateway. Configure routing so all traffic from the client VPCs routes to the shared services VPC. Delete all NAT gateways.", "D": "Delete the NAT gateways in all client VPCs. Configure all route tables to route internet traffic to the shared services VPC."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** Create an outbound-only internet gateway in each VPC. Add a route that directs all IPv6 traffic to the outbound-only internet gateway. Delete all NAT gateways.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 505, "set": 10, "stem": "A company runs an application on Amazon EC2 instances. The EC2 instances are in an Amazon EC2 Auto Scaling group behind an Application Load Balancer (ALB) in a single AWS Region. In the application, multiple users share the same long-running session. The shared sessions result in uneven loads across the EC2 instances. The company wants to launch the application in additional Regions. The company will deploy the application with an ALB and an Auto Scaling group in each additional Region. The company requires a solution that keeps users who are sharing a session connected to the same EC2 instance. The solution must minimize network latency and distribute loads more evenly across the EC2 instances. Which combination of steps will meet these requirements? (Select TWO.)", "opts": {"A": "Use the Amazon Route 53 geoproximity routing policy to route traffic to an EC2 instance that is behind the ALB in the Region that is closest to each user.", "B": "Use AWS Global Accelerator to create a custom routing accelerator. Configure the accelerator to route traffic to an EC2 instance that is behind the ALB in the Region that is closest to each user.", "C": "Configure the ALB to use the weighted random routing algorithm.", "D": "Use AWS Global Accelerator to create a standard accelerator. Configure the accelerator to route traffic to an EC2 instance that is behind the ALB in the Region that is closest to each user.", "E": "Configure the ALB to use the least outstanding requests routing algorithm."}, "ans": ["B", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **AWS Global Accelerator** ব্যবহার করা হয়েছে। AWS global network দিয়ে anycast IP-এ TCP/UDP traffic কম latency-তে routing। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n✅ **সঠিক উত্তর D:** এখানে **AWS Global Accelerator** ব্যবহার করা হয়েছে। AWS global network দিয়ে anycast IP-এ TCP/UDP traffic কম latency-তে routing। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **E**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 506, "set": 10, "stem": "A company runs an application on Amazon EC2 instances across multiple Availability Zones. For compliance reasons, the EC2 instances cannot be accessible from the internet. The EC2 instances must run within private subnets that use a shared route table. The VPC contains a single NAT gateway for internet connectivity. The company wants to improve the reliability of the connectivity to an AWS Systems Manager service. Which solution will meet these requirements with the LEAST operational effort?", "opts": {"A": "Deploy an additional NAT gateway in each Availability Zone. Update the shared route table with the new NAT gateway addresses.", "B": "Take an Amazon Machine Image (AMI) of the existing EC2 instances. Relaunch the instances into public subnets. Enable VPC Block Public Access.", "C": "Create an interface VPC endpoint for Systems Manager ssmmessages. Specify a subnet in each Availability Zone.", "D": "Create an AWS Transit Gateway and a centralized outbound VPC to access the Systems Manager service."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর C:** Create an interface VPC endpoint for Systems Manager ssmmessages. Specify a subnet in each Availability Zone.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 507, "set": 10, "stem": "A company is launching a new product and needs to collect data about the product's usage frequency. The company will review the data in an existing Amazon Quick Sight dashboard. The data is in multiple formats, including Parquet, JSON, and CSV. The company wants to unify the data format and review the data by using ready-made SQL queries without using external tools. Which combination of steps will meet these requirements? (Select TWO.)", "opts": {"A": "Collect product data by using Amazon Kinesis Data Streams. Send the data to Amazon Data Firehose for processing. Set up a partition schema. Save the data in an Amazon S3 bucket.", "B": "Set up an AWS Glue transformation job to convert data into Parquet format. Store the data in an Amazon S3 bucket. Prepare Amazon Athena queries for data reporting. Authorize connection access from the Quick Sight dashboard to Athena.", "C": "Create an Amazon Managed Grafana dashboard that has prebuilt queries. Use Amazon CloudWatch as the data source. Use an Amazon EventBridge rule to run an AWS Lambda function that loads data from Amazon S3 into CloudWatch custom metrics.", "D": "Collect product information by using an Amazon API Gateway REST API. Integrate an AWS Lambda function with the REST API. Configure the Lambda function to sort data into a partition schema and store the data in an Amazon S3 bucket.", "E": "Set up an AWS Step Functions workflow to convert data into Parquet format. Store the data in an Amazon S3 bucket."}, "ans": ["A", "B"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon Kinesis Data Streams** ব্যবহার করা হয়েছে। real-time streaming data ingestion ও processing। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর B:** এখানে **AWS Glue** ব্যবহার করা হয়েছে। serverless ETL ও data catalog। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n❌ **কেন অন্যগুলো নয়:**\n• **C** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 508, "set": 10, "stem": "A company hosts a popular social networking application on premises. Both the web tier and the application tier run on the same server. The company wants to migrate the application to AWS to handle increased user traffic. The solution must minimize migration effort and ongoing operational costs. The solution must reuse the existing application code. The application must scale to handle millions of requests. The application must be highly available. Which solution will meet these requirements?", "opts": {"A": "Deploy the application on an Amazon ECS cluster. Configure AWS Application Auto Scaling. Create an Application Load Balancer (ALB). Set the ECS cluster as an ALB target. Create an Amazon CloudFront distribution that uses the ALB as an origin.", "B": "Create a self-managed Kubernetes cluster on three Amazon EC2 instances in one Availability Zone. Configure scaling metrics within the cluster. Create an AWS Global Accelerator standard accelerator. Set the cluster as an endpoint.", "C": "Create an Amazon API Gateway REST API. Reconfigure the application to use AWS Lambda functions. Configure the Lambda functions to use reserved concurrency.", "D": "Configure an Amazon CloudFront distribution with a custom origin to serve traffic from the on- premises environment. Configure an AWS Site-to-Site VPN connection between the on-premises environment and AWS."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integr
