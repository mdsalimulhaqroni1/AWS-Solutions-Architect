ity group to the EC2 instance security group on port 443. Create an IAM role for the EC2 instance and attach the AmazonSSMReadOnlyAccess policy."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 126, "set": 2, "stem": "A company hosts an application on AWS that gives users the ability to download photos. The company stores all photos in an Amazon S3 bucket that is located in the us-east-1 Region The company wants to provide the photo download application to global customers with low latency. Which solution will meet these requirements?", "opts": {"A": "Find the public IP addresses that Amazon S3 uses in us-east-1. Configure an Amazon Route 53 latency-based routing policy that routes to all the public IP addresses.", "B": "Configure an Amazon CloudFront distribution in front of the S3 bucket. Use the distribution endpoint to access the photos that are in the S3 bucket.", "C": "Configure an Amazon Route 53 geoproximity routing policy to route the traffic to the S3 bucket that is closest to each customer's location.", "D": "Create a new S3 bucket in the us-west-1 Region. Configure an S3 Cross-Region Replication rule to copy the photos to the new S3 bucket."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর B:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 127, "set": 2, "stem": "A company wants to analyze and generate reports to track the usage of its mobile app. The app is popular and has a global user base. The company uses a custom report building program to analyze application usage The program generates multiple reports during the last week of each month. The program takes less than 10 minutes to produce each report. The company rarely uses the program to generate reports outside of the last week of each month. The company wants to generate reports in the least amount of time when the reports are requested Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Run the program by using Amazon EC2 On-Demand Instances. Create an Amazon EventBridge rule to start the EC2 instances when reports are requested. Run the EC2 instances continuously during the last week of each month.", "B": "Run the program in AWS Lambda. Create an Amazon EventBridge rule to run a Lambda function when reports are requested.", "C": "Run the program in Amazon Elastic Container Service (Amazon ECS). Schedule Amazon ECS to run the program when reports are requested.", "D": "Run the program by using Amazon EC2 Spot Instances. Create an Amazon EventBridge rule to start the EC2 instances when reports are requested. Run the EC2 instances continuously during the last week of each month."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 128, "set": 2, "stem": "A company runs a non-production Oracle database on an Amazon EC2 instance. The database contains 1 TB of data. The EC2 instance runs in a private subnet of a VPC. A backup of the EC2 instance is taken every day and uploaded to an Amazon S3 bucket. The current backup process uses a NAT gateway to access the S3 bucket The company does not want the backup process to use public IP addresses. Which solution will meet this requirement MOST cost-effectively?", "opts": {"A": "Create a gateway endpoint for Amazon S3 in the VPC. Update the route tables.", "B": "Enable S3 Transfer Acceleration on the S3 bucket. Compress the backup files and use multipart uploads.", "C": "Create an Amazon CloudFront distribution, and set the S3 bucket as the origin. Upload the backup files to the CloudFront distribution", "D": "Use a third-party tool to mount the S3 bucket as a file share on the EC2 instance operating system. Use the file share as the backup target."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 129, "set": 2, "stem": "A company is upgrading its critical web-based application. The application is hosted on Amazon EC2 instances that are part of an Auto Scaling group behind an Application Load Balancer (ALB). The company wants to test the new configurations with a specific amount of traffic before the company begins to route all traffic to the upgraded application. How should a solutions architect design the architecture to meet these requirements?", "opts": {"A": "Create a new launch template. Associate the new launch template with the Auto Scaling group. Attach the Auto Scaling group to the ALB. Distribute traffic by using redirect rules.", "B": "Create a new launch template. Create an additional Auto Scaling group. Associate the new launch template with the additional Auto Scaling group. Attach the additional Auto Scaling group to the ALB. Distribute traffic by using weighted target groups.", "C": "Create a new launch template. Create an additional Auto Scaling group. Associate the new launch template with the additional Auto Scaling group. Create an additional ALB. Attach the additional Auto Scaling group to the additional ALB. Use an Amazon Route 53 failover routing policy to route traffic.", "D": "Create a new launch template. Create an additional Auto Scaling group. Associate the new launch template with the additional Auto Scaling group. Create an additional ALB. Attach the additional Auto Scaling group to the additional ALB. Use an Amazon Route 53 weighted routing policy to route traffic."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 130, "set": 2, "stem": "A company is migrating an application from an on-premises location to Amazon Elastic Kubernetes Service (Amazon EKS). The company must use a custom subnet for pods that are in the company's VPC to comply with requirements. The company also needs to ensure that the pods can communicate securely within the pods' VPC Which solution will meet these requirements?", "opts": {"A": "Configure AWS Transit Gateway to directly manage custom subnet configurations for the pods in Amazon EKS.", "B": "Create an AWS Direct Connect connection from the company's on-premises IP address ranges to the EKS pods.", "C": "Use the Amazon VPC CNI plugin for Kubernetes. Define custom subnets in the VPC cluster for the pods to use.", "D": "Implement a Kubernetes network policy that has pod anti-affinity rules to restrict pod placement to specific nodes that are within custom subnets"}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Use the Amazon VPC CNI plugin for Kubernetes. Define custom subnets in the VPC cluster for the pods to use.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Transit Gateway): এই সেবা ভিন্ন কাজের — বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 131, "set": 2, "stem": "A company's application uses Network Load Balancers, Auto Scaling groups, Amazon EC2 instances, and databases that are deployed in an Amazon VPC. The company wants to capture information about traffic to and from the network interfaces in near real time in its Amazon VPC. The company wants to send the information to Amazon OpenSearch Service for analysis. Which solution will meet these requirements?", "opts": {"A": "Create a log group in Amazon CloudWatch Logs. Configure VPC Flow Logs to send the log data to the log group. Use Amazon Kinesis Data Streams to stream the logs from the log group to OpenSearch Service.", "B": "Create a log group in Amazon CloudWatch Logs. Configure VPC Flow Logs to send the log data to the log group. Use Amazon Data Firehose to stream the logs from the log group to OpenSearch Service", "C": "Create a trail in AWS CloudTrail. Configure VPC Flow Logs to send the log data to the trail. Use Amazon Kinesis Data Streams to stream the logs from the trail to OpenSearch Service", "D": "Create a trail in AWS CloudTrail. Configure VPC Flow Logs to send the log data to the trail. Use Amazon Data Firehose to stream the logs from the trail to OpenSearch Service."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon CloudWatch** ব্যবহার করা হয়েছে। metric, log, alarm ও monitoring।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS CloudTrail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS CloudTrail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 132, "set": 2, "stem": "A company has an application that runs on Amazon EC2 instances in an Auto Scaling group. The application uses hardcoded credentials to access an Amazon RDS database. To comply with new regulations, the company needs to automatically rotate the database password for the application service account every 90 days. Which solution will meet these requirements?", "opts": {"A": "Create an AWS Lambda function to generate new randomized passwords. Configure an Amazon EventBridge rule to invoke the Lambda function every 90 days. Configure the Lambda function to upload a JSON file that contains the new password to the existing EC2 instances by using SSH", "B": "Create a secret for the database credentials in AWS Secrets Manager. Schedule an AWS Lambda function in Secrets Manager to rotate the secret every 90 days. Modify the application to read the database credentials from Secrets Manager", "C": "Create a new Amazon ECS task to generate new randomized passwords. Configure the task to launch every 90 days. Configure the task to upload a JSON file that contains the new password to the existing EC2 instances by using SSH.", "D": "Create a new EC2 instance that runs a cron job every 90 days. Use the cron job to generate new randomized passwords. Configure the new EC2 instance to upload a JSON file that contains the new password to the existing EC2 instances by using SSH."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 133, "set": 2, "stem": "A company uses an Amazon CloudFront distribution to serve content pages for its website. The company needs to ensure that clients use a TLS certificate when accessing the company's website. The company wants to automate the creation and renewal of the TLS certificates. Which solution will meet these requirements with the MOST operational efficiency?", "opts": {"A": "Use a CloudFront security policy to create a certificate.", "B": "Use a CloudFront origin access control (OAC) to create a certificate.", "C": "Use AWS Certificate Manager (ACM) to create a certificate. Use DNS validation for the domain.", "D": "Use AWS Certificate Manager (ACM) to create a certificate. Use email validation for the domain."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Use AWS Certificate Manager (ACM) to create a certificate. Use DNS validation for the domain.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 134, "set": 2, "stem": "A company has a web application with sporadic usage patterns. There is heavy usage at the beginning of each month, moderate usage at the start of each week, and unpredictable usage during the week. The application consists of a web server and a MySQL, database server running inside the data center. The company would like to move the application to the AWS Cloud, and needs to select a cost-effective database platform that will not require database modifications. Which solution will meet these requirements?", "opts": {"A": "Amazon DynamoDB", "B": "Amazon RDS for MySQL", "C": "MySQL-compatible Amazon Aurora Serverless", "D": "MySQL deployed on Amazon EC2 in an Auto Scaling group"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 135, "set": 2, "stem": "A company is running a multi-tier web application on AWS. The application runs its database tier on Amazon Aurora MySQL. The application and database tiers are in the us-east-1 Region. A database administrator who monitors the Aurora DB cluster finds that an intermittent increase in read traffic is creating high CPU utilization on the read replica. The result is increased read latency for the application. The memory and disk utilization of the DB instance are stable throughout the event of increased latency. What should a solutions architect do to improve the read scalability?", "opts": {"A": "Reboot the DB cluster.", "B": "Create a cross-Region read replica.", "C": "Configure Aurora Auto Scaling for the read replica", "D": "Increase the provisioned read IOPS for the DB instance"}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 136, "set": 2, "stem": "A company is deploying a critical application by using Amazon RDS for MySQL. The application must be highly available and must recover automatically. The company needs to support interactive users (transactional queries) and batch reporting (analytical queries) with no more than a 4-hour lag. The analytical queries must not affect the performance of the transactional queries. Which solution will meet these requirements?", "opts": {"A": "Configure Amazon RDS for MySQL in a Multi-AZ DB instance deployment with one standby instance. Point the transactional queries to the primary DB instance. Point the analytical queries to a secondary DB instance that runs in a different Availability Zone.", "B": "Configure Amazon RDS for MySQL in a Multi-AZ DB cluster deployment with two standby instances. Point the transactional queries to the primary DB instance. Point the analytical queries to the reader endpoint.", "C": "Configure Amazon RDS for MySQL to use multiple read replicas across multiple Availability Zones. Point the transactional queries to the primary DB instance. Point the analytical queries to one of the replicas in a different Availability Zone.", "D": "Configure Amazon RDS for MySQL as the primary database for the transactional queries with automated backups enabled. Configure automated backups. Each night, create a read-only database from the most recent snapshot to support the analytical queries. Terminate the previously created database."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 137, "set": 2, "stem": "A solutions architect has AWS Lambda functions that need to access a company's internal data science libraries and reference data. Separate teams manage the libraries and the data. The teams must be able to update and upload new data independently. The Lambda functions are connected to the company's central VPC. Which solution will provide the Lambda functions with access to the libraries and data?", "opts": {"A": "Attach an Amazon EBS volume to the Lambda functions by using EBS Multi-Attach in the central VPC. Update the Lambda function execution roles to give the functions access to the EBS volume. Update the Lambda function code to reference the files in the EBS volume.", "B": "Compress the libraries and reference data in a Lambda /tmp folder. Update the Lambda function code to reference the files in the /tmp folder.", "C": "Set up an Amazon EFS file system with mount targets in the central VPC. Configure the Lambda functions to mount the EFS file system. Update the Lambda function execution roles to give the functions access to the EFS file system.", "D": "Set up an Amazon FSx for Windows File Server file system with mount targets in the central VPC. Configure the Lambda functions to mount the Amazon FSx file system. Update the Lambda function execution roles to give the functions access to the Amazon FSx file system."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon FSx for Windows File Server): এই সেবা ভিন্ন কাজের — Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 138, "set": 2, "stem": "A company has an organization in AWS Organizations that has all features enabled. The company requires that all API calls and logins in an any existing or new AWS account must be audited. The company needs a managed solution to prevent additional work and to minimize costs. The company also needs to know when any AWS account is not compliant with the AWS Foundational Security Best Practices (FSBP) standard. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Deploy an AWS Control Tower environment in the Organizations management account. Enable AWS Security Hub and AWS Control Tower Account Factory in the environment.", "B": "Deploy an AWS Control Tower environment in a dedicated Organizations member account. Enable AWS Security Hub and AWS Control Tower Account Factory in the environment.", "C": "Use AWS Managed Services (AMS) Accelerate to build a multi-account landing zone (MALZ). Submit an RFC to self-service provision Amazon GuardDuty in the MALZ", "D": "Use AWS Managed Services (AMS) Accelerate to build a multi-account landing zone (MALZ). Submit an RFC to self-service provision AWS Security Hub in the MALZ"}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর A:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এর সঙ্গে **AWS Security Hub** — বিভিন্ন security service-এর finding এক জায়গায় একত্র করে dashboard-এ দেখায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon GuardDuty): এই সেবা ভিন্ন কাজের — AWS account, workload ও S3 এর উপর দুষ্ট (malicious) ও অস্বাভাবিক কার্যকলাপ বিরামহীনভাবে মনিটর করে (threat detection)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Security Hub): এই সেবা ভিন্ন কাজের — বিভিন্ন security service-এর finding এক জায়গায় একত্র করে dashboard-এ দেখায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 139, "set": 2, "stem": "A company is designing a web application on AWS. The application uses a VPN connection between the company's on-premises data center and the company's VPC. The company uses Amazon Route 53 as its DNS service. The application must use private DNS records to communicate with the on-premises services from a VPC. Which solution will meet these requirements MOST securely?", "opts": {"A": "Create a Route 53 Resolver outbound endpoint. Create a Resolver rule. Associate the Resolver rule with the VPC.", "B": "Create a Route 53 Resolver inbound endpoint. Create a Resolver rule. Associate the Resolver rule with the VPC.", "C": "Create a Route 53 private hosted zone. Associate the private hosted zone with the on-premises network.", "D": "Create a Route 53 public hosted zone. Create a record for each on-premises service to allow the services to communicate with the web application."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon Route 53** ব্যবহার করা হয়েছে। DNS ও routing policy (latency, failover, geolocation) + health check।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 140, "set": 2, "stem": "An ecommerce company is redesigning a web application to run on the AWS Cloud. The application needs to store static website content and must use a Microsoft SQL Server database to store customer data. The company needs to deploy the application in a resilient way across multiple Availability Zones. Which solution will meet these requirements?", "opts": {"A": "Use an Amazon S3 bucket to store static content. Deploy an Amazon RDS Custom for SQL Server DB instance for the database.", "B": "Use an Amazon S3 bucket to store static content. Create an Amazon RDS for SQL Server Multi- AZ deployment for the database.", "C": "Create an Amazon Elastic Block Store (Amazon EBS) Multi-Attach volume to store static content. Deploy an Amazon RDS for SQL Server DB instance for the database.", "D": "Create an Amazon Elastic Block Store (Amazon EBS) Multi-Attach volume to store static content. Deploy SQL Server on two Amazon EC2 instances in separate Availability Zones."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 141, "set": 2, "stem": "A company's expense tracking application gives users the ability to upload images of receipts. The application analyzes the receipts to extract information and stores the raw images in Amazon S3. The application is written in Java and runs on Amazon EC2 On-Demand Instances in an Auto Scaling group behind an Application Load Balancer. The compute costs and storage costs have increased with the popularity of the application. Which solution will provide the MOST cost savings without affecting application performance?", "opts": {"A": "Purchase a Compute Savings Plan for the maximum number of necessary EC2 instances. Store the uploaded files in Amazon Elastic File System (Amazon EFS),", "B": "Decrease the minimum number of EC2 instances in the Auto Scaling group. Use On-Demand Instances for peak scaling. Store the uploaded files in Amazon Elastic File System (Amazon EFS).", "C": "Decrease the maximum number of EC2 instances in the Auto Scaling group. Set up S3 Lifecycle policies to archive the raw images to lower-cost storage tiers after 30 days.", "D": "Purchase a Compute Savings Plan for the minimum number of necessary EC2 instances. Use On-Demand Instances for peak scaling. Set up S3 Lifecycle policies to archive the raw images to lower-cost storage tiers after 30 days."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Compute Savings Plans** — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 142, "set": 2, "stem": "A company runs database workloads on AWS that are the backend for the company's customer portals. The company runs a Multi-AZ database cluster on Amazon RDS for PostgreSQL The company needs to implement a 30-day backup retention policy. The company currently has both automated RDS backups and manual RDS backups. The company wants to maintain both types of existing RDS backups that are less than 30 days old. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure the RDS backup retention policy to 30 days for automated backups by using AWS Backup. Manually delete manual backups that are older than 30 days.", "B": "Disable RDS automated backups. Delete automated backups and manual backups that are older than 30 days. Configure the RDS backup retention policy to 30 days for automated backups.", "C": "Configure the RDS backup retention policy to 30 days for automated backups. Manually delete manual backups that are older than 30 days.", "D": "Disable RDS automated backups. Delete automated backups and manual backups that are older than 30 days automatically by using AWS CloudFormation. Configure the RDS backup retention policy to 30 days for automated backups."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 143, "set": 2, "stem": "A company is developing a social media application. The company anticipates rapid and unpredictable growth in users and data volume. The application needs to handle a continuous high volume of user requests. User requests include long-running processes that store large amounts of user-generated content and user profiles in a relational format. The processes must run in a specific order. The company requires an architecture that can scale resources to meet demand spikes without downtime or performance degradation. The company must ensure that the components of the application can evolve independently without affecting other parts of the system. Which combination of AWS services will meet these requirements?", "opts": {"A": "Deploy the application on Amazon Elastic Container Service (Amazon ECS) with the AWS Fargate launch type. Use Amazon RDS as the database. Use Amazon Simple Queue Service (Amazon SQS) to decouple message processing between components.", "B": "Deploy the application on Amazon Elastic Container Service (Amazon ECS) with the AWS Fargate launch type. Use Amazon RDS as the database. Use Amazon Simple Notification Service (Amazon SNS) to decouple message processing between components", "C": "Use Amazon DynamoDB as the database. Use AWS Lambda functions to implement the application. Configure Amazon DynamoDB Streams to invoke the Lambda functions. Use AWS Step Functions to manage workflows between services.", "D": "Use an AWS Elastic Beanstalk environment with auto scaling to deploy the application. Use Amazon RDS as the database. Use Amazon Simple Notification Service (Amazon SNS) to decouple message processing between components"}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **AWS Fargate** — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Elastic Beanstalk): এই সেবা ভিন্ন কাজের — অ্যাপ ডিপলয় অরকেস্ট্রেশন (PaaS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 144, "set": 2, "stem": "A company is planning to deploy a business-critical application in the AWS Cloud. The application requires durable storage with consistent, low-latency performance. Which type of storage should a solutions architect recommend to meet these requirements?", "opts": {"A": "Instance store volume", "B": "Amazon ElastiCache (Memcached) cluster", "C": "Provisioned IOPS SSD Amazon Elastic Block Store (Amazon EBS) volume", "D": "Throughput Optimized HDD Amazon Elastic Block Store (Amazon EBS) volume"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, উচ্চ durability।\n✅ **সঠিক উত্তর C:** এখানে **Amazon EBS** ব্যবহার করা হয়েছে। একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 145, "set": 2, "stem": "An ecommerce company is migrating its on-premises workload to the AWS Cloud The workload currently consists of a web application and a backend Microsoft SQL database for storage. The company expects a high volume of customers during a promotional event. The new infrastructure in the AWS Cloud must be highly available and scalable. Which solution will meet these requirements with the LEAST administrative overhead?", "opts": {"A": "Migrate the web application to two Amazon EC2 instances across two Availability Zones behind an Application Load Balancer. Migrate the database to Amazon RDS for Microsoft SQL Server with read replicas in both Availability Zones.", "B": "Migrate the web application to an Amazon EC2 instance that runs in an Auto Scaling group across two Availability Zones behind an Application Load Balancer. Migrate the database to two EC2 instances across separate AWS Regions with database replication.", "C": "Migrate the web application to Amazon EC2 instances that run in an Auto Scaling group across two Availability Zones behind an Application Load Balancer. Migrate the database to Amazon RDS with Multi-AZ deployment.", "D": "Migrate the web application to three Amazon EC2 instances across three Availability Zones behind an Application Load Balancer. Migrate the database to three EC2 instances across three Availability Zones."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 146, "set": 2, "stem": "A company runs its critical storage application in the AWS Cloud. The application uses Amazon S3 in two AWS Regions. The company wants the application to send remote user data to the nearest S3 bucket with no public network congestion. The company also wants the application to fail over with the least amount of management of Amazon S3. Which solution will meet these requirements?", "opts": {"A": "Implement an active-active design between the two Regions. Configure the application to use the regional S3 endpoints closest to the user", "B": "Use an active-passive configuration with S3 Multi-Region Access Points. Create a global endpoint for each of the Regions.", "C": "Send user data to the regional S3 endpoints closest to the user. Configure an S3 cross-account replication rule to keep the S3 buckets synchronized.", "D": "Set up Amazon S3 to use Multi-Region Access Points in an active-active configuration with a single global endpoint. Configure $3 Cross-Region Replication."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 147, "set": 2, "stem": "A company runs its critical storage application in the AWS Cloud. The application uses Amazon S3 in two AWS Regions. The company wants the application to send remote user data to the nearest S3 bucket with no public network congestion. The company also wants the application to fail over with the least amount of management of Amazon S3. Which solution will meet these requirements?", "opts": {"A": "Implement an active-active design between the two Regions. Configure the application to use the regional S3 endpoints closest to the user", "B": "Use an active-passive configuration with S3 Multi-Region Access Points. Create a global endpoint for each of the Regions.", "C": "Send user data to the regional S3 endpoints closest to the user. Configure an S3 cross-account replication rule to keep the S3 buckets synchronized.", "D": "Set up Amazon S3 to use Multi-Region Access Points in an active-active configuration with a single global endpoint. Configure $3 Cross-Region Replication."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 148, "set": 2, "stem": "A company's sales team and operations team each run dozens of applications across two AWS Regions. Each application runs in a separate VPC. The company needs to establish communication between these applications. The solution must be scalable. Which solution meets these requirements with the LEAST manual effort?", "opts": {"A": "Create VPC peering connections between each VPC across both Regions. Create entries in the route tables associated with the VPCs to route network traffic between the VPCs based on the peering connections.", "B": "Create one transit gateway in each Region. Attach each VPC to the transit gateway in the same Region. Create a peering connection between the transit gateways. Configure the transit gateway route tables and VPC route tables with the appropriate routes to each attachment.", "C": "Create AWS Site-to-Site VPN connections between each VPC across both Regions. Add an entry in each VPC route table for the VPN connection with the appropriate CIDR addresses of each VPC.", "D": "Create individual AWS Direct Connect connections between each VPC across both Regions. Add an entry in each VPC route table for the Direct Connect connection with the appropriate CIDR addresses of each VPC."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Transit Gateway** ব্যবহার করা হয়েছে। বহু VPC ও on-prem network-কে একটি hub দিয়ে সংযুক্ত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (VPC Peering): এই সেবা ভিন্ন কাজের — দুটি VPC-এর মধ্যে সরাসরি private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 149, "set": 2, "stem": "A company is running a two-tier web-based application in an on-premises data center. The application layer consists of a single server running a stateful application. The application connects to a PostgreSQL database running on a separate server. The application's user base is expected to grow significantly, so the company is migrating the application and database to AWS. The solution will use Amazon Aurora PostgreSQL, Amazon EC2 Auto Scaling, and Elastic Load Balancing. Which solution will provide a consistent user experience that will allow the application and database tiers to scale?", "opts": {"A": "Enable Aurora Auto Scaling for Aurora Replicas. Use a Network Load Balancer with the least outstanding requests routing algorithm and sticky sessions enabled.", "B": "Enable Aurora Auto Scaling for Aurora writers. Use an Application Load Balancer with the round robin routing algorithm and sticky sessions enabled.", "C": "Enable Aurora Auto Scaling for Aurora Replicas. Use an Application Load Balancer with the round robin routing algorithm and sticky sessions enabled", "D": "Enable Aurora Auto Scaling for Aurora writers. Use a Network Load Balancer with the least outstanding requests routing algorithm and sticky sessions enabled"}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Application Load Balancer (ALB)** — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 150, "set": 2, "stem": "A company is migrating its workloads to AWS. The company has sensitive and critical data in on- premises relational databases that run on SQL Server instances. The company wants to use the AWS Cloud to increase security and reduce operational overhead for the databases. Which solution will meet these requirements?", "opts": {"A": "Migrate the databases to Amazon EC2 instances. Use an AWS Key Management Service (AWS KMS) AWS managed key for encryption.", "B": "Migrate the databases to a Multi-AZ Amazon RDS for SQL Server DB instance. Use an AWS Key Management Service (AWS KMS) AWS managed key for encryption.", "C": "Migrate the data to an Amazon S3 bucket. Use Amazon Macie to ensure data security", "D": "Migrate the databases to an Amazon DynamoDB table. Use Amazon CloudWatch Logs to ensure data security."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর B:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **AWS KMS** — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 151, "set": 3, "stem": "A company is using an Active Directory based Identity provider (IdP) service that supports SAML 2.0. The company wants to use the existing authentication solution to access the AWS Management Console. A solutions architect needs to configure federated authentication. Which solution will meet these requirements?", "opts": {"A": "Use AWS Verified Access to create a new trust provider. Connect the existing Active Directory IdP service to the Verifed Access endpoint.", "B": "Use Amazon Cognito to create an identity pool. Add the existing Active Directory IdP to the user pool. Upload the SAML metadata.", "C": "Use AWS Amplify to configure a custom authentication backend by using Amplify Auth. Set up an Amazon EC2 instance that runs a Node.js application that links AWS IAM Identity Center with the on-premises Active Directory through LDAP.", "D": "Configure AWS IAM Identity Center to use an external IdP. Provide the SAML metadata from the identity provider."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon Cognito): এই সেবা ভিন্ন কাজের — web/mobile app-এর user authentication ও federation। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 152, "set": 3, "stem": "A company manages millions of documents in hundreds of Amazon S3 buckets in multiple AWS Regions. The company must determine whether any of the S3 buckets contain personally identifiable information (PII). Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Use Amazon Detective to defect Pll in the S3 buckets", "B": "Use AWS Trusted Advisor to generate Pll notifications.", "C": "Use Amazon Macie to detect Pll in the S3 buckets.", "D": "Use AWS Lambda functions to review each file in the S3 buckets to identify Pll."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর C:** এখানে **Amazon Macie** ব্যবহার করা হয়েছে। S3-এ সংরক্ষিত ডেটায় PII/আর্থিক তথ্য (credit card, passport) ML দিয়ে আবিষ্কার করে। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 153, "set": 3, "stem": "A company hosts an application on AWS. The application has generated approximately 2.5 TB of data over the previous 12 years. The company currently stores the data on Amazon EBS volumes. The company wants a cost-effective backup solution for long-term storage. The company must be able to retrieve the data within minutes when required for audits Which solution will meet these requirements?", "opts": {"A": "Create EBS snapshots to back up the data.", "B": "Create an Amazon S3 bucket. Use the S3 Glacier Deep Archive storage class to back up the data.", "C": "Create an Amazon S3 bucket. Use the S3 Glacier Flexible Retrieval storage class to back up the data", "D": "Create an Amazon Elastic File System (Amazon EFS) file system to back up the data"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 154, "set": 3, "stem": "A company is using a loosely coupled serverless architecture on AWS. The architecture consists of multiple web applications and APIs distributed across multiple teams. The company uses AWS Control Tower to provision AWS accounts. The company's development teams use AWS CloudFormation. The company wants to improve trace monitoring and gain insight into how individual services in application stacks are performing. Which solution will meet these requirements?", "opts": {"A": "Enable AWS CloudTrail across all accounts by using AWS Control Tower.", "B": "Enable AWS X-Ray across all accounts by using AWS Control Tower.", "C": "Enable Amazon CloudWatch in the CloudFormation templates.", "D": "Enable AWS X-Ray in the CloudFormation templates."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** Enable AWS X-Ray in the CloudFormation templates.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS CloudTrail): এই সেবা ভিন্ন কাজের — API call/audit log। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 155, "set": 3, "stem": "An online video game company must maintain ultra-low latency for its game servers. The game servers run on Amazon EC2 instances. The company needs a solution that can handle millions of UDP internet traffic requests each second. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure an Application Load Balancer with the required protocol and ports for the internet traffic. Specify the EC2 instances as the targets.", "B": "Configure a Gateway Load Balancer for the internet traffic. Specify the EC2 instances as the targets.", "C": "Configure a Network Load Balancer with the required protocol and ports for the internet traffic. Specify the EC2 instances as the targets.", "D": "Launch an identical set of game servers on EC2 instances in separate AWS Regions. Route internet traffic to both sets of EC2 instances."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Gateway Load Balancer): এই সেবা ভিন্ন কাজের — third-party virtual appliance (firewall/IDS) deploy ও scale করার জন্য। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 156, "set": 3, "stem": "A company has an application that consists of Amazon EC2 instances in an Auto Scaling group. The application also uses an Amazon Aurora MySQL DB instance. The application is hosted in the us-east- 1 Region. The company needs to create a disaster recovery (DR) environment in the us-west-1 Region by using the pilot light approach. Which solution will meet these requirements?", "opts": {"A": "Create an Auto Scaling group in us-west-1 with a scaled down group of EC2 instances that run the same configuration and code as the EC2 instances in us-east-1. Use an Aurora global database to create a replica in us-west-1 with asynchronous Cross-Region Replication.", "B": "Create a backup job in AWS Backup in us-east-1 to back up the EC2 instances and the Aurora DB instance. Create a copy job to create cross-Region backup copies of the EC2 instances and the Aurora DB instance in us-west-1.", "C": "Create an Auto Scaling group in us-west-1 with a group of EC2 instances that run the same scaling settings, configuration, and code as the EC2 instances in us-east-1. Use an Aurora Multi- AZ deployment to create a replica in us-west-1.", "D": "Create a backup job in AWS Backup in us-east-1 to back up the EC2 instances to an Amazon Machine Image (AMI). Create a copy job to replicate the AMI to us-west-1. Use an Aurora global database to create a replica in us-west-1 with asynchronous Cross-Region Replication."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon Aurora** — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 157, "set": 3, "stem": "A company website runs on Amazon EC2 instances behind an Application Load Balancer (ALB). The instances run in an Auto Scaling group across multiple Availability Zones. There is an Amazon CloudFront distribution in front of the ALB. Users are reporting performance problems. A solutions architect discovers that the website is receiving a high rate of unwanted requests to the CloudFront distribution originating from a series of source IP addresses. How should the solutions architect address this problem?", "opts": {"A": "Using AWS Shield, configure a deny rule with an IP match condition containing the source IPs of the unwanted requests.", "B": "Using Auto Scaling, configure the maximum instance value to an increased count that will absorb the unwanted requests.", "C": "Using an Amazon VPC network ACL, configure an inbound deny rule for each source IP CIDR address of the unwanted requests.", "D": "Using AWS WAF, configure a web ACL rate-based rule on the CloudFront distribution with a rate limit below that of the unwanted requesters."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 158, "set": 3, "stem": "A company generates SSL certificates from a third-party provider. The company imports the certificates into AWS Certificate Manager (ACM) to use with public web applications. A solutions architect must implement a solution to notify the company's security team 30 days before an imported certificate expires. The company already has an Amazon Simple Queue Service (Amazon SQS) queue. The company also has an Amazon Simple Notification Service (Amazon SNS) topic that has the security team's email address as a subscriber. Which solution will provide the security team with the required notification about certificates?", "opts": {"A": "Create an AWS Lambda function to scan for expiring certificates. Program the Lambda function to list the certificates in a JSON message and to deliver the message to the SQS queue.", "B": "Create an AWS Lambda function to scan for expiring certificates. Program the Lambda function to list the certificates in a JSON message and to deliver the message to the SNS topic.", "C": "Create an Amazon EventBridge rule that specifies the ACM Certificate Approaching Expiration event type. Set the SQS queue as the rule's target.", "D": "Create an Amazon EventBridge rule that specifies the ACM Certificate Approaching Expiration event type. Set the SNS topic as the rule's target."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon EventBridge** ব্যবহার করা হয়েছে। event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 159, "set": 3, "stem": "A company hosts a website on Amazon EC2 instances behind an Application Load Balancer (ALB). The website serves static content. Website traffic is increasing. The company wants to minimize the website hosting costs. Which solution will meet these requirements?", "opts": {"A": "Move the website to an Amazon S3 bucket. Configure an Amazon CloudFront distribution for the S3 bucket.", "B": "Move the website to an Amazon S3 bucket. Configure an Amazon ElastiCache cluster for the S3 bucket.", "C": "Move the website to AWS Amplify. Configure an ALB to resolve to the Amplify website", "D": "Move the website to AWS Amplify. Configure EC2 instances to cache the website."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 160, "set": 3, "stem": "A software as a service (SaaS) company runs a multi-tenant data lake by using Amazon S3. Each tenant's data is stored in an isolated data path in an S3 bucket. The data lake supports custom encryption for each tenant. The company wants to allow tenants to use their own keys to encrypt only a subset of their data. The rest of the data will use server-side encryption with Amazon S3 managed keys (SSE-S3). The company needs to set up ongoing data replication to another S3 bucket in a different AWS Region for the objects encrypted with imported keys. Which solution will meet these requirements?", "opts": {"A": "Use S3 prefixes for each tenant's data. Use server-side encryption with AWS KMS keys (SSE- KMS). Use tags to set up tag-based Cross-Region Replication (CRR) to another S3 bucket.", "B": "Use S3 prefixes for each tenant's data. Use server-side encryption with customer-provided keys (SSE-C). Set up prefix-based Cross-Region Replication (CRR) to another S3 bucket.", "C": "Use S3 prefixes for each tenant's data. Use server-side encryption with AWS KMS keys (SSE- KMS). Set up prefix-based Cross-Region Replication (CRR) to another S3 bucket.", "D": "Create a separate S3 bucket for each tenant. Use server-side encryption with customer-provided keys (SSE-C) Set up bucket-level Cross-Region Replication (CRR)."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS KMS** — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 161, "set": 3, "stem": "A social media company allows users to upload images to its website. The website runs on Amazon EC2 instances. During upload requests, the website resizes the images to a standard size and stores the resized images in Amazon S3. Users are experiencing slow upload requests to the website. The company needs to reduce coupling within the application and improve website performance. A solutions architect must design the most operationally efficient process for image uploads. Which combination of actions should the solutions architect take to meet these requirements? (Select TWO.)", "opts": {"A": "Configure the application to upload images to S3 Glacier Flexible Retrieval", "B": "Configure the web server to upload the original images to Amazon S3.", "C": "Configure the application to upload images directly from each user's browser to Amazon S3 through the use of a presigned URL", "D": "Configure S3 Event Notifications to invoke an AWS Lambda function when an image is uploaded. Use the function to resize the image.", "E": "Create an Amazon EventBridge rule that invokes an AWS Lambda function on a schedule to resize uploaded images."}, "ans": ["C", "D"], "sel": 2, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 162, "set": 3, "stem": "A solutions architect needs to design a solution to process incoming work items. The work items need to be processed as soon as the work items arrive. Processing can take up to 30 minutes to finish Processing involves calling external APIs, passing the work items through several intermediate steps and states, and storing those states for future reference. The solution must scale to meet varying incoming work item rates throughout the day. Which combination of steps meets these requirements with the LEAST operational overhead? (Select TWO.)", "opts": {"A": "Invoke an AWS Lambda function for each incoming work item. Configure each Lambda function to handle each work item completely. Store work item states in an Amazon DynamoDB table", "B": "Invoke an AWS Step Functions workflow to process incoming work items. Use AWS Lambda functions to handle the business logic. Store work item states in an Amazon DynamoDB table.", "C": "Set up an Amazon API Gateway REST API to receive work items. Configure the REST API to invoke an AWS Lambda function for each work item.", "D": "Deploy two Amazon EC2 Reserved Instances behind an Application Load Balancer to handle incoming requests. Send the requests to an Amazon Simple Queue Service (Amazon SQS) queue.", "E": "Set up an Amazon API Gateway REST API to receive work items. Send the work items to an Amazon Simple Queue Service (Amazon SQS) queue."}, "ans": ["B", "E"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables।\n✅ **সঠিক উত্তর E:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 163, "set": 3, "stem": "A company needs to implement a new data retention policy for regulatory compliance. As part of this policy, sensitive documents that are stored in an Amazon S3 bucket must be protected from deletion or modification for a fixed period of time. Which solution will meet these requirements?", "opts": {"A": "Activate S3 Object Lock on the required objects and enable governance mode.", "B": "Activate $3 Object Lock on the required objects and enable compliance mode.", "C": "Enable versioning on the S3 bucket. Set a lifecycle policy to delete the objects after a specified period.", "D": "Configure an S3 Lifecycle policy to transition objects to S3 Glacier Flexible Retrieval for the retention duration."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর B:** Activate $3 Object Lock on the required objects and enable compliance mode.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 164, "set": 3, "stem": "An ecommerce company runs a multi-tier application on AWS. The frontend and backend tiers both run on Amazon EC2 instances. The database tier runs on an Amazon RDS for MySQL DB instance. The backend tier communicates with the RDS DB instance. The application makes frequent calls to return identical datasets from the database. The frequent calls on the database cause performance slowdowns. A solutions architect must improve the performance of the application backend. Which solution will meet this requirement?", "opts": {"A": "Configure an Amazon Simple Notification Service (Amazon SNS) topic between the EC2 instances and the RDS DB instance", "B": "Configure an Amazon ElastiCache (Redis OSS) cache, Configure the backend EC2 instances to read from the cache.", "C": "Configure an Amazon DynamoDB Accelerator (DAX) cluster. Configure the backend EC2 instances to read from the cluster.", "D": "Configure Amazon Data Firehose  to stream the calls to the database."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon ElastiCache** ব্যবহার করা হয়েছে। in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 165, "set": 3, "stem": "A company hosts an application on AWS. The application gives users the ability to upload photos and store the photos in an Amazon S3 bucket. The company wants to use Amazon CloudFront and a custom domain name to upload the photo files to the S3 bucket in the eu-west-1 Region. Which solution will meet these requirements? (Select TWO.)", "opts": {"A": "Use AWS Certificate Manager (ACM) to create a public certificate in the us-east-1 Region. Use the certificate in CloudFront.", "B": "Use AWS Certificate Manager (ACM) to create a public certificate in eu-west-1. Use the certificate in CloudFront.", "C": "Configure Amazon S3 to allow uploads from CloudFront. Configure S3 Transfer Acceleration.", "D": "Configure Amazon S3 to allow uploads from CloudFront origin access control (OAC).", "E": "Configure Amazon S3 to allow uploads from CloudFront. Configure an Amazon S3 website endpoint"}, "ans": ["A", "D"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 166, "set": 3, "stem": "An analytics application runs on multiple Amazon EC2 Linux instances that use Amazon Elastic File System (Amazon EFS) Standard storage. The files that the application uses vary in size and access frequency. The company accesses the files infrequently after 30 days. However, users sometimes request older files to generate reports. The company wants to reduce storage costs for files that are accessed infrequently. The company also wants throughput to adjust based on the size of the file system. The company wants to use the Transition ToIA Amazon EFS lifecycle policy to transition files to infrequent Access (IA) storage after 30 days. Which solution will meet these requirements?", "opts": {"A": "Configure files to transition back to Standard storage when a user accesses the files again. Specify the provisioned throughput mode.", "B": "Specify the provisioned throughput mode only.", "C": "Configure files to transition back to Standard storage when a user accesses the files again. Specify the bursting throughput mode.", "D": "Specify the bursting throughput mode only."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Configure files to transition back to Standard storage when a user accesses the files again. Specify the bursting throughput mode.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 167, "set": 3, "stem": "A company has deployed resources in the us-east-1 Region. The company also uses thousands of AWS Outposts servers that are deployed at remote locations around the world. The Outposts servers regularly download new software versions from the resources in us-east-1 that consist of hundreds of files. The company wants to improve the latency of the software download process. Which solution will meet these requirements?", "opts": {"A": "Create an Amazon S3 bucket in us-east-1. Configure the S3 bucket for static website hosting. Use a bucket policy and ACLs to provide read access to the Outposts servers.", "B": "Create an Amazon S3 bucket in us-east-1 and a second S3 bucket in the us-west-2 Region. Configure replication between the S3 buckets. Set up an Amazon CloudFront distribution with origin failover between the S3 buckets. Download the software by using signed URLs.", "C": "Create an Amazon S3 bucket in us-east-1. Configure S3 Transfer Acceleration. Configure the Outposts servers to download the software by using the S3 Transfer Acceleration endpoint.", "D": "Create an Amazon S3 bucket in us-east-1. Set up an Amazon CloudFront distribution that uses all edge locations with caching enabled. Configure the S3 bucket as the origin. Download the software by using signed URLs"}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 168, "set": 3, "stem": "A company creates a VPC that has one public subnet and one private subnet. The company attaches an internet gateway to the VPC. An Application Load Balancer (ALB) in the public subnet communicates with Amazon EC2 instances in the private subnet. The EC2 instances in the private subnet must be able to download operating system (OS) and application updates from the internet. The instances must not be accessible from the internet. Which combination of steps will meet these requirements? (Select THREE)", "opts": {"A": "Associate an Elastic IP address with the NAT gateway.", "B": "Add a route of 0.0.0.0/0 to the private subnet route table. Set the NAT gateway as a target.", "C": "Deploy a NAT gateway in the public subnet.", "D": "Deploy a NAT gateway in the private subnet.", "E": "Add a route of 0.0.0.0/0 to the public subnet route table. Set the NAT gateway as a target. F. Associate an Elastic IP address with the internet gateway."}, "ans": ["A", "B", "C"], "sel": 3, "exp": "✅ **সঠিক উত্তর A:** Assoc
