ুরি পূরণ করে না।\n• **C** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 382, "set": 7, "stem": "A company is creating a new web application. The application includes a single static webpage and a persistent database layer. The company expects millions of users to use the application during the same 4 hours every morning. The company expects that the application will have only a few thousand users during the rest of each day. The company must be able to rapidly evolve the database schema when needed. Which combination of solutions will meet these requirements and provide the MOST scalability? (Select TWO.)", "opts": {"A": "Deploy Amazon DynamoDB as the database layer. Create DynamoDB tables that have provisioned capacity.", "B": "Deploy Amazon Aurora as the database layer. Choose the serverless database engine mode.", "C": "Deploy Amazon DynamoDB as the database layer. Create DynamoDB tables that have on- demand capacity.", "D": "Deploy the static content to an Amazon S3 bucket. Provision an Amazon CloudFront distribution that uses the S3 bucket as the origin.", "E": "Deploy the static content on an Amazon EC2 instance. Attach an Amazon EBS volume to the EC2 instance."}, "ans": ["A", "D"], "sel": 2, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n✅ **সঠিক উত্তর D:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 383, "set": 7, "stem": "A company is developing an ecommerce application that uses an Amazon API Gateway HTTP API. When a customer creates an order in the application, three downstream consumers must process the order event. The downstream consumers include a billing service that uses AWS Lambda functions, an email messaging service that uses AWS Lambda functions, and an inventory service that uses Amazon EC2 instances. Each consumer must receive every event. The service must absorb traffic bursts with durable buffering for each consumer. The company must be able to add new consumers without changing the producer or existing consumers. Which solution will meet these requirements?", "opts": {"A": "Publish order events to an Amazon SNS topic. Subscribe one Amazon SQS queue to the SNS topic for each consumer. Configure each consumer to process events from its own SQS queue.", "B": "Send order events to a single Amazon SQS queue. Configure all the consumers to poll the SQS queue by using long polling.", "C": "Send order events on an Amazon EventBridge event bus. Create one EventBridge rule for each consumer to target each consumer directly.", "D": "Use an Application Load Balancer (ALB) to forward events to an Auto Scaling group of Amazon EC2 instances that call each consumer."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** উচ্চ durability।\n✅ **সঠিক উত্তর A:** এখানে **Amazon SNS** ব্যবহার করা হয়েছে। pub/sub notification — এক message অনেক subscriber-এ fan-out। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 384, "set": 7, "stem": "A company is building an application that runs on several Linux-based containers in Amazon ECS. The containers must have shared access to log files and configuration data. The application requires a POSIX-compliant file system that provides high availability and scalability Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Configure an Amazon EFS file system with elastic throughput.", "B": "Deploy an Amazon S3 bucket and configure shared access and object-level permissions.", "C": "Configure an Amazon FSx for Lustre file system with the Persistent 2 deployment type.", "D": "Attach an Amazon EBS volume to an Amazon EC2 instance to share access across containers."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, high availability / fault tolerance, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর A:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon FSx for Lustre): এই সেবা ভিন্ন কাজের — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 385, "set": 7, "stem": "A company runs a web application on Amazon EC2 instances in an Auto Scaling group behind an Application Load Balancer (ALB). The application is served at one hostname that has two dynamic paths. The first path is named /reports and performs CPU-intensive work that has unpredictable traffic. The second path is named/generate Token and must always respond in less than 1 second. All requests currently go to a single target group. The/generate Token path latency exceeds 1 second during periods when the /reports usage is high. The company must ensure that latency for/generate Token remains under 1 second. Which solution will meet this requirement?", "opts": {"A": "Expose /generate Token through an Amazon API Gateway HTTP API that forwards the request to the existing ALB target group.", "B": "Configure ALB path-based routing to send traffic for /reports and/generate Token to separate target groups. Link each target group to its own Auto Scaling group.", "C": "Replace the current instance type with larger EC2 instances in the existing Auto Scaling group.", "D": "Deploy an Amazon CloudFront distribution in front of the ALB. Create separate cache behaviors for each path."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 386, "set": 7, "stem": "A company needs a solution to give customers the ability to upload encrypted files to a directory in an Amazon S3 bucket by using SFTP. After customers upload files, the solution must automatically decrypt the files and move them to a second directory within the same S3 bucket for downstream processing. The solution must not require custom authentication services. The solution must fully automate all post-upload operations and require minimal ongoing operational overhead. Which solution will meet these requirements? (Select THREE.)", "opts": {"A": "Use AWS Transfer Family with the SFTP protocol. Configure the S3 bucket as the home directory for uploaded files.", "B": "Use an S3 event notification to invoke an AWS Lambda function that moves uploaded files between folders.", "C": "Use an AWS Transfer Family workflow and a DECRYPT action to decrypt uploaded files.", "D": "Tag incoming S3 objects. Periodically query objects by using an external script that runs in a container", "E": "Use an AWS Transfer Family workflow and a COPY action to move files to a new directory within the S3 bucket after decryption. F. Use an AWS Batch job to poll the S3 bucket and run a decryption script on new files."}, "ans": ["A", "C", "E"], "sel": 3, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর A:** এখানে **AWS Transfer Family** ব্যবহার করা হয়েছে। SFTP/FTPS/FTP দিয়ে S3/EFS-এ managed file transfer। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n✅ **সঠিক উত্তর C:** এখানে **AWS Transfer Family** ব্যবহার করা হয়েছে। SFTP/FTPS/FTP দিয়ে S3/EFS-এ managed file transfer।\n✅ **সঠিক উত্তর E:** এখানে **AWS Transfer Family** ব্যবহার করা হয়েছে। SFTP/FTPS/FTP দিয়ে S3/EFS-এ managed file transfer। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 387, "set": 7, "stem": "A company runs a production database on Amazon RDS for MySQL. The company wants to upgrade the database version for security compliance reasons. Because the database contains critical data, the company wants a quick solution to upgrade and test functionality without losing any data. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Create an RDS manual snapshot. Upgrade to the new version of Amazon RDS for MySQL.", "B": "Use native backup and restore. Restore the data to the upgraded new version of Amazon RDS for MySQL", "C": "Use AWS DMS to replicate the data to the upgraded new version of Amazon RDS for MySQL", "D": "Use Amazon RDS Blue/Green Deployments to deploy and test production changes."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কোনো request নষ্ট না হওয়া ও পুনরায় process, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 388, "set": 7, "stem": "A company stores telemetry data in Amazon DynamoDB tables. The company creates a new table for every month. The company queries data from the tables for the most recent 12 months several times each week. Data from the previous 12 months must remain instantly available. The company retains tables that are older than 12 months for annual audits but does not access the old data. The company wants to be able to query tables that are older than 12 months but does not want to incur any ongoing DynamoDB charges for read capacity units (RCUs) or write capacity units (WCUs). The company must optimize storage costs for older data. Which solutions will meet these requirements? (Select TWO.)", "opts": {"A": "Convert the tables for the most recent 12 months to on-demand capacity mode", "B": "Export tables that are older than 12 months to Amazon S3. Delete exported tables from DynamoDB. Use Amazon Athena to query the tables in Amazon S3.", "C": "Change tables that are older than 12 months to the DynamoDB Standard-Infrequent Access (DynamoDB Standard-IA) table class", "D": "Use AWS Glue to copy all tables into Amazon Redshift to provide consolidated long-term storage and querying.", "E": "DE Create a DynamoDB TTL rule to delete items that are older than 12 months."}, "ans": ["B", "C"], "sel": 2, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon DynamoDB** — serverless NoSQL, single-digit millisecond latency, global tables। এর সঙ্গে **Amazon Athena** — S3-এর ডেটায় serverless SQL query, server লাগে না।\n✅ **সঠিক উত্তর C:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Glue): এই সেবা ভিন্ন কাজের — serverless ETL ও data catalog। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 389, "set": 7, "stem": "A company hosts an application on AWS. The application uses a provisioned Amazon Aurora for MySQL database cluster. The company configured the cluster with a writer and a reader instance that are the same size. The instance size is proportional to the read and write traffic patterns, which have previously been steady. In recent months, the usage pattern has changed. Read traffic has increased significantly, but it is now sporadic instead of being steady. The company must adjust the Aurora cluster to handle the new traffic pattern. Which solution will meet this requirement in the MOST cost-effective way?", "opts": {"A": "Do not change the writer instance. Increase the size of the reader instance to address higher read traffic.", "B": "Do not change the reader or writer instance, enable local write forwarding on the read replica.", "C": "Do not change the writer instance. Convert the reader instance from provisioned mode to serverless mode.", "D": "Do not change the writer instance. Provision a second reader instance that is the same size as the existing reader instance."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** Do not change the writer instance. Convert the reader instance from provisioned mode to serverless mode.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 390, "set": 7, "stem": "A company runs a fleet of Amazon EC2 On-Demand Instances to support a document processing application that has variable usage patterns. The company wants to optimize compute costs for the application. The company needs a solution that can tolerate occasional disruptions to document processing jobs. Which solution will meet these requirements?", "opts": {"A": "Replace the EC2 instances with an Amazon EKS cluster that uses AWS Fargate Spot capacity.", "B": "Use the EC2 Spot Instance placement score feature to identify which instance type to use. Deploy the application on Spot Instances.", "C": "Create a single EC2 Auto Scaling group. Set a mixed configuration of EC2 On-Demand Instances and EC2 Spot Instances.", "D": "Continue to use EC2 On-Demand Instances. Purchase Convertible Reserved Instances."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **EC2 Auto Scaling** — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 391, "set": 7, "stem": "A company is building an ecommerce web service on AWS. The web service send information about new orders to an Amazon API Gateway REST API for processing. The company wants to eliminate duplicate orders within a 5-minute processing window Which solution will meet this requirement with the LEAST amount of development effort?", "opts": {"A": "Configure API Gateway to send a message to an Amazon SNS topic when API Gateway receives an order. Create a filter policy for the SNS topic to de-duplicate orders. Subscribe an AWS Lambda function to the SNS topic to process filtered results.", "B": "Configure API Gateway to send a message to an Amazon SQS FIFO queue when API Gateway receives an order. Include a MessageDeduplicationId token in the order requests. Configure the queue to invoke an AWS Lambda function for processing.", "C": "Use API Gateway integrations to send messages to an Amazon SQS standard queue. Include OrderID and Timestamp attributes in the order requests. Use an AWS Lambda function to consume the queue. Use the attributes to discard duplicate orders.", "D": "Use an API Gateway integration to send messages to an Amazon SQS standard queue. Configure an AWS Lambda function to process the queue. Include a MessageDeduplicationId token in the order requests"}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 392, "set": 7, "stem": "A company uses on-premises virtual machines (VMs) to run a Kubernetes cluster. The company must operate network connectivity for the cluster on premises. The company wants to simplify overall management for the Kubernetes cluster while maintaining control over the underlying infrastructure. Which solution will meet these requirements?", "opts": {"A": "Deploy an Amazon EKS Anywhere cluster on the existing VMs.", "B": "Deploy Amazon EKS Hybrid Nodes on the existing VMs. B.", "C": "Deploy a self-hosted Kubernetes cluster on Amazon EC2 instances. Run the EC2 instances on AWS Outposts.", "D": "Deploy a self-hosted Kubernetes cluster on Amazon EC2 instances. Host the EC2 instances in a VPC that does not have internet access."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon EKS** ব্যবহার করা হয়েছে। managed Kubernetes; IRSA দিয়ে pod-এ IAM role।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 393, "set": 7, "stem": "A social media company wants to store a database that contains user profiles, relationships, and interactions on AWS. The company needs an application to process any changes in the database. The application needs to analyze the relationships between data entities. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use Amazon ElastiCache (Memcached) to create a serverless cache to store the information. Use Amazon Kinesis Data Streams to process changes in the database.", "B": "Use Amazon Neptune to create a database to store the information. Use Neptune Streams to process changes in the database.", "C": "Use Amazon Keyspaces to store the information. Use Amazon Kinesis Data Streams to process changes in the database.", "D": "Use Microsoft SQL Server on an Amazon EC2 instance to store the information. Use Amazon Neptune Streams to process changes in the database."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর B:** Use Amazon Neptune to create a database to store the information. Use Neptune Streams to process changes in the database.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Kinesis Data Streams): এই সেবা ভিন্ন কাজের — real-time streaming data ingestion ও processing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 394, "set": 7, "stem": "A company wants to grant an external vendor temporary, limited access to an Amazon S3 bucket to download files. The company does not want the external vendor to have access to the bucket for a long period of time. Which solution will meet these requirements in the MOST secure way?", "opts": {"A": "Create an IAM user and programmatic access keys. Attach an IAM policy to the user that allows read-only access to the S3 bucket. Share the IAM user and programmatic access keys with the external vendor.", "B": "Add a bucket policy to the S3 bucket that grants access based on the external vendor's IP address range.", "C": "Create a presigned URL for each required object in the S3 bucket. Share the presigned URLs with the external vendor.", "D": "Create an IAM role and temporary access keys. Attach an IAM policy to the role that allows read- only access to the S3 bucket. Share the IAM role and temporary access keys with the external vendor."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 395, "set": 7, "stem": "A company runs a high-traffic web application that has a three-tier architecture that consists of a web layer, an application layer, and a database layer. The web layer and application layer run on Amazon EC2 Instances behind an Application Load Balancer (ALB). The application layer is stateless and supports automatic scaling. The database layer uses Amazon RDS for MySQL in a Multi-AZ configuration and relies on a relational architecture. The company is preparing for a large marketing event that is expected to drive a sharp increase in read traffic. The company must ensure that the application remains highly available and responsive under load. The company wants to scale the application's architecture components but does not want to modify the application. Which combination of solutions will meet these requirements? (Select THREE.)", "opts": {"A": "Deploy an Amazon CloudFront distribution. Specify the web layer as the origin.", "B": "Enable automatic scaling for EC2 instances in the application layer.", "C": "Migrate the database to Amazon Aurora. Configure Aurora Auto Scaling and Aurora Replicas.", "D": "Set up an Amazon ElastiCache (Redis OSS) cluster in front of the database.", "E": "Replace the ALB with a Network Load Balancer (NLB). F. Migrate the database to an Amazon DynamoDB table."}, "ans": ["A", "B", "D"], "sel": 3, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n✅ **সঠিক উত্তর D:** এখানে **Amazon ElastiCache** ব্যবহার করা হয়েছে। in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache।\n❌ **কেন অন্যগুলো নয়:**\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 396, "set": 7, "stem": "A company deploys a backend service to five Amazon EC2 instances. The service uses a custom application layer communication protocol on top of a TCP/IP layer. The company has smart devices that connect to the backend service through the internet. The company needs to load balance traffic between the devices and the backend EC2 instances. Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Deploy a new EC2 instance and install NGINX. Use NGINX as a reverse proxy to load balance the traffic to the backend EC2 instances.", "B": "Deploy an Application Load Balancer (ALB). Configure the ALB to distribute the traffic to the backend EC2 instances.", "C": "Deploy a Network Load Balancer (NLB) Configure the NLB to distribute the traffic to the backend EC2 instances", "D": "Deploy a Gateway Load Balancer (GWLB). Configure the GWLB to distribute the traffic to the backend EC2 instances."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **Network Load Balancer (NLB)** ব্যবহার করা হয়েছে। Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Gateway Load Balancer): এই সেবা ভিন্ন কাজের — third-party virtual appliance (firewall/IDS) deploy ও scale করার জন্য। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 397, "set": 7, "stem": "A company uses Amazon DynamoDB as the data store for an ecommerce application; Inventory management tables have very predictable workloads. Workloads for order placement tables vary significantly and can be unpredictable. All tables use provisioned mode and are read-heavy. The company wants to optimize DynamoDB costs for the application. Which solution will meet this requirement?", "opts": {"A": "Purchase reserved capacity to cover the baseline provisioned read throughput for all tables.", "B": "Configure the inventory management and order placement tables to use on-demand mode.", "C": "Configure the inventory management tables to use on-demand mode. Purchase reserved capacity to cover the baseline provisioned read throughput for the order placement tables.", "D": "Configure the order placement tables to use on-demand mode. Purchase reserved capacity to cover the baseline provisioned read throughput for the inventory management tables."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** Configure the order placement tables to use on-demand mode. Purchase reserved capacity to cover the baseline provisioned read throughput for the inventory management tables.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 398, "set": 7, "stem": "A company runs an ecommerce platform on AWS. The platform has a database backend that runs on an Amazon Aurora MySQL DB cluster. The company has configured a static number of Aurora Replicas to read data related to the platform's product catalog and order history. The platform has a predictable usage pattern. Usage peaks during business hours and typically decreases overnight. The Aurora Replicas often have reduced usage during night hours. The company wants a solution to optimize costs for the backend. The solution must be able to respond to traffic spikes during sales events. Which solution will meet these requirements?", "opts": {"A": "Create a script to scale the Aurora Replicas on a schedule.", "B": "Purchase Reserved Instances for the peak number of Aurora Replicas.", "C": "Create a script to change the instance type of the Aurora Replicas to a smaller size on a schedule.", "D": "Configure a scaling policy to automatically scale the number of Aurora Replicas based on a target average CPU value."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 399, "set": 7, "stem": "A company has an AWS Lambda function and an Amazon S3 bucket. A solutions architect creates an IAM role that has S3: GetObject and S3-ListBucket permissions and configures it as the Lambda function execution role. The function must write logs to an Amazon CloudWatch Logs log group when the function is invoked Which solution will meet this requirement?", "opts": {"A": "Create a new IAM role for the S3 bucket and grant the role the logs CreateLogGroup, Logs:CreateLogStream, and logs: PutlLogEvents permissions.", "B": "Update the IAM policy that is attached to the existing IAM role to include the logs: CreateLogGroup, logs: CreateLogStream, and logs: PutLogEvents permissions.", "C": "Create an S3 bucket policy that allows the existing IAM role to access the bucket and to write logs to the bucket.", "D": "Update the existing IAM role to attach the logs: GetLogsEvents IAM policy."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 400, "set": 7, "stem": "A company hosts a popular Java-based transaction processing application on AWS. The application has an application server tier that consists of an Amazon EC2 Auto Scaling group behind an Application Load Balancer (ALB). The application server tier is connected to an Amazon Aurora MySQL database cluster. Transactions insert new data into the database cluster and normally finish in a few seconds. However, occasionally the transactions take up to 1 minute to finish. The company wants to re-engineer the application to achieve higher levels of scalability. Which solution will meet this requirement? (Select TWO.)", "opts": {"A": "Migrate the Aurora MySQL database cluster to Amazon Redshift Serverless.", "B": "Modify the application server tier to use a Regional Amazon API Gateway REST API and AWS Lambda functions.", "C": "Configure an Amazon RDS Proxy in front of the Aurora MySQL database cluster.", "D": "Configure an Amazon RDS Proxy in front of the Amazon Redshift Serverless database.", "E": "Configure the Aurora MySQL database cluster to auto scale by using read replicas."}, "ans": ["B", "C"], "sel": 2, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n✅ **সঠিক উত্তর C:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **Amazon Aurora** — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **E** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 401, "set": 8, "stem": "A company runs a website that allows users to connect with lawyers. Users and lawyers upload documents to the website frequently. The company hosts the website on a single Amazon EC2 instance. The website stores documents directly on the instance. The company scales the website by adding two more EC2 instances behind an Application Load Balancer (ALB). Afterwards, users report 404 Resource Not Found errors when the users try to access their documents. The company must restore access to the documents Which solution will meet this requirement MOST cost-effectively?", "opts": {"A": "Set up an Amazon EFS file system. Mount the file system on all the instances. Copy all files from each instance to the file system. Update the application to use the file system.", "B": "Copy all documents to an Amazon S3 bucket that uses the S3 Intelligent-Tiering storage class. Update the application to use the S3 bucket.", "C": "Set up an Amazon EFS file system. Mount the file system on all the instances. Write a cron job that copies the documents from each instance to the file system every hour. Update the application to use the file system.", "D": "Write a cron job that copies the documents from each instance to an Amazon S3 bucket every hour. Configure the bucket to use the S3 Standard storage class. Update the application to use the S3 bucket."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 402, "set": 8, "stem": "A company has separate AWS accounts for its finance, data analytics, and development departments. All accounts belong to an organization that the company manages by using AWS Organizations. Because of cost and security concerns, the company wants to control which services that each AWS account can use Which solution will meet these requirements?", "opts": {"A": "Use AWS Systems Manager templates to control which AWS services each department account can use", "B": "Create an organizational unit (OU) for each department in Organizations. Attach service control policies (SCPs) to OUs to grant users and roles permission for each department.", "C": "Use AWS CloudFormation templates to define which AWS services each department account can use.", "D": "Use attribute-based tags to specify which AWS services each department account can use by attaching tags to AWS accounts and referencing the tags in IAM policies."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 403, "set": 8, "stem": "An application team uses an organization in AWS Organizations to manage multiple AWS accounts in a dedicated organizational unit (OU). The accounts do not host production workloads. The application team is implementing an ecommerce solution by using Amazon EC2 instances. A solutions architect needs to implement controls to prevent the application team from exceeding the project budget for the application. Which solution will meet this requirement?", "opts": {"A": "Create a usage report in AWS Cost Explorer. Set up automated alerts to notify the application team when usage exceeds the budget so the application team can take immediate actions to reduce costs.", "B": "Create a fixed monthly budget in AWS Budgets. Create a budget action to apply a service control policy (SCP) to the OU to deny additional usage when the application team reaches the monthly budget. Configure a budget action to send a notification to an Amazon SNS topic that invokes an AWS Lambda function to stop all running EC2 instances", "C": "Create an Amazon CloudWatch metric and a CloudWatch alarm for when the application team reaches the monthly budget. Configure the CloudWatch alarm to send a notification to an Amazon SNS topic that invokes an AWS Lambda function to stop all running EC2 instances.", "D": "Use AWS Cost Anomaly Detection to monitor the application team's usage and to alert the application team about unexpected spending patterns."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Budgets** ব্যবহার করা হয়েছে। খরচ/ব্যবহারের budget ঠিক করে, threshold-এ alert ও budget action (যেমন EC2 stop) নেয়। এর সঙ্গে **Service Control Policy (SCP)** — Organizations-এ account/OU এর সর্বোচ্চ permission boundary ঠিক করে; Condition দিয়ে নির্দিষ্ট role ছাড়া বাকিদের ব্লক করা যায়। এর সঙ্গে **Amazon SNS** — pub/sub notification — এক message অনেক subscriber-এ fan-out।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon CloudWatch): এই সেবা ভিন্ন কাজের — metric, log, alarm ও monitoring। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 404, "set": 8, "stem": "A company is developing a multi-Region disaster recovery solution for its application. The architecture includes an Amazon Aurora PostgreSQL cluster. The solution must achieve a recovery point objective (RPO) of less than 5 minutes and a recovery time objective (RTO) of 1 hour. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Convert the database to an Aurora global database by adding a secondary Aurora cluster in a second AWS Region. Configure a smaller instance type for the secondary Aurora cluster. Scale up the instance type in the event of a failover.", "B": "Configure a scheduled backup plan in AWS Backup to perform cross-Region snapshots every hour to a secondary Region. Restore the Aurora cluster from a snapshot in the event of a failover.", "C": "Convert the database to an Aurora global database by adding a secondary Aurora cluster in a second AWS Region. Configure the same instance type as the primary cluster for the secondary Aurora cluster. Stop the secondary cluster, and start it only in the event of a failover.", "D": "Convert the database to an Aurora global database by adding a secondary Aurora cluster in a second AWS Region. Create a headless cluster configuration. Create a database instance that has the same instance type as the primary cluster for the secondary cluster in the event of a failover."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 405, "set": 8, "stem": "A company deploys a stateful application on Amazon EC2 On-Demand Instances in multiple Availability Zones behind an Application Load Balancer (ALB). The application workload is predictable, and the company has not received any CPU usage alerts. The company expects to run the application for at least 1 year. The company expects CPU usage to increase by 50% during an upcoming 2-week holiday period. The company wants to optimize costs for the application for both the holiday period and normal operations. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Continue to use On-Demand Instances to handle the existing workload. Purchase additional On- Demand Instances to handle the capacity requirement for the upcoming holiday period", "B": "Purchase a 12-month EC2 Instance Savings Plan to handle the existing workload. Use On- Demand Instances to handle the additional capacity requirement for the upcoming holiday period.", "C": "Purchase a 12-month Compute Savings Plan to handle the existing workload. Use Spot Instances to handle the additional capacity requirement for the upcoming holiday period.", "D": "Purchase a 12-month Compute Savings Plan to handle both the existing workload and the additional capacity requirement for the upcoming holiday period."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Compute Savings Plans** — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Compute Savings Plans): এই সেবা ভিন্ন কাজের — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Compute Savings Plans): এই সেবা ভিন্ন কাজের — Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 406, "set": 8, "stem": "A company runs a web application on Amazon EC2 instances behind an Application Load Balancer (ALB). The application uses Amazon DynamoDB as its database. The company wants to ensure high performance for reads and writes. Which solution will meet this requirement MOST cost-effectively?", "opts": {"A": "Configure automatic scaling for the DynamoDB table. Set a target utilization of 70%. Set the minimum and maximum capacity units based on the expected workload.", "B": "Analyze the DynamoDB table usage. Create a global secondary index (GSI) on the existing table for frequently used keys. Assign read and write capacity units appropriately", "C": "Use DynamoDB provisioned throughput mode for the table. Create an Amazon CloudWatch alarm for the Throttled Requests metric. Invoke an AWS Lambda function to increase provisioned capacity.", "D": "Create an Amazon DynamoDB Accelerator (DAX) cluster. Configure the application to use the DAX endpoint."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 407, "set": 8, "stem": "A company wants to develop a database tool that is compatible with PostgreSQL. The company will run the tool only during business hours. The company wants to deploy the tool to AWS. The company needs to set up a development environment to support development efforts. The development environment must optimize database compute costs during the frequent and prolonged periods of inactivity. Which solution will meet these requirements?", "opts": {"A": "A Deploy an Amazon EC2 instance. Install a PostgreSQL database on the instance. Implement custom scripts to monitor database connections and to shut down the EC2 instance if no connections are detected for a specified period of time.", "B": "Deploy an Amazon Aurora provisioned DB cluster that has PostgreSQL compatibility on a db.13.small instance. Use scheduled scripts to stop the cluster outside of business hours and start it again during business hours.", "C": "Deploy an Amazon Aurora Serverless v2 DB cluster that has PostgreSQL compatibility. Set the minimum capacity of the DB cluster to 0 Aurora capacity units (ACUs). Set the auto-pause interval to 30 minutes.", "D": "Store all development data as Apache Parquet files in Amazon S3. Use Amazon Athena to run SQL. queries directly against the data in Amazon S3 Configure Athena to write the results of INSERT/UPDATE operations back to Amazon S3."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon Aurora** ব্যবহার করা হয়েছে। high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Aurora): এই সেবা ভিন্ন কাজের — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 408, "set": 8, "stem": "A software company recently deployed an x86-based application to Amazon ECS with the AWS Fargate launch type. The company establishes a baseline usage pattern for the application. The company will run the application for at least 1 year. The application serves critical APIs that require consistent availability. The company wants to optimize costs for the application. Which solution will meet this requirement?", "opts": {"A": "Purchase a Compute Savings Plan with an hourly commitment.", "B": "Purchase Reserved Instances for the AWS Fargate tasks.", "C": "Configure the tasks to use AWS Graviton", "D": "Configure the tasks to use Spot Instances."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Compute Savings Plans** ব্যবহার করা হয়েছে। Lambda, Fargate ও EC2 এর baseline compute খরচ flexible ভাবে কমায়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 409, "set": 8, "stem": "A company runs a web application that stores user-generated images. The application currently stores 500 GB of images. The average file size of the images is 2 MB. The company expects the total amount of images grow to 2 TB within 6 months. The application needs to serve all stored images with low latency to users from around the world. Which storage solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Store images in Amazon EBS volumes that are attached to multiple Amazon EC2 instances across multiple AWS Regions. Serve the content locally based on each user's location.", "B": "Store images in an Amazon S3 bucket. Integrate the S3 bucket with Amazon CloudFront, Integrate the web application with a CloudFront endpoint to provide global access.", "C": "Store the images in an Amazon EFS file system. Use the Standard storage class with regional access. Enable cross-Region replication to provide high-availability and global access.", "D": "Deploy Amazon FSx for Windows File Server in two AWS Regions. Set up Windows File Server Replication across Regions to provide global access."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস, সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon FSx for Windows File Server): এই সেবা ভিন্ন কাজের — Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 410, "set": 8, "stem": "A company runs an application on Amazon EC2 instances. EC2 instance usage is higher during daytime hours than nighttime hours. A solutions architect wants to automatically optimize Amazon EC2 costs based on this usage pattern. Which AWS service or purchasing option will meet this requirement?", "opts": {"A": "Spot Instances", "B": "Reserved Instances", "C": "AWS CloudFormation", "D": "AWS Auto Scaling"}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 411, "set": 8, "stem": "A company maintains a data lake in an Amazon S3 bucket. The company needs to onboard multiple vendors who need to access the data lake. Each vendor has its own AWS account and requires access to separate datasets in the data lake. The company needs a secure and scalable solution to provide the vendors with access to the data that each vendor requires. The solution must log all vendor activities for auditing. Which solution will meet these requirements in the MOST scalable way?", "opts": {"A": "Create an IAM role and IAM policy for each vendor. Use cross-account resource sharing to share the appropriate IAM role Amazon Resource Name (ARN) with each vendor. Instruct each vendor to use the IAM role ARN to access the data lake from a resource in the vendor's AWS account. Set up S3 server access logging for the S3 bucket.", "B": "Create an IAM user for each vendor. Use an IAM policy to grant access to the S3 data lake. Share the user credentials for each IAM user with each vendor. Set up S3 server access logging for the S3 bucket.", "C": "Deploy AWS IAM Identity Center. Create a user account for each vendor. Create S3 Access Grants for each vendor that have the required permissions.", "D": "Create an S3 presigned URL for each vendor that has the required permissions. Share the appropriate URL with each vendor to access the S3 bucket. Configure AWS CloudTrail logs to collect access logs for the S3 bucket."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **AWS IAM Identity Center** ব্যবহার করা হয়েছে। কেন্দ্রীয়ভাবে একাধিক AWS account ও corporate directory (SSO) এর অ্যাক্সেস ম্যানেজ করে। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 412, "set": 8, "stem": "A company needs to design a solution to process videos that users upload to an Amazon S3 bucket. Each video file is approximately 1 GB in size and takes approximately 20 minutes to process. During peak hours, the company expects to process approximately 100 simultaneous uploads. The video file processing is stateless and can run in parallel as soon as the video files arrive in the S3 bucket. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use an AWS Lambda function to process each video. Split the video files into chunks, and use AWS Step Functions to orchestrate multiple processing jobs", "B": "Use an Amazon EKS cluster with AWS Fargate profiles to deploy one container for each uploaded video. Configure an Amazon EventBridge rule to invoke the cluster when a user uploads a video.", "C": "Use Amazon EC2 On-Demand Instances in an Auto Scaling group to process each file. Configure the auto scaling policy to increase the number of instances based on the number of files that the application needs to process", "D": "Use an Amazon ECS cluster with the AWS Fargate launch type. Use Fargate Spot capacity to run one container task for each uploaded video. Configure an Amazon EventBridge rule to invoke the cluster when a user uploads a video."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর D:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **AWS Fargate** — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 413, "set": 8, "stem": "A company runs an application on Amazon EC2 instances. The company needs to implement a disaster recovery (DR) solution for the application. The DR solution needs to have a recovery time objective (RTO) of less than 4 hours. The DR solution also needs to use the fewest possible AWS resources during normal operations. Which solution will meet these requirements in the MOST operationally efficient way?", "opts": {"A": "Create Amazon Machine Images (AMIs) to back up the EC2 instances. Copy the AMis to a secondary AWS Region. Automate infrastructure deployment in the secondary Region by using AWS Lambda and custom scripts.", "B": "Create Amazon Machine Images (AMIs) to back up the EC2 instances. Copy the AMIs to a secondary AWS Region. Automate infrastructure deployment in the secondary Region by using AWS CloudFormation.", "C": "Launch EC2 instances in a secondary AWS Region. Keep the EC2 instances in the secondary Region active at all times.", "D": "Launch EC2 instances in a secondary Availability Zone. Keep the EC2 instances in the secondary Availability Zone active at all times."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 414, "set": 8, "stem": "A company is building a suite of RESTful microservices that will be exposed through public endpoints. The company requires a scalable solution to ensure that the microservices handle sudden traffic spikes from global users, minimize latency, and offload requests from the backend microservices. Which solution will meet these requirements?", "opts": {"A": "Deploy the microservices on Amazon EC2 instances in a spread placement group. Assign Elastic IP addresses to the instances. Expose the microservices through Regional public endpoints", "B": "Create an Amazon API Gateway REST API. Deploy the microservices on Amazon EC2 instances and integrate the microservices as the API backend. Create an accelerator in AWS Global Accelerator and set the REST API as the endpoint.", "C": "Create an Amazon API Gateway REST API. Deploy the microservices to AWS Lambda functions and integrate the microservices with the REST API. Create an Amazon CloudFront distribution and set the REST API as the origin.", "D": "Create an Amazon API Gateway REST API. Deploy the microservices to AWS Lambda functions and integrate the microservices with the REST APL. Use Regional endpoints that use standard routing."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর C:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon CloudFront** — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 415, "set": 8, "stem": "A company plans to migrate a MySQL-based application from an on-premises environment to AWS. The application performs database joins across several tables and uses indexes for faster query response times. The company needs the database to be highly available with automatic failover. Which solution on AWS will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Deploy an Amazon RDS DB instance with a read replica.", "B": "Deploy an Amazon RDS Multi-AZ DB instance.", "C": "Deploy Amazon DynamoDB global tables.", "D": "Deploy multiple Amazon RDS DB instances. Use Amazon Route 53 DNS with failover health checks configured."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance।\n✅ **সঠিক উত্তর C:** এখানে **Amazon DynamoDB** ব্যবহার করা হয়েছে। serverless NoSQL, single-digit millisecond latency, global tables।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 416, "set": 8, "stem": "An ecommerce company is building an order processing application. The order processing application receives orders in bursts from a web application. The processing layer must handle variable workloads and provide order durability to ensure that no customer orders are lost. The company needs a solution that is scalable and loosely coupled. Which solution will meet these requirements?", "opts": {"A": "Deploy the order processing application to Amazon EC2 instances in an Auto Scaling group. Deploy an Application Load Balancer (ALB) in front of the Auto Scaling group. Store orders in instance memory until processing is finished.", "B": "Use AWS Step Functions to orchestrate order processing. Configure an Amazon API Gateway REST API to invoke the Step Functions state machine through the StartExecution API.", "C": "Deploy an Amazon SQS queue to store incoming orders. Create an AWS Lambda function to process orders. Configure an SQS event source mapping that allows the function to consume the queue.", "D": "Deploy an Amazon RDS for MySQL Single-AZ database instance. Insert incoming orders into the database. Deploy Amazon EC2 instances. Configure the EC2 instances to query the database once every minute to fetch and then delete new orders."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, উচ্চ durability।\n✅ **সঠিক উত্তর C:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 417, "set": 8, "stem": "A company wants to share data between applications that run in separate AWS accounts. The company wants to use Amazon API Gateway REST APIs to expose private APIs. The company wants to ensure that only authorized accounts can invoke the private APIs. Which solution will meet this requirement?", "opts": {"A": "Use an API Gateway interface endpoint policy to grant access to specific accounts.", "B": "Use an API Gateway resource policy to grant access to specific accounts.", "C": "Use cross-account IAM policies to grant access to the private APIs.", "D": "User AWS Lambda authorizers to grant access to specific accounts."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon API Gateway** ব্যবহার করা হয়েছে। managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 418, "set": 8, "stem": "An analytics company wants to deploy a custom extract, transform, and load (ETL) solution as a containerized application on AWS. The application requires high-performance access to files that are in a centralized repository. File processing can take up to 1 hour to finish. Which solution will meet these requirements?", "opts": {"A": "Deploy an AWS Lambda function from a container image. Create and attach an Amazon EFS file system to the function.", "B": "Deploy containers on Amazon ECS with the Amazon EC2 launch type. Configure the EC2 instances to use instance store volumes.", "C": "Deploy containers on Amazon ECS with the AWS Fargate launch type. Mount an Amazon EFS file system to the containers.", "D": "Create an Amazon S3 Express One Zone bucket to store the files. Deploy an AWS Lambda function from a container image. Process files from the S3 Express One Zone bucket."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **AWS Fargate** — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এর সঙ্গে **Amazon EFS** — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 419, "set": 8, "stem": "An application collects data and generates logs for all operational activities in a company's AWS Cloud infrastructure. The company wants a solution to store and retain the application logs. The logs must be immutable for 7 years. The company can delete the logs after 7 years. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use Amazon S3 Glacier Flexible Retrieval to store the application logs. Configure S3 Object Lock and set a retention period of 7 years.", "B": "Use Amazon EBS volumes to store the application logs. Configure volume backups by using AWS Backup.", "C": "Use the Amazon S3 Express One Zone storage class to store the application logs. Configure an S3 bucket policy that requires users to authenticate by using multi-factor authentication (MFA).", "D": "Use an Amazon EFS file system to store the application logs. Configure file locking for each log file."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 420, "set": 8, "stem": "A company is migrating its on-premises server infrastructure to AWS. The company's applications rely heavily on a shared file system. The applications use the NFS protocol to access the file system. The company wants to host the migrated applications on Amazon EC2 instances. The company must continue to use the NFS-based storage model on AWS. The company accesses many of the files infrequently. The company wants to optimize storage costs without changing how applications access the data. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Store the data in Amazon S3 Intelligent-Tiering. Deploy an AWS Storage Gateway Volume Gateway to give the applications access to the data.", "B": "Create an Amazon FSx for Lustre file system. Integrate the file system with Amazon S3 for long- term storage.", "C": "Deploy an Amazon EFS file system and enable Intelligent-Tiering. Mount the EFS file system to the EC2 instances.", "D": "Attach Amazon EBS io2 volumes to EC2 instances that use NFS software. Enable dynamic IOPS and throughput settings"}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর C:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon FSx for Lustre): এই সেবা ভিন্ন কাজের — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 421, "set": 8, "stem": "A company wants to migrate a visual search application from an on-premises environment to AWS. The application uses NFS storage to cache images. The image cache is currently a few terabytes in size. The company needs to migrate to a cost-effective cloud alternative. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use an Amazon ElastiCache (Memcached) cluster as the image cache. Set the cache TTL according to the required image lifetime in the cache.", "B": "Use compute-optimized Amazon EC2 instances with instance store volumes as the image cache. Recycle EC2 instances for cache invalidation.", "C": "Use an Amazon EFS One Zane file system as the image cache. Configure the application to use the EFS mount target", "D": "Use Amazon S3 Express One Zone to store the images. Store the S3 object URLs in an Amazon DynamoDB table. Use DynamoDB TTL to invalidate image cache entries."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ElastiCache): এই সেবা ভিন্ন কাজের — in-memory cache (Redis/Memcached) — সাব-মিলিসেকেন্ড read ও session/cache। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 422, "set": 8, "stem": "A company is building an application on an Amazon ECS cluster that uses the AWS Fargate launch type. The application must read files from a private Amazon S3 bucket. The company needs to design a security solution to allow ECS tasks to retrieve data from the S3 bucket. Which solution will meet these requirements with the LEAST administrative effort?", "opts": {"A": "Assign an inline IAM policy to the task role that is configured in the ECS task definition. Configure the policy to grant access to the S3 bucket.", "B": "Create an IAM user that has programmatic access to the S3 bucket. Store the IAM user credentials as a parameter in AWS Systems Manager Parameter Store. Configure the ECS task definition to read the parameter during runtime.", "C": "Assign an IAM policy to the task execution role that is configured in the ECS task definition. Configure the policy to grant access to the S3 bucket.", "D": "Create an IAM user and access keys for the S3 bucket. Store the access credentials as a secret in AWS Secrets Manager. Configure the ECS task definition to read the secret during runtime."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Amazon ECS** ব্যবহার করা হয়েছে। AWS-native container orchestration। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 423, "set": 8, "stem": "A company runs several application workloads as Kubernetes jobs in an Amazon EKS cluster. The jobs need to securely access other AWS services, including Amazon SNS, Amazon SQS, and Amazon DynamoDB. The company needs a solution to provide the jobs with the required access. Which solution will meet this requirement with the LEAST operational overhead?", "opts": {"A": "Create an IAM user for each job type. Create IAM policies that grant access to the required services. Create access keys for each user and set the keys as environment variables in the Kubernetes jobs.", "B": "Set up identity federation to the company's identity provider (IdP) by using AWS Directory Service. Configure the EKS workloads to retrieve temporary credentials through the identity federation mechanism.", "C": "Assign VPC subnets that have specific IP ranges to the jobs. Assign resource-based policies directly to SNS topics, SQS queues, and DynamoDB tables to allow access from the subnet IP ranges.", "D": "Create IAM roles that have the necessary permissions to access the required services. Assign the roles to Kubernetes service accounts and associate the service accounts with the Kubernetes jobs."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** Create IAM roles that have the necessary permissions to access the required services. Assign the roles to Kubernetes service accounts and associate the service accounts with the Kubernetes jobs.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 424, "set": 8, "stem": "A company has a multi-tier payment processing application that is based on virtual machines (VMs). The communication between the tiers occurs asynchronously through a third-party middleware solution that guarantees exactly-once delivery. The company needs a solution that requires the least amount of infrastructure management. The solution must guarantee exactly-once delivery for application messaging. Which combination of actions will meet these requirements? (Choose two.)", "opts": {"A": "Use AWS Lambda for the compute layers in the architecture.", "B": "Use Amazon EC2 instances for the compute layers in the architecture.", "C": "Use Amazon Simple Notification Service (Amazon SNS) as the messaging component between the compute layers.", "D": "Use Amazon Simple Queue Service (Amazon SQS) FIFO queues as the messaging component between the compute layers.", "E": "Use containers that are based on Amazon Elastic Kubernetes Service (Amazon EKS) for the compute layers in the architecture."}, "ans": ["A", "D"], "sel": 2, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** exactly-once মেসেজ ডেলিভারি, component গুলোকে decouple করা।\n✅ **সঠিক উত্তর A:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n✅ **সঠিক উত্তর D:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SNS
