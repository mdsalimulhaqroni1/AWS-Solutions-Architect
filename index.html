iate an Elastic IP address with the NAT gateway.\n✅ **সঠিক উত্তর B:** Add a route of 0.0.0.0/0 to the private subnet route table. Set the NAT gateway as a target.\n✅ **সঠিক উত্তর C:** Deploy a NAT gateway in the public subnet.\n❌ **কেন অন্যগুলো নয়:**\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **E**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 169, "set": 3, "stem": "A company runs a web application on Amazon EC2 instances. The application also uses an Amazon DynamoDB table. The application generates sporadic HTTP 500 errors. The DynamoDB table is operating in on-demand mode, and other applications use the table without any issues. A solutions architect wants to resolve the HTTP 500 errors without disrupting in the web application. Which solution will meet these requirements?", "opts": {"A": "Configure DynamoDB to support larger write requests for increased throughput.", "B": "Enable DynamoDB Streams to monitor changes in the table.", "C": "Configure the application to use exponential backoff and retries to query the table.", "D": "Configure the application to use strongly consistent reads."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** Configure the application to use exponential backoff and retries to query the table.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon DynamoDB): এই সেবা ভিন্ন কাজের — serverless NoSQL, single-digit millisecond latency, global tables। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 170, "set": 3, "stem": "A company has an application that runs on Amazon EC2 instances and uses an Amazon Aurora database. The EC2 instances connect to the Aurora database by using user names and passwords that the company stores locally in a file. The company changes the user names and passwords every month. The company wants to minimize the operational overhead of credential management. Which solution will meet these requirements?", "opts": {"A": "Store the credentials as a secret within AWS Secrets Manager. Assign IAM permissions to the secret. Reconfigure the application to call the secret. Enable rotation on the secret and configure rotation to occur on a monthly schedule.", "B": "Use AWS Systems Manager Parameter Store to create a new parameter for the credentials. Use IAM policies to restrict access to the parameter. Reconfigure the application to access the parameter.", "C": "Create an Amazon S3 bucket to store objects. Use an AWS Key Management Service (AWS KMS) key to encrypt the objects. Migrate the credentials file to the S3 bucket. Update the application to retrieve the credentials file from the S3 bucket.", "D": "Create an encrypted Amazon Elastic Block Store (Amazon EBS) volume for each EC2 instance, Attach the encrypted EBS volumes to the EC2 instances. Migrate the credentials file to the new EBS volumes. Point the application to the encrypted EBS volumes."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** Store the credentials as a secret within AWS Secrets Manager. Assign IAM permissions to the secret. Reconfigure the application to call the secret. Enable rotation on the secret and configure rotation\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 171, "set": 3, "stem": "A company is building a web application. The company needs a load balancing solution that supports HTTPS header-based routing. The company's security team also requires a rules-based method of blocking specific incoming requests to decrease the effects of malicious activity. Which solution will meet these requirements?", "opts": {"A": "Create an Application Load Balancer (ALB). Configure an HTTPS listener with mutual TLS enabled.", "B": "Create an Application Load Balancer (ALB). Integrate the ALB with AWS WAF. Configure the security team's required rules.", "C": "Create an Application Load Balancer (ALB). Integrate the ALB with AWS Config. Apply custom rules to all ALB resources.", "D": "Create a Network Load Balancer (NLB). Configure AWS Network Firewall with the security team's required rules."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** দুষ্ট কার্যকলাপ শনাক্ত।\n✅ **সঠিক উত্তর B:** এখানে **Application Load Balancer (ALB)** ব্যবহার করা হয়েছে। Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 172, "set": 3, "stem": "A company has hired an external vendor to work in the company's AWS account. The vendor uses an automated tool that the vendor hosts in its own AWS account. The vendor does not have IAM access to the company's AWS account. A solutions architect needs to grant access to the vendor. Which solution will meet these requirements MOST securely?", "opts": {"A": "Create an IAM role in the company's account to delegate access to the vendor's IAM role. Attach the appropriate IAM policies to the new IAM role to grant the permissions that the vendor requires.", "B": "Create an IAM user in the company's account that has a password that meets the company's password complexity requirements. Attach the appropriate IAM policies to the new IAM user to grant the permissions that the vendor requires.", "C": "Create an IAM group in the company's account. Add the IAM user for the vendor's automated tool from the vendor account to the IAM group. Attach the appropriate IAM policies to the group to grant the permissions that the vendor requires.", "D": "Create a new identity provider (IdP) that has a provider type of AWS account. Supply the vendor's AWS account ID and username. Attach the appropriate IAM policies to the new IdP to grant the permissions that the vendor requires"}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 173, "set": 3, "stem": "A company runs a high-performance computing (HPC) workload on premises. The workload has a file system that contains 200 TB of data. The company needs to migrate the data to Amazon FSx for Lustre to support the HPC cluster. The HPC cluster will also migrate to AWS. The company has 10 Mbpa internet capacity to accomplish the data migration. Which solution will migrate all the data within 30 days?", "opts": {"A": "Use AWS Database Migration Service (AWS DMS) to transfer the data from on premises to an Amazon S3 bucket. Link an FSx for Lustre file system to the S3 bucket.", "B": "Deploy the AWS DataSync agent on premises. Use DataSync to transfer data from on premises to an FSx for Lustre file system.", "C": "Use AWS Storage Gateway Volume Gateway to transfer data from on premises to an FSx for Lustre file system.", "D": "Use an AWS Snowball Edge storage-optimized device to transfer data from on premises to an Amazon S3 bucket. Link an FSx for Lustre file system to the S3 bucket."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **AWS Snowball** ব্যবহার করা হয়েছে। বিশাল পরিমাণ ডেটা offline/physical device-এ AWS-এ স্থানান্তর। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon FSx for Lustre** — HPC ও sub-millisecond latency, high-throughput compute workload-এর জন্য high-performance file system।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 174, "set": 3, "stem": "A security team needs to enforce the rotation of all IAM users' access keys every 90 days. If an access key is found to be older, the key must be made inactive and removed. A solutions architect must create a solution that will check for and remediate any keys older than 90 days. Which solution meets these requirements with the LEAST operational effort?", "opts": {"A": "Create an AWS Config rule to check for the key age. Configure the AWS Config rule to run an AWS Batch job to remove the key.", "B": "Create an Amazon EventBridge rule to check for the key age. Configure the rule to run an AWS Batch job to remove the key.", "C": "Create an AWS Config rule to check for the key age. Define an Amazon EventBridge rule to schedule an AWS Lambda function to remove the key.", "D": "Create an Amazon EventBridge rule to check for the key age. Define an EventBridge rule to run an AWS Batch job to remove the key."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর C:** এখানে **AWS Config** ব্যবহার করা হয়েছে। resource configuration ইতিহাস ও compliance মূল্যায়ন। এর সঙ্গে **Amazon EventBridge** — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Config): এই সেবা ভিন্ন কাজের — resource configuration ইতিহাস ও compliance মূল্যায়ন। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 175, "set": 3, "stem": "A company uses a set of Amazon EC2 instances to host a website. The website uses an Amazon S3 bucket to store images and media files. The company wants to automate website infrastructure creation to deploy the website to multiple AWS Regions. The company also wants to provide the EC2 instances access to the S3 bucket so the instances can store and access data by using AWS Identity and Access Management (IAM) Which solution will meet these requirements MOST securely?", "opts": {"A": "Create an AWS CloudFormation template for the web server EC2 instances. Save an IAM access key in the UserData section of the AWS EC2 Instance entity in the CloudFormation template.", "B": "Create a file that contains an IAM secret access key and access key ID. Store the file in a new S3 bucket. Create an AWS CloudFormation template. In the template, create a parameter to specify the location of the S3 object that contains the access key and access key ID.", "C": "Create an IAM role and an IAM access policy that allows the web server EC2 instances to access the S3 bucket. Create an AWS CloudFormation template for the web server EC2 instances that contains an IAM instance profile entity that references the IAM role and the IAM access policy.", "D": "Create a script that retrieves an IAM secret access key and access key ID from IAM and stores them on the web server EC2 instances. Include the script in the UserData section of the AWS EC2 Instance entity in an AWS CloudFormation template."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 176, "set": 3, "stem": "A company runs an enterprise resource planning (ERP) system on Amazon EC2 instances in a single AWS Region. Users connect to the ERP system by using a public API that is hosted on the EC2 instances. International users report slow API response times from their data centers. A solutions architect needs to improve API response times for the international users. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Set up an AWS Direct Connect connection that has a public virtual interface (VIF) to connect each user's data center to the EC2 instances. Create a Direct Connect gateway for the ERP system API to route user API requests.", "B": "Deploy Amazon API Gateway endpoints in multiple Regions. Use Amazon Route 53 latency-based routing to route requests to the nearest endpoint. Configure a VPC peering connection between the Regions to connect to the ERP system.", "C": "Set up AWS Global Accelerator. Configure listeners for the necessary ports. Configure endpoint groups for the appropriate Regions to distribute traffic. Create an endpoint in each group for the API.", "D": "Use AWS Site-to-Site VPN to establish dedicated VPN tunnels between multiple Regions and user networks. Route traffic to the API through the VPN connections."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **AWS Global Accelerator** ব্যবহার করা হয়েছে। AWS global network দিয়ে anycast IP-এ TCP/UDP traffic কম latency-তে routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Direct Connect): এই সেবা ভিন্ন কাজের — on-prem থেকে AWS-এ dedicated, consistent low-latency private সংযোগ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Site-to-Site VPN): এই সেবা ভিন্ন কাজের — internet-এর উপর encrypted IPsec সংযোগ, দ্রুত সেটআপ। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 177, "set": 3, "stem": "A company uses AWS to run its workloads. The company uses AWS Organizations to manage its accounts. The company needs to identify which departments are responsible for specific costs. New accounts are constantly created in the Organizations account structure. The Organizations continuous integration and continuous delivery (CI/CD) framework already adds the populated department tag to the AWS resources. The company wants to use an AWS Cost Explorer report to identify the service costs by department from all AWS accounts. Which combination of steps will meet these requirements with the MOST operational efficiency? (Select TWO.)", "opts": {"A": "Activate the aws:createdBy cost allocation tag and the department cost allocation tag in the management account.", "B": "Create a new cost and usage report in Cost Explorer. Group by the department cost allocation tag. Apply a filter to see all linked accounts and services.", "C": "Activate only the department cost allocation tag in the management account.", "D": "Create a new cost and usage report in Cost Explorer. Group by the department cost allocation tag without any other filters.", "E": "Activate only the aws:createdBy cost allocation tag in the management account."}, "ans": ["C", "D"], "sel": 2, "exp": "✅ **সঠিক উত্তর C:** Activate only the department cost allocation tag in the management account.\n✅ **সঠিক উত্তর D:** Create a new cost and usage report in Cost Explorer. Group by the department cost allocation tag without any other filters.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **E**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 178, "set": 3, "stem": "A company is deploying an application that processes streaming data in near-real time. The company plans to use Amazon EC2 instances for the workload. The network architecture must be configurable to provide the lowest possible latency between nodes. Which networking solution meets these requirements?", "opts": {"A": "Place the EC2 instances in multiple VPCs, and configure VPC peering.", "B": "Attach an Elastic Fabric Adapter (EFA) to each EC2 instance.", "C": "Run the EC2 instances in a spread placement group.", "D": "Use Amazon Elastic Block Store (Amazon EBS) optimized instance types."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EBS): এই সেবা ভিন্ন কাজের — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 179, "set": 3, "stem": "A company runs an application that stores and shares photos. Users upload the photos to an Amazon S3 bucket. Every day, users upload approximately 150 photos. The company wants to design a solution that creates a thumbnail of each new photo and stores the thumbnail in a second S3 bucket. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Configure an Amazon EventBridge scheduled rule to invoke a script every minute on a long- running Amazon EMR cluster. Configure the script to generate thumbnails for the photos that do not have thumbnails. Configure the script to upload the thumbnails to the second S3 bucket.", "B": "Configure an Amazon EventBridge scheduled rule to invoke a script every minute on a memory- optimized Amazon EC2 instance that is always on. Configure the script to generate thumbnails for the photos that do not have thumbnails. Configure the script to upload the thumbnails to the second S3 bucket.", "C": "Configure an S3 event notification to invoke an AWS Lambda function each time a user uploads a new photo to the application. Configure the Lambda function to generate a thumbnail and to upload the thumbnail to the second S3 bucket.", "D": "Configure S3 Storage Lens to invoke an AWS Lambda function each time a user uploads a new photo to the application. Configure the Lambda function to generate a thumbnail and to upload the thumbnail to a second S3 bucket."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 180, "set": 3, "stem": "A company is implementing a shared storage solution for a media application that the company hosts on AWS. The company needs the ability to use SMB clients to access stored data. Which solution will meet these requirements with the LEAST administrative overhead?", "opts": {"A": "Create an AWS Storage Gateway Volume Gateway. Create a file share that uses the required client protocol, Connect the application server to the file share.", "B": "Create an AWS Storage Gateway Tape Gateway. Configure tapes to use Amazon S3. Connect the application server to the Tape Gateway.", "C": "Create an Amazon EC2 Windows instance, Install and configure a Windows file share role on the instance. Connect the application server to the file share.", "D": "Create an Amazon FSx for Windows File Server file system. Connect the application server to the file system."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর D:** এখানে **Amazon FSx for Windows File Server** ব্যবহার করা হয়েছে। Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 181, "set": 3, "stem": "A company is migrating a Linux-based web server group to AWS. The web servers must access shared files by using the NFS protocol. The company must not make any changes to the web server application. Which solution will meet these requirements?", "opts": {"A": "Create an Amazon S3 bucket to store the shared files in S3 Standard. Grant the S3 bucket access to the web servers.", "B": "Configure an Amazon CloudFront distribution. Set an Amazon S3 bucket as the origin. Store the shared files in the S3 bucket.", "C": "Create an Amazon Elastic File System (Amazon EFS) file system. Mount the EFS file system on the web servers", "D": "Create an Amazon FSx for Windows File Server file system. Configure SMB protocol access for the web servers."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** একাধিক ইনস্ট্যান্স থেকে একসাথে অ্যাক্সেস।\n✅ **সঠিক উত্তর C:** এখানে **Amazon EFS** ব্যবহার করা হয়েছে। একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon FSx for Windows File Server): এই সেবা ভিন্ন কাজের — Windows/SMB-ভিত্তিক shared file storage (NTFS, AD integration)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 182, "set": 3, "stem": "A company uses AWS to run its ecommerce platform. The platform is critical to the company's operations and has a high volume of traffic and transactions. The company configures a multi-factor authentication (MFA) device to secure its AWS account root user credentials. The company wants to ensure that it will not lose access to the root user account if the MFA device is lost. Which solution will meet these requirements?", "opts": {"A": "Set up a backup administrator account that the company can use to log in if the company loses the MFA device.", "B": "Add multiple MFA devices for the root user account to handle the disaster scenario.", "C": "Create a new administrator account when the company cannot access the root account.", "D": "Attach the administrator policy to another IAM user when the company cannot access the root account."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কোনো request নষ্ট না হওয়া ও পুনরায় process।\n✅ **সঠিক উত্তর B:** Add multiple MFA devices for the root user account to handle the disaster scenario.\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 183, "set": 3, "stem": "A company needs a solution to prevent photos with unwanted content from being uploaded to the company's web application. The solution must not involve training a machine learning (ML.) model. Which solution will meet these requirements?", "opts": {"A": "Create and deploy a model by using Amazon SageMaker Autopilot. Create a real-time endpoint that the web application invokes when new photos are uploaded.", "B": "Create an AWS Lambda function that uses Amazon Rekognition to detect unwanted content. Create a Lambda function URL that the web application invokes when new photos are uploaded.", "C": "Create an Amazon CloudFront function that uses Amazon Comprehend to detect unwanted content. Associate the function with the web application.", "D": "Create an AWS Lambda function that uses Amazon Rekognition Video to detect unwanted content. Create a Lambda function URL that the web application invokes when new photos are uploaded."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon Rekognition** — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon Rekognition): এই সেবা ভিন্ন কাজের — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 184, "set": 3, "stem": "A company runs a container application by using Amazon Elastic Kubernetes Service (Amazon EKS). The application includes microservices that manage customers and place orders. The company needs to route incoming requests to the appropriate microservices. Which solution will meet this requirement MOST cost-effectively?", "opts": {"A": "Use the AWS Load Balancer Controller to provision a Network Load Balancer.", "B": "Use the AWS Load Balancer Controller to provision an Application Load Balancer.", "C": "Use an AWS Lambda function to connect the requests to Amazon EKS.", "D": "Use Amazon API Gateway to connect the requests to Amazon EKS"}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **Application Load Balancer (ALB)** ব্যবহার করা হয়েছে। Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing।\n❌ **কেন অন্যগুলো নয়:**\n• **A**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon API Gateway): এই সেবা ভিন্ন কাজের — managed API front-door; REST/HTTP API, throttling, SQS/Lambda integration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 185, "set": 3, "stem": "A company hosts a public web application on AWS. The website has a three-tier architecture. The frontend web tier is comprised of Amazon EC2 instances in an Auto Scaling group. The application tier is a second Auto Scaling group. The database tier is an Amazon RDS database. The company has configured the Auto Scaling groups to handle the application's normal level of demand. During an unexpected spike in demand, the company notices a long delay in the startup time when the frontend and application layers scale out. The company needs to improve the scaling performance of the application without negatively affecting the user experience. Which solution will meet these requirements MOST cost-effectively?", "opts": {"A": "Decrease the minimum number of EC2 instances for both Auto Scaling groups. Increase the desired number of instances to meet the peak demand requirement.", "B": "Configure the maximum number of instances for both Auto Scaling groups to be the number required to meet the peak demand. Create a warm pool.", "C": "Increase the maximum number of EC2 instances for both Auto Scaling groups to meet the normal demand requirement. Create a warm pool.", "D": "Reconfigure both Auto Scaling groups to use a scheduled scaling policy. Increase the size of the EC2 instance types and the RDS instance types"}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর B:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 186, "set": 3, "stem": "A company is using an Amazon Elastic Kubernetes Service (Amazon EKS) cluster. The company must ensure that Kubernetes service accounts in the EKS cluster have secure and granular access to specific AWS resources by using IAM roles for service accounts (IRSA). Which combination of solutions will meet these requirements? (Select TWO)", "opts": {"A": "Create an IAM policy that defines the required permissions. Attach the policy directly to the IAM role of the EKS nodes.", "B": "Implement network policies within the EKS cluster to prevent Kubernetes service accounts from accessing specific AWS services.", "C": "Modify the EKS cluster's IAM role to include permissions for each Kubernetes service account. Ensure a one-to-one mapping between IAM roles and Kubernetes roles.", "D": "Define an IAM role that includes the necessary permissions. Annotate the Kubernetes service accounts with the Amazon Resource Name (ARN) of the IAM role.", "E": "Set up a trust relationship between the IAM roles for the service accounts and an OpenID Connect (OIDC) identity provider."}, "ans": ["D", "E"], "sel": 2, "exp": "✅ **সঠিক উত্তর D:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই।\n✅ **সঠিক উত্তর E:** Set up a trust relationship between the IAM roles for the service accounts and an OpenID Connect (OIDC) identity provider.\n❌ **কেন অন্যগুলো নয়:**\n• **A** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 187, "set": 3, "stem": "A company is building a serverless application to process orders from an ecommerce site. The application needs to handle bursts of traffic during peak usage hours and to maintain high availability. The orders must be processed asynchronously in the order the application receives them. Which solution will meet these requirements?", "opts": {"A": "Use an Amazon Simple Notification Service (Amazon SNS) topic to receive orders. Use an AWS Lambda function to process the orders.", "B": "Use an Amazon Simple Queue Service (Amazon SQS) FIFO queue to receive orders. Use an AWS Lambda function to process the orders.", "C": "Use an Amazon Simple Queue Service (Amazon SQS) standard queue to receive orders. Use AWS Batch jobs to process the orders.", "D": "Use an Amazon Simple Notification Service (Amazon SNS) topic to receive orders. Use AWS Batch jobs to process the orders."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** component গুলোকে decouple করা, সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance।\n✅ **সঠিক উত্তর B:** এখানে **Amazon SQS** ব্যবহার করা হয়েছে। managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এর সঙ্গে **AWS Lambda** — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon SQS): এই সেবা ভিন্ন কাজের — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon SNS): এই সেবা ভিন্ন কাজের — pub/sub notification — এক message অনেক subscriber-এ fan-out। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 188, "set": 3, "stem": "A company that recently started using AWS establishes a Site-to-Site VPN between its on-premises data center and AWS. The company's security mandate states that traffic originating from on premises should stay within the company's private IP space when communicating with an Amazon Elastic Container Service (Amazon ECS) cluster that is hosting a sample web application. Which solution meets this requirement?", "opts": {"A": "Configure a gateway endpoint for Amazon ECS. Modify the route table to include an entry pointing to the ECS cluster.", "B": "Create a Network Load Balancer and AWS PrivateLink endpoint for Amazon ECS in the same VPC that is hosting the ECS cluster.", "C": "Create a Network Load Balancer in one VPC and an AWS PrivateLink endpoint for Amazon ECS in another VPC. Connect the two VPCs by using VPC peering.", "D": "Configure an Amazon Route 53 record with Amazon ECS as the target. Apply a server certificate to Route 53 from AWS Certificate Manager (ACM) for SSL offloading"}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **AWS PrivateLink** ব্যবহার করা হয়েছে। VPC থেকে service-এ private এন্ডপয়েন্ট (interface endpoint) দিয়ে নিরাপদ অ্যাক্সেস। এর সঙ্গে **Amazon ECS** — AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS PrivateLink): এই সেবা ভিন্ন কাজের — VPC থেকে service-এ private এন্ডপয়েন্ট (interface endpoint) দিয়ে নিরাপদ অ্যাক্সেস। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 189, "set": 3, "stem": "A company has a relational database workload that runs on Amazon Aurora MySQL. According to new compliance standards, the company must rotate all database credentials every 30 days. The company needs a solution that maximizes security and minimizes development effort. Which solution will meet these requirements?", "opts": {"A": "Store the database credentials in AWS Secrets Manager. Configure automatic credential rotation for every 30 days.", "B": "Store the database credentials in AWS Systems Manager Parameter Store. Create an AWS Lambda function to rotate the credentials every 30 days.", "C": "Store the database credentials in an environment file or in a configuration file. Modify the credentials every 30 days.", "D": "Store the database credentials in an environment file or in a configuration file. Create an AWS Lambda function to rotate the credentials every 30 days."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** Store the database credentials in AWS Secrets Manager. Configure automatic credential rotation for every 30 days.\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 190, "set": 3, "stem": "A solutions architect runs a web application on multiple Amazon EC2 instances that are in individual target groups behind an Application Load Balancer (ALB). Users can reach the application through a public website. The solutions architect wants to allow engineers to use a development version of the website to access one specific development EC2 instance to test new features for the application. The solutions architect wants to use an Amazon Route 53 hosted zone to give the engineers access to the development instance. The solution must automatically route to the development instance even if the development instance is replaced. Which solution will meet these requirements?", "opts": {"A": "Create an A Record for the development website that has the value set to the ALB. Create a listener rule on the ALB that forwards requests for the development website to the target group that contains the development instance.", "B": "Recreate the development instance with a public IP address. Create an A Record for the development website that has the value set to the public IP address of the development instance.", "C": "Create an A Record for the development website that has the value set to the ALB. Create a listener rule on the ALB to redirect requests for the development website to the public IP address of the development instance.", "D": "Place all the instances in the same target group. Create an A Record for the development website. Set the value to the ALB. Create a listener rule on the ALB that forwards requests for the development website to the target group."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** Create an A Record for the development website that has the value set to the ALB. Create a listener rule on the ALB that forwards requests for the development website to the target group that contains\n❌ **কেন অন্যগুলো নয়:**\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **C**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 191, "set": 3, "stem": "A company has a business system that generates hundreds of reports each day. The business system saves the reports to a network share in CSV format. The company needs to store this data in the AWS Cloud in near-real time for analysis. Which solution will meet these requirements with the LEAST administrative overhead?", "opts": {"A": "Use AWS DataSync to transfer the files to Amazon S3. Create a scheduled task that runs at the end of each day.", "B": "Create an Amazon S3 File Gateway. Update the business system to use a new network share from the S3 File Gateway.", "C": "Use AWS DataSync to transfer the files to Amazon S3. Create an application that uses the DataSync API in the automation workflow.", "D": "Deploy an AWS Transfer for SFTP endpoint. Create a script that checks for new files on the network share and uploads the new files by using SFTP."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS DataSync): এই সেবা ভিন্ন কাজের — on-premises থেকে AWS-এ দ্রুত, স্বয়ংক্রিয় online data transfer। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D**: এই বিকল্পটি সব শর্ত পূরণ করে না।"}, {"n": 192, "set": 3, "stem": "A company needs to optimize costs for a proprietary, non-production x86-based application. The application runs on a general-purpose Amazon EC2 instance and is over provisioned. The application is CPU intensive. The company does not want to re-architect or recompile the application, Which solution will meet these requirements?", "opts": {"A": "Use AWS Compute Optimizer recommendations and follow compute-optimized instance recommendations.", "B": "Use AWS Compute Optimizer recommendations and follow Graviton instance recommendations.", "C": "Use Amazon SageMaker Al recommendations and follow compute-optimized instance recommendations.", "D": "Use Amazon SageMaker Al recommendations and follow Graviton instance recommendations."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর A:** এখানে **AWS Compute Optimizer** ব্যবহার করা হয়েছে। ব্যবহার (CPU/memory) বিশ্লেষণ করে সঠিক (right-size) instance type সাজেশন দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Compute Optimizer): এই সেবা ভিন্ন কাজের — ব্যবহার (CPU/memory) বিশ্লেষণ করে সঠিক (right-size) instance type সাজেশন দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Rekognition): এই সেবা ভিন্ন কাজের — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon Rekognition): এই সেবা ভিন্ন কাজের — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 193, "set": 3, "stem": "A genomic research company analyzes approximately 50 TB of raw DNA sequence data for each project that the company stores in Amazon S3. The company accesses data files frequently during the first 30 days of each project. The company rarely accesses the data after the first 30 days. However, the company must retain the data for 7 years. The company needs a cost-effective storage solution for the data. Which solution will meet these requirements?", "opts": {"A": "Store the data in Amazon EFS for the first 30 days. After 30 days, move the data to Amazon S3 Glacier Flexible Retrieval.", "B": "Store the data in Amazon S3 Standard for the first 30 days. After 30 days, move the data to Amazon S3 Standard-Infrequent Access (S3 Standard-IA).", "C": "Store the data in Amazon S3 Standard for the first 30 days. After 30 days, move the data to Amazon S3 Glacier Deep Archive.", "D": "Store the data in Amazon S3 Standard for the first 30 days. After 30 days, move the data to Amazon EBS volumes."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EFS): এই সেবা ভিন্ন কাজের — একাধিক Linux EC2 থেকে একসাথে ব্যবহারযোগ্য shared NFS file system, auto-scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 194, "set": 3, "stem": "A company has a three-tier image and video sharing application. The application stores videos that are up to 20 MB in size. The presentation tier uses an Amazon EC2 instance. The application tier uses a second EC2 instance. The data tier consists of a MySQL database that runs on a third EC2 instance. The company uses a third-party SQL analytics application to monitor the database and predict future growth. A solutions architect needs to design a solution that is scalable and highly available to replace the existing architecture. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Use Amazon S3 to host the presentation tier. Use AWS Lambda functions for the application tier. Move the database to an Amazon DynamoDB table. Use DynamoDB to store and serve images and video content.", "B": "Use load-balanced Multi-AZ AWS Elastic Beanstalk environments for the presentation tier and the application tier. Move the database to an Amazon RDS DB instance that has multiple read replicas to serve images and video content.", "C": "Use Amazon S3 to host the presentation tier. Use a fleet of EC2 instances in an Auto Scaling group for the application tier. Move the database to a memory-optimized instance type to store and serve images and video content.", "D": "Use load-balanced Multi-AZ AWS Elastic Beanstalk environments for the presentation tier and the application tier. Move the database to an Amazon RDS Multi-AZ DB instance. Use Amazon S3 to store and serve images and video content."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন পরিচালনা (operational overhead), high availability / fault tolerance।\n✅ **সঠিক উত্তর D:** এখানে **AWS Elastic Beanstalk** ব্যবহার করা হয়েছে। অ্যাপ ডিপলয় অরকেস্ট্রেশন (PaaS)। এর সঙ্গে **Amazon RDS** — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Elastic Beanstalk): এই সেবা ভিন্ন কাজের — অ্যাপ ডিপলয় অরকেস্ট্রেশন (PaaS)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 195, "set": 3, "stem": "A company needs to save confidential medical results in an Amazon S3 bucket. The repository must allow a few approved users to add new files. The repository must restrict all other users to read-only access by using a write once, read many (WORM) approach. The company must keep every file in the repository for a minimum of 1 year after its creation date. Which solution will meet these requirements with the LEAST implementation effort?", "opts": {"A": "Configure the S3 bucket with multi-factor authentication (MFA) delete. Do not share the MFA secret with users to avoid deletion.", "B": "Use S3 Object Lock in compliance mode with a retention period of 1 year. Use an IAM policy that restricts file access to specified approved users.", "C": "Use an IAM role to restrict all users from deleting or changing objects in the S3 bucket. Use an S3 bucket policy to only allow the IAM role.", "D": "Configure the S3 bucket to invoke an AWS Lambda function every time an object is added. Configure the function to track the hash of the saved object so that modified objects can be marked accordingly."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 196, "set": 3, "stem": "A company runs applications and stores data in multiple AWS accounts. The company uses AWS Organizations to manage all its accounts. The company needs a solution to efficiently and centrally manage data backups for the AWS services that the company uses. The solution must improve the company's disaster recovery posture. The solution must also protect data backups against accidental deletion or a malicious attack on an AWS account. Which solution will meet these requirements?", "opts": {"A": "Use AWS Backup in each AWS account to store copies of the data backups in additional Availability Zones.", "B": "Use AWS Backup policies in Organizations to store copies of the data backups in additional AWS accounts.", "C": "Use AWS Backup in each AWS account to store copies of the data backups in additional AWS Regions.", "D": "Use AWS Backup policies in Organizations to store copies of the data backups in additional AWS Regions."}, "ans": ["B"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** দুষ্ট কার্যকলাপ শনাক্ত।\n✅ **সঠিক উত্তর B:** এখানে **AWS Backup** ব্যবহার করা হয়েছে। একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এর সঙ্গে **AWS Organizations** — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Backup): এই সেবা ভিন্ন কাজের — একাধিক AWS service-এর backup কেন্দ্রীয়ভাবে policy দিয়ে ম্যানেজ করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 197, "set": 3, "stem": "A global company is migrating its workloads from an on-premises data center to AWS. The AWS environment includes multiple AWS accounts, IAM roles, AWS Config rules, and a VPC. The company wants an automated process to provision new accounts on demand when the company's business units require new accounts. Which solution will meet these requirements with LEAST effort?", "opts": {"A": "Use AWS Control Tower to set up an organization in AWS Organizations. Use AWS Control Tower Account Factory for Terraform (AFT) to provision new AWS accounts.", "B": "Create an organization in AWS Organizations. Use the AWS CLI CreateAccount API action to provision new AWS accounts. Organize the business units with organizational units (OUs).", "C": "Create an AWS Lambda function that uses the AWS Organizations API to create new accounts. Invoke the Lambda function from an AWS CloudFormation template in AWS Service Catalog.", "D": "Create an organization in AWS Organizations. Use AWS Step Functions to orchestrate the account creation process. Send account creation requests to an Amazon API Gateway API endpoint to invoke an AWS Lambda function that creates new accounts."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কম latency ও global অ্যাক্সেস।\n✅ **সঠিক উত্তর A:** এখানে **AWS Organizations** ব্যবহার করা হয়েছে। একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (AWS Organizations): এই সেবা ভিন্ন কাজের — একাধিক AWS account কেন্দ্রীয়ভাবে পরিচালনা এবং SCP দিয়ে governance দেয়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 198, "set": 3, "stem": "A company is building a new web-based customer relationship management application. The application will use several Amazon EC2 instances that are backed by Amazon EBS volumes behind an Application Load Balancer (ALB). The application will also use an Amazon Aurora database. All data for the application must be encrypted at rest and in transit. Which solution will meet these requirements?", "opts": {"A": "Use AWS KMS certificates on the ALB to encrypt data in transit. Use AWS Certificate Manager (ACM) to encrypt the EBS volumes and Aurora database storage at rest.", "B": "Use the AWS root account to log in to the AWS Management Console. Upload the company's encryption certificates. While in the root account, select the option to turn on encryption for all data at rest and in transit for the account,", "C": "Use AWS KMS to encrypt the EBS volumes and Aurora database storage at rest. Attach an AWS Certificate Manager (ACM) certificate to the ALB to encrypt data in transit.", "D": "Use BitLocker to encrypt all data at rest. Import the company's TLS certificate keys to AWS KMS. Attach the KMS keys to the ALB to encrypt data in transit."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** encryption / ডেটা সুরক্ষা।\n✅ **সঠিক উত্তর C:** এখানে **AWS KMS** ব্যবহার করা হয়েছে। encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এর সঙ্গে **Amazon EBS** — একটি EC2 instance-এ attach হওয়া block storage volume (io2 এ high IOPS)। এর সঙ্গে **Amazon Aurora** — high-performance managed relational DB; Global Database দিয়ে cross-region low-latency read।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B**: এই বিকল্পটি সব শর্ত পূরণ করে না।\n• **D** (AWS KMS): এই সেবা ভিন্ন কাজের — encryption key তৈরি, সংরক্ষণ ও কেন্দ্রীয় নিয়ন্ত্রণ করে; envelope encryption সাপোর্ট। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 199, "set": 3, "stem": "A company wants to use Amazon S3 to back up its on-premises file storage solution. The company's on-premises file storage solution supports NFS, and the company wants its new solution to support NFS. The company wants to archive the backup files after 5 days. If the company needs archived files for disaster recovery, the company is willing to wait a few days for the retrieval of those files. Which solution meets these requirements MOST cost-effectively?", "opts": {"A": "Deploy an AWS Storage Gateway file gateway that is associated with an S3 bucket. Move the files from the on-premises file storage solution to the file gateway. Create an S3 Lifecycle rule to move the files to S3 Standard-Infrequent Access (S3 Standard-IA) after 5 days.", "B": "Deploy an AWS Storage Gateway volume gateway that is associated with an S3 bucket. Move the files from the on-premises file storage solution to the volume gateway. Create an S3 Lifecycle rule to move the files to S3 Glacier Deep Archive after 5 days.", "C": "Deploy an AWS Storage Gateway tape gateway that is associated with an S3 bucket. Move the files from the on-premises file storage solution to the tape gateway. Create an S3 Lifecycle rule to move the files to S3 Standard-Infrequent Access (S3 Standard-IA) after 5 days.", "D": "Deploy an AWS Storage Gateway file gateway that is associated with an S3 bucket. Move the files from the on-premises file storage solution to the file gateway. Create an S3 Lifecycle rule to move the files to S3 Glacier Deep Archive after 5 days."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর D:** এখানে **AWS Storage Gateway** ব্যবহার করা হয়েছে। on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Storage Gateway): এই সেবা ভিন্ন কাজের — on-premises এবং AWS storage-এর মধ্যে hybrid সংযোগ; File/Volume/Tape Gateway। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 200, "set": 3, "stem": "A company has several backend services that produce a large amount of data every hour. The company stores the data in an Amazon S3 bucket in JSON format. The company must process the data constantly by using a custom Python script. The data processing job is not time sensitive and can tolerate failure. The data processing job usually finishes within 10 to 20 minutes. After the data is processed, it must immediately be deleted from the S3 bucket. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Use Amazon EC2 Reserved Instances to run the Python script to process the data. Create an S3 Lifecycle configuration rule to delete the data after it is processed.", "B": "Use AWS Lambda to run the Python script to process the data. Create an S3 Lifecycle configuration rule to delete the data after it is processed.", "C": "Use AWS Lambda to run the Python script to process the data. After the data is processed, call the Amazon S3 API to delete the data.", "D": "Use Amazon EC2 Spot Instances to run the Python script to process the data. After the data is processed, call the Amazon S3 API to delete the data."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ, sensitive/PII ডেটা শনাক্ত।\n✅ **সঠিক উত্তর D:** এখানে **Amazon EC2** ব্যবহার করা হয়েছে। ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (AWS Lambda): এই সেবা ভিন্ন কাজের — serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 201, "set": 4, "stem": "A company wants to migrate applications from its on-premises servers to AWS. As a first step, the company is modifying and migrating a non-critical application to a single Amazon EC2 instance. The application will store information in an Amazon S3 bucket. The company needs to follow security best practices when deploying the application on AWS. Which approach should the company take to allow the application to interact with Amazon S3?", "opts": {"A": "Create an IAM role that has administrative access to AWS. Attach the role to the EC2 instance.", "B": "Create an IAM user. Attach the AdministratorAccess policy. Copy the generated access key and secret key. Within the application code, use the access key and secret key along with the AWS SDK to communicate with Amazon S3.", "C": "Create an IAM role that has the necessary access to Amazon S3. Attach the role to the EC2 instance.", "D": "Create an IAM user. Attach a policy that provides the necessary access to Amazon S3. Copy the generated access key and secret key. Within the application code, use the access key and secret key along with the AWS SDK to communicate with Amazon S3."}, "ans": ["C"], "sel": 1, "exp": "✅ **সঠিক উত্তর C:** এখানে **IAM Role** ব্যবহার করা হয়েছে। temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (IAM Role): এই সেবা ভিন্ন কাজের — temporary credential দিয়ে সেবা/ইনস্ট্যান্সকে নিরাপদ অ্যাক্সেস; access key রাখার দরকার নেই। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 202, "set": 4, "stem": "A company is deploying an application on Amazon EC2 instances in a VPC. The application must be accessible through path-based routing. The company wants to make the application accessible to a customer workload that runs on AWS in a separate VPC. The company requires all network connectivity to the application to use a private channel. The company needs to hide its VPC CIDR block from the customer. Which solution will meet these requirements?", "opts": {"A": "Create an internal Application Load Balancer (ALB) and register the EC2 instances as targets. Create a VPC peering connection between the application VPC and the customer VPC.", "B": "Create an external Network Load Balancer (NLB) and register the EC2 instances as targets. Associate an Elastic IP address with the NLB.", "C": "Create an internal Gateway Load Balancer (GWLB) and register the EC2 instances as targets. Create a VPC endpoint service and associate it with the GWLB.", "D": "Create an internal Application Load Balancer (ALB) and set the EC2 instances as targets. Create an internal Network Load Balancer (NLB) and set the ALB as its target. Create a VPC endpoint service and associate it with the NLB."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Application Load Balancer (ALB)** ব্যবহার করা হয়েছে। Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এর সঙ্গে **Amazon EC2** — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এর সঙ্গে **Network Load Balancer (NLB)** — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Gateway Load Balancer): এই সেবা ভিন্ন কাজের — third-party virtual appliance (firewall/IDS) deploy ও scale করার জন্য। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 203, "set": 4, "stem": "A retail company runs multiple containerized applications on Amazon ECS. The company's inventory system includes a primary task that processes orders continuously and a sidecar task that performs batch reconciliation. The reconciliation task runs a few times each week when it is invoked by specific events. The company wants to optimize costs by refactoring the current architecture while maintaining all current functionality. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Scale down the ECS cluster during periods of inactivity by using AWS Auto Scaling.", "B": "Convert the reconciliation task to use AWS Fargate Spot Instances.", "C": "Migrate the reconciliation task to an AWS Lambda function. Use Amazon SQS messages from the primary task to invoke the function.", "D": "Implement an Amazon EventBridge scheduled rule to start and stop the reconciliation task on a predefined schedule."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **AWS Lambda** ব্যবহার করা হয়েছে। serverless compute — সার্ভার ম্যানেজ ছাড়াই event-driven কোড চালায়, সর্বনিম্ন overhead। এর সঙ্গে **Amazon SQS** — managed message queue — component decouple করে, message হারায় না; FIFO queue exactly-once ও ক্রম নিশ্চিত করে।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon ECS): এই সেবা ভিন্ন কাজের — AWS-native container orchestration। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (AWS Fargate): এই সেবা ভিন্ন কাজের — serverless container compute — EC2 ম্যানেজ ছাড়াই ECS/EKS container চালায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon EventBridge): এই সেবা ভিন্ন কাজের — event bus ও scheduled rule দিয়ে service-গুলো decouple করে। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 204, "set": 4, "stem": "A company runs a production database on Amazon RDS for MySQL. The company wants to upgrade the database version for security compliance reasons. Because the database contains critical data, the company wants a quick solution to upgrade and test functionality without losing any data. Which solution will meet these requirements with the LEAST operational overhead?", "opts": {"A": "Create an RDS manual snapshot. Upgrade to the new version of Amazon RDS for MySQL. A", "B": "Use native backup and restore. Restore the data to the upgraded new version of Amazon RDS for MySQL", "C": "Use AWS DMS to replicate the data to the upgraded new version of Amazon RDS for MySQL", "D": "Use Amazon RDS Blue/Green Deployments to deploy and test production changes."}, "ans": ["D"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কোনো request নষ্ট না হওয়া ও পুনরায় process, সর্বনিম্ন পরিচালনা (operational overhead)।\n✅ **সঠিক উত্তর D:** এখানে **Amazon RDS** ব্যবহার করা হয়েছে। managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon RDS): এই সেবা ভিন্ন কাজের — managed relational DB (MySQL/PostgreSQL ...); Multi-AZ দিয়ে HA। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 205, "set": 4, "stem": "A company has Amazon EC2 instances that run nightly batch jobs to process data. The EC2 instances run in an Auto Scaling group that uses On-Demand billing. If a job fails on one instance, another instance will reprocess the job. The batch jobs run between 12:00 AM and 06:00 AM local time every day. Which solution will provide EC2 instances to meet these requirements MOST cost-effectively?", "opts": {"A": "Purchase a 1-year Savings Plan for Amazon EC2 that covers the instance family of the Auto Scaling group that the batch job uses.", "B": "Purchase a 1-year Reserved Instance for the specific instance type and operating system of the instances in the Auto Scaling group that the batch job uses.", "C": "Create a new launch template for the Auto Scaling group. Set the instances to Spot Instances. Set a policy to scale out based on CPU usage.", "D": "Create a new launch template for the Auto Scaling group, Increase the instance size. Set a policy to scale out based on CPU usage."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** কোনো request নষ্ট না হওয়া ও পুনরায় process, সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 206, "set": 4, "stem": "A solutions architect must design a solution that uses Amazon CloudFront with an Amazon S3 origin to serve a static website. The solution must use AWS WAF to inspect all website traffic. Which solution will meet these requirements?", "opts": {"A": "Configure an S3 bucket policy to accept only requests that come from the AWS WAF Amazon Resource Name (ARN).", "B": "Configure CloudFront to forward all incoming requests to AWS WAF before CloudFront requests content from the S3 origin.", "C": "Configure a security group that allows only CloudFront IP addresses to access Amazon S3. Associate AWS WAF to the CloudFront distribution.", "D": "Configure CloudFront and Amazon S3 to use an origin access control (OAC) to secure the origin S3 bucket. Associate AWS WAF to the CloudFront distribution."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon CloudFront** ব্যবহার করা হয়েছে। CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এর সঙ্গে **Amazon S3** — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 207, "set": 4, "stem": "A company is creating a payment processing application that supports TLS connections from IPv4 clients. The application requires outbound access to the public internet. The application must allow users to access the application from a single-entry point while maintaining the lowest possible attack surface. The company wants to use Amazon ECS tasks to deploy the application. The company wants to enable awsvpc network mode. Which solution will meet these requirements?", "opts": {"A": "Create a VPC that has an internet gateway, public subnets, and private subnets. Deploy a Network Load Balancer (NLB) and a NAT gateway in the public subnets. Deploy the ECS tasks in the private subnets.", "B": "Create a VPC that has an egress-only internet gateway, public subnets, and private subnets. Deploy an Application Load Balancer (ALB) and a NAT gateway in the public subnets. Deploy the ECS tasks in the private subnets.", "C": "Create a VPC that has an internet gateway, public subnets, and private subnets. Deploy an Application Load Balancer (ALB) in the public subnets. Deploy the ECS tasks in the public subnets.", "D": "Create a VPC that has an egress-only internet gateway, public subnets, and private subnets. Deploy a Network Load Balancer (NLB) in the public subnets. Deploy the ECS tasks in the public subnets."}, "ans": ["A"], "sel": 1, "exp": "✅ **সঠিক উত্তর A:** এখানে **Network Load Balancer (NLB)** ব্যবহার করা হয়েছে। Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এর সঙ্গে **Amazon ECS** — AWS-native container orchestration।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Network Load Balancer (NLB)): এই সেবা ভিন্ন কাজের — Layer-4 (TCP/UDP), অতি high throughput ও কম latency, লক্ষ লক্ষ request/sec সামলায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 208, "set": 4, "stem": "A company processes large amounts of data by using Amazon EC2 instances in an Auto Scaling group. The data processing jobs run for up to 48 hours each week. The data processing jobs can handle interruptions. However, the company wants to minimize the interruptions. The company wants to use the latest generation of Amazon EC2 instances each year. Which solution will meet these requirements in the MOST cost-effective way?", "opts": {"A": "Purchase Convertible Reserved Instances (RIs) on an All Upfront basis for a 3-year term for the instance types currently in use.", "B": "Purchase Standard Reserved Instances (RIs) on an All Upfront basis for a 1-year term for the instance types currently in use.", "C": "Purchase Spot Instances with a price-capacity-optimized allocation strategy. Override instance types in the Auto Scaling group.", "D": "Purchase Spot Instances with a capacity-optimized allocation strategy. Override instance types in the Auto Scaling group."}, "ans": ["C"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** সর্বনিম্ন খরচ।\n✅ **সঠিক উত্তর C:** এখানে **EC2 Auto Scaling** ব্যবহার করা হয়েছে। চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Reserved Instances): এই সেবা ভিন্ন কাজের — নির্দিষ্ট EC2/RDS family-এ long-term commitment-এ ডিসকাউন্ট (Lambda/Fargate তে খাটে না)। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (EC2 Auto Scaling): এই সেবা ভিন্ন কাজের — চাহিদা অনুযায়ী instance সংখ্যা বাড়ায়/কমায়; scheduled/dynamic scaling। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 209, "set": 4, "stem": "A finance company uses an on-premises search application to collect streaming data from various producers. The application provides real-time updates to search and visualization features. The company is planning to migrate to AWS and wants to use an AWS native solution. Which solution will meet these requirements?", "opts": {"A": "Use Amazon EC2 instances to ingest and process the data streams to Amazon S3 buckets for storage. Use Amazon Athena to search the data. Use Amazon Managed Grafana to create visualizations.", "B": "Use Amazon EMR to ingest and process the data streams to Amazon Redshift for storage. Use Amazon Redshift Spectrum to search the data. Use Amazon QuickSight to create visualizations.", "C": "Use Amazon EKS to ingest and process the data streams to Amazon DynamoDB for storage. Use Amazon CloudWatch to create graphical dashboards to search and visualize the data.", "D": "Use Amazon Kinesis Data Streams to ingest and process the data streams to Amazon OpenSearch Service. Use OpenSearch Service to search the data. Use Amazon QuickSight to create visualizations."}, "ans": ["D"], "sel": 1, "exp": "✅ **সঠিক উত্তর D:** এখানে **Amazon Kinesis Data Streams** ব্যবহার করা হয়েছে। real-time streaming data ingestion ও processing। এর সঙ্গে **Amazon QuickSight** — BI dashboard ও visualization।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon EC2): এই সেবা ভিন্ন কাজের — ভার্চুয়াল সার্ভার; পুরো নিয়ন্ত্রণ কিন্তু বেশি management overhead। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **B** (Amazon Redshift): এই সেবা ভিন্ন কাজের — petabyte-scale data warehouse, analytical (OLAP) query। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon EKS): এই সেবা ভিন্ন কাজের — managed Kubernetes; IRSA দিয়ে pod-এ IAM role। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 210, "set": 4, "stem": "A company wants to create a long-term storage solution that will allow users to upload terabytes of images and videos. The company will use the images and videos to train machine learning (ML) models. The storage solution must be scalable and cost-optimized. Which solution will meet these requirements?", "opts": {"A": "Provision an Amazon S3 bucket for users to upload images and videos. Copy the data from the S3 bucket to an Amazon FSx for Lustre file system to make the data available for ML model training.", "B": "Provision an Amazon S3 bucket for users to upload images and videos. Configure the S3 bucket to make the data available to Amazon SageMaker Al for ML model training. Store the data in the S3 Intelligent-Tiering storage class.", "C": "Configure an Amazon SageMaker Al notebook instance with 16 GB of storage. Create a custom application to allow users to upload images and videos directly to the notebook instance.", "D": "Provision an Amazon S3 bucket for users to upload images and videos. Copy the data from the S3 bucket to an Amazon EFS file system to make the data available for ML model training."}, "ans": ["B"], "sel": 1, "exp": "✅ **সঠিক উত্তর B:** এখানে **Amazon S3** ব্যবহার করা হয়েছে। অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এর সঙ্গে **Amazon Rekognition** — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত।\n❌ **কেন অন্যগুলো নয়:**\n• **A** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon Rekognition): এই সেবা ভিন্ন কাজের — pre-trained image/video analysis — নিজে ML train ছাড়াই unsafe/unwanted content শনাক্ত। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Amazon S3): এই সেবা ভিন্ন কাজের — অত্যন্ত durable (11 9s) object storage; static content ও user upload রাখার সর্বোত্তম বিকল্প। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 211, "set": 4, "stem": "A gaming company is building an application with Voice over IP capabilities. The application will serve traffic to users across the world. The application needs to be highly available with an automated failover across AWS Regions. The company wants to minimize the latency of users without relying on IP address caching on user devices. What should a solutions architect do to meet these requirements?", "opts": {"A": "Use AWS Global Accelerator with health checks.", "B": "Use Amazon Route 53 with a geolocation routing policy.", "C": "Create an Amazon CloudFront distribution that includes multiple origins.", "D": "Create an Application Load Balancer that uses path-based routing."}, "ans": ["A"], "sel": 1, "exp": "🔑 **এই প্রশ্নের মূল চাহিদা:** high availability / fault tolerance।\n✅ **সঠিক উত্তর A:** এখানে **AWS Global Accelerator** ব্যবহার করা হয়েছে। AWS global network দিয়ে anycast IP-এ TCP/UDP traffic কম latency-তে routing।\n❌ **কেন অন্যগুলো নয়:**\n• **B** (Amazon Route 53): এই সেবা ভিন্ন কাজের — DNS ও routing policy (latency, failover, geolocation) + health check। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **C** (Amazon CloudFront): এই সেবা ভিন্ন কাজের — CDN — edge location থেকে static/dynamic content কম latency-তে global ব্যবহারকারীর কাছে পৌঁছায়। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।\n• **D** (Application Load Balancer (ALB)): এই সেবা ভিন্ন কাজের — Layer-7 (HTTP/HTTPS) load balancing, path/host ভিত্তিক routing। এই দৃশ্যপটের মূল চাহিদা পুরোপুরি পূরণ করে না।"}, {"n": 212, "set": 4, "stem": "A company runs business applications on AWS. The company uses 50 AWS accounts, thousands of VPCs, and three AWS Regions across th
